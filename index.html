<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada – AI Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#5b6af0;--accent-dark:#4453d6;
  --bg:#f4f5f7;--surface:#fff;--border:#e2e4e9;
  --text:#1a1c22;--muted:#6b7280;
  --user-bubble:#5b6af0;--ada-bubble:#fff;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --toast-bg:#1a1c22;--toast-text:#fff;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1c22;--border:#2d3040;
  --text:#e8eaf0;--muted:#9ca3af;
  --ada-bubble:#252836;--user-bubble:#4453d6;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --toast-bg:#e8eaf0;--toast-text:#1a1c22;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .25s}

/* ── App ── */
.app{width:100%;max-width:700px;height:100dvh;max-height:900px;background:var(--surface);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:background .25s}
@media(max-width:720px){.app{border-radius:0;max-height:100dvh}}

/* ── Header ── */
header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);transition:background .25s,border-color .25s}
.ada-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9b6ef0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
header h1{font-size:16px;font-weight:700;color:var(--text)}
header p{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.hdr-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:14px}
.hdr-btn:hover{background:var(--bg);color:var(--text)}
.autoread-label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;padding:5px 9px;border:1px solid var(--border);border-radius:20px;transition:all .15s}
.autoread-label:hover{background:var(--bg)}
.autoread-label input{accent-color:var(--accent);cursor:pointer}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background .25s,border-color .25s}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text);background:var(--bg)}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.panel.active{display:flex}

/* ── Chat ── */
.chat{flex:1;overflow-y:auto;padding:14px 12px;scroll-behavior:smooth;display:flex;flex-direction:column;gap:10px;min-height:0}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Welcome */
.welcome{text-align:center;margin:auto;padding:24px 12px}
.welcome .big-dot{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9b6ef0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:24px;margin:0 auto 12px}
.welcome h2{font-size:18px;color:var(--text);margin-bottom:6px}
.welcome p{font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 14px}
.quick-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{padding:5px 11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* Messages */
.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.msg.ada .msg-avatar{background:linear-gradient(135deg,var(--accent),#9b6ef0)}
.msg.user .msg-avatar{background:#34d399}
.msg-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bubble);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;transition:background .25s,border-color .25s}
.msg.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}

/* Reactions */
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.reaction-chip{font-size:15px;cursor:pointer;padding:1px 5px;border-radius:8px;background:var(--bg);border:1px solid var(--border);transition:transform .15s;user-select:none}
.reaction-chip:hover{transform:scale(1.25)}
.reaction-bar{display:flex;gap:4px;margin-top:3px;opacity:0;transition:opacity .2s;flex-wrap:wrap}
.msg:hover .reaction-bar,.reaction-bar:focus-within{opacity:1}
.react-pick{font-size:14px;cursor:pointer;padding:2px 5px;border-radius:8px;background:var(--bg);border:1px solid var(--border);transition:transform .15s;user-select:none}
.react-pick:hover{transform:scale(1.2)}

/* Speak btn */
.speak-btn{background:none;border:none;cursor:pointer;padding:2px 6px;color:var(--accent);font-size:11px;border-radius:6px;align-self:flex-start;transition:background .15s;display:flex;align-items:center;gap:3px}
.speak-btn:hover{background:rgba(91,106,240,.1)}
.speak-btn.speaking{color:#22c55e}

/* Code blocks */
.code-block{background:#1e1e2e;color:#cdd6f4;border-radius:10px;padding:12px;font-family:'Courier New',monospace;font-size:12.5px;overflow-x:auto;margin:6px 0;position:relative;line-height:1.6}
.code-lang{font-size:10px;color:#7c7f93;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.copy-code{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;color:#cdd6f4;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:background .15s}
.copy-code:hover{background:rgba(255,255,255,.2)}
.code-block pre{white-space:pre-wrap;word-break:break-word}

/* File preview */
.file-preview-bubble{margin-top:6px;padding:8px;background:rgba(0,0,0,.06);border-radius:10px;display:flex;align-items:center;gap:8px;font-size:13px}
.msg.user .file-preview-bubble{background:rgba(255,255,255,.15)}
.file-preview-bubble img,.file-preview-bubble video{width:80px;height:80px;object-fit:cover;border-radius:8px}

/* Typing */
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--ada-bubble);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;transition:background .25s,border-color .25s}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* ── Input ── */
.input-area{padding:10px 12px 13px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background .25s,border-color .25s}
.file-staging{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.stage-item{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted)}
.stage-item img,.stage-item video{width:30px;height:30px;object-fit:cover;border-radius:4px}
.stage-remove{background:#ef4444;color:#fff;border:none;border-radius:50%;width:15px;height:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;padding:0;flex-shrink:0}
.input-row{display:flex;gap:6px;align-items:flex-end}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:all .15s}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.icon-btn.recording{background:#fef2f2;border-color:#ef4444;color:#ef4444;animation:pulse 1s infinite}
.icon-btn svg{width:15px;height:15px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:14px;font-family:inherit;outline:none;line-height:1.5;max-height:110px;overflow-y:auto;transition:border-color .2s,background .25s;background:var(--bg);color:var(--text)}
textarea:focus{border-color:var(--accent);background:var(--surface)}
textarea::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.05)}
.send-btn:active{transform:scale(.96)}
.send-btn svg{width:15px;height:15px}
#fileInput{display:none}

/* ── Notes ── */
.notes-panel{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;overflow-y:auto;min-height:0}
.notes-toolbar{display:flex;gap:7px;align-items:flex-start}
.note-input-area{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:60px}
.note-input-area:focus{border-color:var(--accent)}
.note-save-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;align-self:flex-end}
.note-save-btn:hover{background:var(--accent-dark)}
.notes-list{display:flex;flex-direction:column;gap:7px}
.note-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start}
.note-text{flex:1;font-size:14px;color:var(--text);line-height:1.5;word-break:break-word;white-space:pre-wrap}
.note-meta{font-size:11px;color:var(--muted);margin-top:4px}
.note-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;flex-shrink:0;transition:color .15s}
.note-del:hover{color:#ef4444}
.panel-empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}

/* ── Reminders ── */
.reminders-panel{flex:1;display:flex;flex-direction:column;padding:12px;gap:12px;overflow-y:auto;min-height:0}
.reminder-form{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
.reminder-form label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.rem-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;width:100%}
.rem-input:focus{border-color:var(--accent)}
.add-reminder-btn{padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s}
.add-reminder-btn:hover{background:var(--accent-dark)}
.reminders-list{display:flex;flex-direction:column;gap:7px}
.reminder-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.reminder-card.done{opacity:.5}
.reminder-card.done .rem-text{text-decoration:line-through}
.rem-icon{font-size:20px}
.rem-body{flex:1;min-width:0}
.rem-text{font-size:14px;color:var(--text);font-weight:500}
.rem-time-label{font-size:12px;color:var(--muted);margin-top:2px}
.rem-countdown{font-size:12px;font-weight:600;color:var(--accent);margin-top:2px}
.rem-overdue{font-size:12px;font-weight:600;color:#ef4444;margin-top:2px}
.rem-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0;flex-shrink:0;transition:color .15s}
.rem-del:hover{color:#ef4444}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);color:var(--toast-text);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:1000;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px;padding:22px;width:100%;max-width:420px;box-shadow:var(--shadow);transition:background .25s;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-close:hover{color:var(--text)}
.modal label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.4px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.primary:hover{background:var(--accent-dark)}
.modal-btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.modal-btn.secondary:hover{background:var(--border)}
.modal-result{margin-top:14px;padding:12px;background:var(--bg);border-radius:10px;font-size:14px;color:var(--text);line-height:1.6;border:1px solid var(--border)}
.modal-result.loading{color:var(--muted);font-style:italic}

/* Weather */
.weather-card{display:flex;flex-direction:column;gap:10px}
.weather-main{display:flex;align-items:center;gap:12px}
.weather-icon{font-size:46px;line-height:1}
.weather-temp{font-size:40px;font-weight:700;color:var(--text);line-height:1}
.weather-desc{font-size:15px;color:var(--muted);margin-top:2px;text-transform:capitalize}
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.weather-detail{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;color:var(--muted)}
.weather-detail strong{display:block;font-size:18px;font-weight:700;color:var(--accent);margin-bottom:2px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <header>
    <div class="ada-dot">A</div>
    <div>
      <h1>Ada</h1>
      <p>Your AI Assistant</p>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" title="Weather lookup" onclick="openModal('weather')">🌤️</button>
      <button class="hdr-btn" title="Calculator" onclick="openModal('calc')">🧮</button>
      <button class="hdr-btn" title="Translator" onclick="openModal('translate')">🌐</button>
      <button class="hdr-btn" title="Toggle dark mode" onclick="toggleDark()" id="darkBtn">🌙</button>
      <label class="autoread-label" title="Auto-read responses aloud">
        <input type="checkbox" id="autoreadToggle"> 🔊
      </label>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('chat',this)">💬 Chat</button>
    <button class="tab" onclick="showTab('notes',this)">📝 Notes</button>
    <button class="tab" onclick="showTab('reminders',this)">⏱️ Reminders</button>
  </div>

  <!-- CHAT -->
  <div class="panel active" id="panel-chat">
    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <div class="big-dot">A</div>
        <h2>Hello, I'm Ada! 👋</h2>
        <p>Ask me anything — weather, math, translations, facts, code, or just chat.</p>
        <div class="quick-chips">
          <span class="chip" onclick="quickSend('What is the weather in London?')">🌤️ Weather</span>
          <span class="chip" onclick="quickSend('Calculate 15% of 240')">🧮 Math</span>
          <span class="chip" onclick="quickSend('Translate hello to French')">🌐 Translate</span>
          <span class="chip" onclick="quickSend('Write a Python hello world')">💻 Code</span>
          <span class="chip" onclick="quickSend('What is quantum computing?')">🔍 Fact</span>
          <span class="chip" onclick="quickSend('Tell me a fun fact')">✨ Fun fact</span>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="file-staging" id="fileStaging"></div>
      <div class="input-row">
        <button class="icon-btn" title="Attach file" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt">
        <button class="icon-btn" id="micBtn" title="Voice input" onclick="toggleMic()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <textarea id="msgInput" rows="1" placeholder="Message Ada…" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="send()" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="panel" id="panel-notes">
    <div class="notes-panel">
      <div class="notes-toolbar">
        <textarea id="noteInput" class="note-input-area" rows="3" placeholder="Write a note… (Ctrl+Enter to save)"></textarea>
        <button class="note-save-btn" onclick="saveNote()">Save</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </div>
  </div>

  <!-- REMINDERS -->
  <div class="panel" id="panel-reminders">
    <div class="reminders-panel">
      <div class="reminder-form">
        <div>
          <label>What to remind you</label>
          <input class="rem-input" type="text" id="remText" placeholder="e.g. Take a break, Call Alice…">
        </div>
        <div>
          <label>Date &amp; Time</label>
          <input class="rem-input" type="datetime-local" id="remTime">
        </div>
        <button class="add-reminder-btn" onclick="addReminder()">+ Set Reminder</button>
      </div>
      <div class="reminders-list" id="remindersList"></div>
    </div>
  </div>

</div><!-- .app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Weather Modal -->
<div class="modal-overlay" id="modal-weather">
  <div class="modal">
    <h3>🌤️ Weather <button class="modal-close" onclick="closeModal('weather')">×</button></h3>
    <label>City name</label>
    <input type="text" id="weatherCity" placeholder="e.g. London, Tokyo, New York" onkeydown="if(event.key==='Enter')fetchWeather()">
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="fetchWeather()">Get Weather</button>
      <button class="modal-btn secondary" onclick="closeModal('weather')">Cancel</button>
    </div>
    <div class="modal-result" id="weatherResult" style="display:none"></div>
  </div>
</div>

<!-- Calculator Modal -->
<div class="modal-overlay" id="modal-calc">
  <div class="modal">
    <h3>🧮 Calculator <button class="modal-close" onclick="closeModal('calc')">×</button></h3>
    <label>Expression</label>
    <input type="text" id="calcInput" placeholder="e.g. 2^10,  sqrt(144),  15% of 200,  sin(90)" onkeydown="if(event.key==='Enter')runCalc()">
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="runCalc()">Calculate</button>

<script>
/* ═══ State ═══ */
let selectedFiles=[], autoRead=false, isRecording=false, recognition=null, darkMode=false;
let notes=JSON.parse(localStorage.getItem('ada-notes')||'[]');
let reminders=JSON.parse(localStorage.getItem('ada-reminders')||'[]');
const KB_TOKEN='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';
const KB_REPO='TheAdaProject-ai/The-Ada-Project';
let knowledgeBase={};
const dictCache={}, wikiCache={}, bookCache={};
const EMOJIS=['👍','❤️','😂','😮','🎉','🔥'];
const LANG_NAMES={fr:'French',es:'Spanish',de:'German',it:'Italian',pt:'Portuguese',ja:'Japanese',zh:'Chinese',ru:'Russian',ar:'Arabic',ko:'Korean',nl:'Dutch',pl:'Polish',tr:'Turkish',hi:'Hindi',sv:'Swedish'};

/* ═══ Init ═══ */
document.getElementById('autoreadToggle').addEventListener('change',e=>autoRead=e.target.checked);
document.getElementById('fileInput').addEventListener('change',handleFiles);
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('noteInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)saveNote();});
const nowPl=new Date(Date.now()+30*60*1000);
document.getElementById('remTime').value=nowPl.toISOString().slice(0,16);
if(localStorage.getItem('ada-dark')==='1')toggleDark();
window.addEventListener('load',()=>{loadKnowledgeBase();renderNotes();renderReminders();});
setInterval(checkReminders,10000);
if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

/* ═══ Dark mode ═══ */
function toggleDark(){darkMode=!darkMode;document.documentElement.setAttribute('data-theme',darkMode?'dark':'');document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';localStorage.setItem('ada-dark',darkMode?'1':'0');}

/* ═══ Tabs ═══ */
function showTab(name,el){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+name).classList.add('active');el.classList.add('active');}

/* ═══ Helpers ═══ */
function quickSend(t){document.getElementById('msgInput').value=t;send();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openModal(n){document.getElementById('modal-'+n).classList.add('open');}
function closeModal(n){document.getElementById('modal-'+n).classList.remove('open');}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);}

/* ═══ Send ═══ */
async function send(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text&&selectedFiles.length===0)return;
  removeWelcome();
  if(text){appendMessage(text,'user');input.value='';input.style.height='auto';}
  const fts=[...selectedFiles];
  fts.forEach(f=>appendMessage(null,'user',f));
  selectedFiles=[];renderStaging();
  const tyEl=appendTyping();
  try{const reply=await generateResponse(text||'');tyEl.remove();appendMessage(reply,'ada');}
  catch(e){tyEl.remove();appendMessage("Sorry, something went wrong. Please try again.",'ada');}
}

function removeWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}

function appendTyping(){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className='msg ada';
  wrap.innerHTML='<div class="msg-avatar">A</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;return wrap;
}

function appendMessage(text,sender,file=null){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className=`msg ${sender}`;
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=sender==='ada'?'A':'U';
  const body=document.createElement('div');body.className='msg-body';

  if(text){
    const bubble=document.createElement('div');bubble.className='bubble';
    if(sender==='ada'){bubble.innerHTML=renderAdaText(text);}
    else{bubble.textContent=text;}
    body.appendChild(bubble);

    if(sender==='ada'){
      // Speak btn
      const btn=document.createElement('button');btn.className='speak-btn';
      btn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> Speak';
      btn.onclick=()=>speakText(bubble.innerText,btn);
      body.appendChild(btn);
      if(autoRead)setTimeout(()=>speakText(bubble.innerText,btn),400);

      // Emoji reaction bar
      const rbar=document.createElement('div');rbar.className='reaction-bar';
      const reactDiv=document.createElement('div');reactDiv.className='reactions';
      EMOJIS.forEach(emoji=>{
        const b=document.createElement('span');b.className='react-pick';b.textContent=emoji;b.title='React';
        b.onclick=()=>{
          const ex=reactDiv.querySelector(`[data-emoji="${emoji}"]`);
          if(ex){const c=parseInt(ex.dataset.count||1)+1;ex.textContent=emoji+(c>1?` ${c}`:'');ex.dataset.count=c;}
          else{const chip=document.createElement('span');chip.className='reaction-chip';chip.textContent=emoji;chip.dataset.emoji=emoji;chip.dataset.count=1;chip.onclick=()=>chip.remove();reactDiv.appendChild(chip);}
          rbar.style.opacity='0';
        };
        rbar.appendChild(b);
      });
      body.appendChild(rbar);
      body.appendChild(reactDiv);
    }
  }

  if(file){
    const fp=document.createElement('div');fp.className='file-preview-bubble';
    const icon=file.type.startsWith('image/')?'🖼️':file.type.startsWith('video/')?'🎬':file.type.startsWith('audio/')?'🎵':'📄';
    if(file.type.startsWith('image/')){const img=document.createElement('img');img.src=URL.createObjectURL(file);img.alt=file.name;fp.appendChild(img);}
    else if(file.type.startsWith('video/')){const v=document.createElement('video');v.src=URL.createObjectURL(file);v.controls=true;fp.appendChild(v);}
    else if(file.type.startsWith('audio/')){const a=document.createElement('audio');a.src=URL.createObjectURL(file);a.controls=true;a.style.maxWidth='200px';fp.appendChild(a);}
    const lbl=document.createElement('span');lbl.textContent=icon+' '+file.name;fp.appendChild(lbl);
    if(!text){const bubble=document.createElement('div');bubble.className='bubble';bubble.appendChild(fp);body.appendChild(bubble);}
    else body.querySelector('.bubble').appendChild(fp);
  }

  wrap.appendChild(avatar);wrap.appendChild(body);
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
}

function renderAdaText(text){
  return text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const l=lang||'code';
    const id='cb'+Math.random().toString(36).slice(2);
    return `<div class="code-block"><div class="code-lang">${escHtml(l)}</div><button class="copy-code" onclick="copyCode('${id}')">Copy</button><pre id="${id}">${escHtml(code.trim())}</pre></div>`;
  });
}
function copyCode(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Copied to clipboard!'));}

/* ═══ Files ═══ */
function handleFiles(e){for(const f of e.target.files)selectedFiles.push(f);renderStaging();e.target.value='';}
function renderStaging(){
  const area=document.getElementById('fileStaging');area.innerHTML='';
  selectedFiles.forEach((f,i)=>{
    const item=document.createElement('div');item.className='stage-item';
    const icon=f.type.startsWith('image/')?'🖼️':f.type.startsWith('video/')?'🎬':f.type.startsWith('audio/')?'🎵':'📄';
    if(f.type.startsWith('image/')){const img=document.createElement('img');img.src=URL.createObjectURL(f);item.appendChild(img);}
    else{const s=document.createElement('span');s.textContent=icon;s.style.fontSize='16px';item.appendChild(s);}
    const name=document.createElement('span');name.textContent=f.name.length>16?f.name.slice(0,14)+'…':f.name;item.appendChild(name);
    const rm=document.createElement('button');rm.className='stage-remove';rm.textContent='×';rm.onclick=()=>{selectedFiles.splice(i,1);renderStaging();};item.appendChild(rm);
    area.appendChild(item);
  });
}

/* ═══ Speech ═══ */
function speakText(text,btn){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g,'').trim());
  utt.rate=1;utt.pitch=1;
  const pref=window.speechSynthesis.getVoices().find(v=>/samantha|victoria|female|zira/i.test(v.name));
  if(pref)utt.voice=pref;
  utt.onstart=()=>btn.classList.add('speaking');
  utt.onend=utt.onerror=()=>btn.classList.remove('speaking');
  window.speechSynthesis.speak(utt);
}
function toggleMic(){if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window))return alert('Speech recognition requires Chrome or Edge.');isRecording?stopMic():startMic();}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onstart=()=>{isRecording=true;document.getElementById('micBtn').classList.add('recording');};
  recognition.onresult=e=>{const inp=document.getElementById('msgInput');let f='',im='';for(let i=e.resultIndex;i<e.results.length;i++)e.results[i].isFinal?f+=e.results[i][0].transcript:im+=e.results[i][0].transcript;inp.value=f||im;autoResize(inp);};
  recognition.onerror=recognition.onend=()=>stopMic();
  recognition.start();
}
function stopMic(){recognition&&recognition.stop();isRecording=false;document.getElementById('micBtn').classList.remove('recording');}

/* ═══ Weather ═══ */
function wIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';if(c<=49)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c<=82)return'🌦️';if(c<=86)return'🌨️';return'⛈️';}
function wDesc(c){if(c===0)return'Clear sky';if(c<=2)return'Partly cloudy';if(c<=3)return'Overcast';if(c<=49)return'Foggy';if(c<=59)return'Drizzle';if(c<=67)return'Rainy';if(c<=77)return'Snow';if(c<=82)return'Rain showers';if(c<=86)return'Snow showers';return'Thunderstorm';}

async function fetchWeather(){
  const city=document.getElementById('weatherCity').value.trim();if(!city)return;
  const res=document.getElementById('weatherResult');
  res.style.display='block';res.className='modal-result loading';res.textContent='Fetching weather…';
  try{
    const gR=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const gD=await gR.json();
    if(!gD.results?.length){res.className='modal-result';res.textContent='City not found.';return;}
    const{latitude:lat,longitude:lon,name,country}=gD.results[0];
    const wR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature&timezone=auto&forecast_days=1`);
    const wD=await wR.json();const cw=wD.current_weather;
    const hum=wD.hourly?.relativehumidity_2m?.[0]??'—';
    const feels=wD.hourly?.apparent_temperature?.[0]!=null?Math.round(wD.hourly.apparent_temperature[0]):'—';
    const temp=Math.round(cw.temperature),wind=Math.round(cw.windspeed);
    res.className='modal-result';
    res.innerHTML=`<div class="weather-card"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">📍 ${escHtml(name)}, ${escHtml(country)}</div><div class="weather-main"><span class="weather-icon">${wIcon(cw.weathercode)}</span><div><div class="weather-temp">${temp}°C</div><div class="weather-desc">${wDesc(cw.weathercode)}</div></div></div><div class="weather-grid"><div class="weather-detail"><strong>${feels}°C</strong>Feels like</div><div class="weather-detail"><strong>${hum}%</strong>Humidity</div><div class="weather-detail"><strong>${wind} km/h</strong>Wind</div><div class="weather-detail"><strong>${cw.is_day?'Day ☀️':'Night 🌙'}</strong>Time</div></div></div>`;
    removeWelcome();
    appendMessage(`🌤️ <strong>${escHtml(name)}, ${escHtml(country)}</strong><br>${wIcon(cw.weathercode)} ${temp}°C — ${wDesc(cw.weathercode)}<br>💨 Wind: ${wind} km/h &nbsp;💧 Humidity: ${hum}% &nbsp;🌡️ Feels like: ${feels}°C`,'ada');
    closeModal('weather');
  }catch(e){res.className='modal-result';res.textContent='Could not fetch weather. Try another city.';}
}

/* ═══ Calculator ═══ */
function runCalc(){
  const raw=document.getElementById('calcInput').value.trim();if(!raw)return;
  const res=document.getElementById('calcResult');res.style.display='block';res.className='modal-result';
  try{
    const result=safeCalc(raw);
    res.innerHTML=`<span style="font-size:22px;font-weight:700;color:var(--accent)">${escHtml(String(result))}</span><br><span style="color:var(--muted);font-size:13px">${escHtml(raw)}</span>`;
    removeWelcome();appendMessage(`🧮 <strong>${escHtml(raw)}</strong> = <strong style="color:var(--accent)">${escHtml(String(result))}</strong>`,'ada');closeModal('calc');
  }catch(e){res.innerHTML='⚠️ Could not evaluate. Try: <code>2^10</code>, <code>sqrt(144)</code>, <code>15% of 200</code>';}
}
function safeCalc(input){
  let e=input.toLowerCase().trim();
  const pct=e.match(/^([\d.]+)\s*%\s*of\s*([\d.]+)$/);if(pct)return parseFloat(pct[1])/100*parseFloat(pct[2]);
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs').replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan').replace(/\bpi\b/g,'Math.PI').replace(/\be\b/g,'Math.E').replace(/\blog\b/g,'Math.log10').replace(/\bln\b/g,'Math.log').replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil').replace(/\bround\b/g,'Math.round').replace(/\^/g,'**').replace(/×/g,'*').replace(/÷/g,'/').replace(/[^0-9+\-*/.(),%\sMathsqrtabcilognudEeP]/g,'');
  // eslint-disable-next-line no-new-func
  const r=Function('"use strict";return('+e+')')();
  if(typeof r!=='number'||!isFinite(r))throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}

/* ═══ Translator ═══ */
async function runTranslate(){
  const text=document.getElementById('translateInput').value.trim();
  const lang=document.getElementById('translateLang').value;if(!text)return;
  const res=document.getElementById('translateResult');res.style.display='block';res.className='modal-result loading';res.textContent='Translating…';
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${lang}`);
    const d=await r.json();const t=d.responseData?.translatedText;
    if(!t||d.responseStatus!==200)throw new Error('fail');
    res.className='modal-result';res.innerHTML=`<strong>${LANG_NAMES[lang]||lang}:</strong><br><br>${escHtml(t)}`;
    removeWelcome();appendMessage(`🌐 <strong>${LANG_NAMES[lang]||lang}:</strong> ${escHtml(t)}`,'ada');closeModal('translate');
  }catch(e){res.className='modal-result';res.textContent='Translation failed. Please try again.';}
}

/* ═══ Notes ═══ */
function saveNote(){
  const input=document.getElementById('noteInput');const text=input.value.trim();if(!text)return;
  notes.unshift({id:Date.now(),text,date:new Date().toLocaleString()});
  localStorage.setItem('ada-notes',JSON.stringify(notes));input.value='';renderNotes();toast('📝 Note saved!');
}
function deleteNote(id){notes=notes.filter(n=>n.id!==id);localStorage.setItem('ada-notes',JSON.stringify(notes));renderNotes();}
function renderNotes(){
  const list=document.getElementById('notesList');if(!list)return;
  if(!notes.length){list.innerHTML='<div class="panel-empty">No notes yet. Write something above!</div>';return;}
  list.innerHTML=notes.map(n=>`<div class="note-card"><div style="flex:1"><div class="note-text">${escHtml(n.text)}</div><div class="note-meta">${n.date}</div></div><button class="note-del" onclick="deleteNote(${n.id})" title="Delete">×</button></div>`).join('');
}

/* ═══ Reminders ═══ */
function addReminder(){
  const text=document.getElementById('remText').value.trim();
  const time=document.getElementById('remTime').value;
  if(!text||!time){toast('⚠️ Please fill in all fields');return;}
  const ts=new Date(time).getTime();
  if(ts<=Date.now()){toast('⚠️ Please pick a future time');return;}
  reminders.push({id:Date.now(),text,time:ts,done:false});
  localStorage.setItem('ada-reminders',JSON.stringify(reminders));
  document.getElementById('remText').value='';renderReminders();toast('⏰ Reminder set!');
}
function deleteReminder(id){reminders=reminders.filter(r=>r.id!==id);localStorage.setItem('ada-reminders',JSON.stringify(reminders));renderReminders();}
function checkReminders(){
  const now=Date.now();
  reminders.forEach(r=>{
    if(!r.done&&r.time<=now){
      r.done=true;toast('⏰ '+r.text);
      removeWelcome();appendMessage(`⏰ <strong>Reminder:</strong> ${escHtml(r.text)}`,'ada');
      if(Notification.permission==='granted')new Notification('Ada Reminder',{body:r.text});
    }
  });
  localStorage.setItem('ada-reminders',JSON.stringify(reminders));renderReminders();
}
function renderReminders(){
  const list=document.getElementById('remindersList');if(!list)return;
  const sorted=[...reminders].sort((a,b)=>a.time-b.time);
  if(!sorted.length){list.innerHTML='<div class="panel-empty">No reminders set.</div>';return;}
  const now=Date.now();
  list.innerHTML=sorted.map(r=>{
    const dt=new Date(r.time);const diff=r.time-now;
    const cd=r.done?'':(diff>0?`<div class="rem-countdown">${fmtCD(diff)}</div>`:`<div class="rem-overdue">Overdue</div>`);
    return `<div class="reminder-card ${r.done?'done':''}"><span class="rem-icon">${r.done?'✅':'⏰'}</span><div class="rem-body"><div class="rem-text">${escHtml(r.text)}</div><div class="rem-time-label">${dt.toLocaleString()}</div>${cd}</div><button class="rem-del" onclick="deleteReminder(${r.id})" title="Delete">×</button></div>`;
  }).join('');
}
function fmtCD(ms){const s=Math.floor(ms/1000);if(s<60)return`in ${s}s`;const m=Math.floor(s/60);if(m<60)return`in ${m}m`;const h=Math.floor(m/60);if(h<24)return`in ${h}h ${m%60}m`;return`in ${Math.floor(h/24)}d ${h%24}h`;}

/* ═══ Knowledge Base ═══ */
async function loadKnowledgeBase(){
  try{
    const[owner,repo]=KB_REPO.split('/');
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/Basic-knowledge/`,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)return;const files=await res.json();
    for(const f of files){if(f.type==='file'&&/\.(md|txt|json)$/.test(f.name)){const r=await fetch(f.download_url||f.url);if(r.ok)knowledgeBase[f.name]=await r.text();}}
  }catch(_){}
}

/* ═══ APIs ═══ */
async function fetchWikiSummary(topic){if(wikiCache[topic])return wikiCache[topic];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);if(r.ok){const d=await r.json();if(d?.extract){wikiCache[topic]=d;return d;}}}catch(_){}return null;}
async function searchWikipedia(q){if(q.length<3)return null;try{const r=await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(q)}&limit=5&namespace=0&format=json&origin=*`);if(r.ok){const d=await r.json();if(d?.[1]?.length){const title=d[1][0];const match=q.split(' ').some(p=>p.length>3&&title.toLowerCase().includes(p))||title.toLowerCase().includes(q);if(match)return{title,url:d[3][0]};}}}catch(_){}return null;}
async function searchDDG(q){try{const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=0`);if(r.ok){const d=await r.json();if(d.Abstract)return{title:d.Heading||q,extract:d.Abstract};if(d.RelatedTopics?.length){const t=d.RelatedTopics[0];if(t.Text&&t.FirstURL)return{title:q,extract:t.Text};}}}catch(_){}return null;}
async function fetchBooks(q){if(bookCache[q])return bookCache[q];try{const r=await fetch(`https://gutendex.com/books?search=${encodeURIComponent(q)}`);if(r.ok){const d=await r.json();if(d.results?.length){bookCache[q]=d.results;return d.results;}}}catch(_){}return null;}
async function fetchWord(word){if(dictCache[word])return dictCache[word];try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);if(r.ok){const d=await r.json();dictCache[word]=d;return d;}}catch(_){}return null;}
function getDefinition(data){return data?.[0]?.meanings?.[0]?.definitions?.[0]?.definition||null;}

/* ═══ New APIs ═══ */
async function fetchCountry(name){try{const r=await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(name)}`);if(r.ok){const d=await r.json();if(d?.length)return d[0];}}catch(_){}return null;}
async function fetchNASA(query){try{const r=await fetch(`https://images-api.nasa.gov/search?q=${encodeURIComponent(query)}&media_type=image`);if(r.ok){const d=await r.json();if(d?.collection?.items?.length)return d.collection.items.slice(0,3);}}catch(_){}return null;}
async function fetchSpaceX(){try{const r=await fetch('https://api.spacexdata.com/v4/launches/upcoming');if(r.ok){const d=await r.json();if(d?.length)return d.slice(0,3);}}catch(_){}return null;}
async function fetchCrypto(coin){try{const r=await fetch(`https://api.coingecko.com/api/v3/coins/${encodeURIComponent(coin)}`);if(r.ok){const d=await r.json();return d;}}catch(_){}return null;}
async function fetchReddit(subreddit){try{const r=await fetch(`https://www.reddit.com/r/${encodeURIComponent(subreddit)}/hot.json`);if(r.ok){const d=await r.json();if(d?.data?.children?.length)return d.data.children.slice(0,3);}}catch(_){}return null;}

/* ═══ Typos ═══ */
const TYPOS={"helo":"hello","heloo":"hello","hii":"hi","thnks":"thanks","thankyou":"thank you","thank u":"thank you","thx":"thanks","ty":"thank you","plz":"please","pls":"please","wats":"what's","wat":"what","wut":"what","hw":"how","u":"you","ur":"your","ya":"you","yea":"yeah","gud":"good","gd":"good","gr8":"great","awsum":"awesome","sory":"sorry","srry":"sorry","cant":"can't","dont":"don't","didnt":"didn't","doesnt":"doesn't","isnt":"isn't","teh":"the","taht":"that","adn":"and","becuase":"because","becuse":"because","knwo":"know","konw":"know","im":"i'm"};
function correctTypos(text){let o=text;for(const[t,c]of Object.entries(TYPOS))o=o.replace(new RegExp(`\\b${t.replace(/'/g,"\\'")}\\b`,'gi'),c);return o;}

/* ═══ Generate response ═══ */
async function generateResponse(raw){
  if(!raw.trim())return"I didn't catch that. Could you say it again?";
  let msg=correctTypos(raw.toLowerCase().trim());

  // Fun facts
  if(msg.includes('fun fact')||msg.includes('random fact')||msg.includes('tell me a fact')||msg.includes('surprise me'))return pick(FUN_FACTS);

  // Weather in chat
  const wMatch=msg.match(/weather\s+(?:in|for|at)?\s*(.+)/);
  if(wMatch){
    const city=wMatch[1].replace(/[?.!]/g,'').trim();
    if(city.length>1){
      try{
        const gR=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
        const gD=await gR.json();
        if(gD.results?.length){
          const{latitude:lat,longitude:lon,name,country}=gD.results[0];
          const wR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m&timezone=auto&forecast_days=1`);
          const wD=await wR.json();const cw=wD.current_weather;
          const hum=wD.hourly?.relativehumidity_2m?.[0]??'—';
          return`🌤️ <strong>${escHtml(name)}, ${escHtml(country)}</strong><br>${wIcon(cw.weathercode)} ${Math.round(cw.temperature)}°C — ${wDesc(cw.weathercode)}<br>💨 Wind: ${Math.round(cw.windspeed)} km/h &nbsp;💧 Humidity: ${hum}%`;
        }
      }catch(_){}
    }
  }

  // Calculator in chat
  const calcPats=[/(?:calculate|compute|what(?:'s|\s+is)\s+(?:the\s+result\s+of\s+)?)([\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)/i,/^([\d][\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)\s*=?\s*\??$/i,/([\d.]+\s*%\s*of\s*[\d.]+)/i];
  for(const pat of calcPats){const m=msg.match(pat);if(m){try{const result=safeCalc(m[1]);return`🧮 <strong>${escHtml(m[1].trim())}</strong> = <strong style="color:var(--accent)">${escHtml(String(result))}</strong>`;}catch(_){}}}

  // Translation in chat
  const tMatch=msg.match(/translate\s+"?(.+?)"?\s+(?:to|into)\s+(\w+)/i);
  if(tMatch){
    const tText=tMatch[1].trim();const tLang=tMatch[2].toLowerCase();
    const lMap={french:'fr',spanish:'es',german:'de',italian:'it',portuguese:'pt',japanese:'ja',chinese:'zh',russian:'ru',arabic:'ar',korean:'ko',dutch:'nl',polish:'pl',turkish:'tr',hindi:'hi',swedish:'sv'};
    const code=lMap[tLang];
    if(code){try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(tText)}&langpair=en|${code}`);const d=await r.json();const t=d.responseData?.translatedText;if(t&&d.responseStatus===200)return`🌐 <strong>${LANG_NAMES[code]||tLang}:</strong> ${escHtml(t)}`;}catch(_){}}
  }

  // Greetings
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k}\\b`,'i');if(re.test(msg)&&msg.replace(re,'').trim().length<5)return pick(arr);}

  // Personal
  for(const[k,arr]of Object.entries(PERSONAL)){if(msg.includes(k))return pick(arr);}

  // Code snippets — match exact key or "write/show X in Y" patterns
  for(const[key,code]of Object.entries(CODE_SNIPPETS)){
    const kParts=key.split(' ');
    if(kParts.every(p=>msg.includes(p)))return`💻 Here's a ${escHtml(key)} example:<br><br>${code}`;
  }
  if(msg.includes('code')||msg.includes('write a')||msg.includes('show me')||msg.includes('example')){
    const langs={python:'python',javascript:'javascript',js:'javascript',java:'java','c++':'cpp',html:'html',css:'css'};
    for(const[k,v]of Object.entries(langs)){
      if(msg.includes(k)){
        const starters={python:'```python\n# Your Python code here\ndef main():\n    print("Hello from Python!")\n\nif __name__ == "__main__":\n    main()\n```',javascript:'```javascript\n// Your JavaScript code here\nfunction main() {\n  console.log("Hello from JavaScript!");\n}\nmain();\n```',html:'```html\n<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>My Page</title>\n</head>\n<body>\n  <h1>Hello World!</h1>\n</body>\n</html>\n```',css:'```css\nbody {\n  font-family: sans-serif;\n  background: #f4f5f7;\n  color: #1a1c22;\n  margin: 0;\n  padding: 20px;\n}\n```'};
        return starters[v]?`💻 Here's a ${v} starter:<br><br>${starters[v]}`:`💻 I can help with ${v} code! What should it do?`;
      }
    }
    return`💻 I can help with code! Which language? (Python, JavaScript, Java, HTML, CSS…)`;
  }

  // Knowledge base
  if(Object.keys(knowledgeBase).length>0){const words=msg.split(' ').filter(w=>w.length>3);for(const word of words){for(const[,content]of Object.entries(knowledgeBase)){if(content.toLowerCase().includes(word)){const idx=content.toLowerCase().indexOf(word);const snip=content.substring(Math.max(0,idx-80),idx+200).trim();if(snip.length>30)return`📚 From my knowledge base:<br><br>${escHtml(snip)}`;}}}}

  // Books
  if(/\b(book|books|novel|author)\b/.test(msg)){const q=msg.replace(/\b(book|books|novel|author)\b/gi,'').trim();if(q.length>2){const books=await fetchBooks(q);if(books?.length){const b=books[0],title=b.title||'Unknown',author=b.authors?.[0]?.name||'Unknown',dl=b.download_count?.toLocaleString()||'0',subs=b.subjects?.slice(0,3).join(', ')||'';return`📖 <strong>${escHtml(title)}</strong><br>by ${escHtml(author)}<br><br><strong>Downloads:</strong> ${dl} (Project Gutenberg)<br>${subs?`<strong>Subjects:</strong> ${escHtml(subs)}<br>`:''}<br>Anything else you'd like to know?`;}}}

  // Countries
  if(msg.includes('population of')||msg.includes('flag of')||msg.includes('capital of')||msg.includes('country')||msg.includes('population')||msg.includes('flag')){let country=msg.replace(/\b(population of|flag of|capital of|country|population|flag|the|a|an|in|of|for|about|what is|what's|show me|tell me)\b/gi,'').trim();if(country.length>2){const c=await fetchCountry(country);if(c){const name=c.name?.common||country;const pop=c.population?.toLocaleString()||'Unknown';const cap=c.capital||'Unknown';const region=c.region||'Unknown';const flag=c.flags?.svg||'';let resp=`🌍 <strong>${escHtml(name)}</strong><br>`;if(msg.includes('population'))resp+=`• <strong>Population:</strong> ${pop}<br>`;if(msg.includes('flag'))resp+=`• <strong>Flag:</strong> ${flag?'🏳':'Not available'}<br>`;if(msg.includes('capital'))resp+=`• <strong>Capital:</strong> ${escHtml(cap)}<br>`;if(!msg.includes('population')&&!msg.includes('flag')&&!msg.includes('capital'))resp+=`• <strong>Population:</strong> ${pop}<br>• <strong>Capital:</strong> ${escHtml(cap)}<br>• <strong>Region:</strong> ${escHtml(region)}<br>`;resp+=`Anything else about ${escHtml(name)}?`;return resp;}}}

  // NASA
  if(msg.includes('nasa')||msg.includes('space')||msg.includes('astronomy')||msg.includes('galaxy')||msg.includes('planet')){const query=msg.replace(/\b(nasa|space|astronomy|galaxy|planet|show me|tell me|about|images|photos|pictures)\b/gi,' ').trim();const results=await fetchNASA(query||'universe');if(results){let resp=`🚀 <strong>NASA Images</strong><br><br>`;results.forEach(r=>{const title=r.data?.[0]?.title||'No title';const desc=r.data?.[0]?.description?.substring(0,100)||'No description';resp+=`• <strong>${escHtml(title)}</strong><br>&nbsp;&nbsp;${escHtml(desc)}...<br>`;});return resp;}}

  // SpaceX
  if(msg.includes('spacex')||msg.includes('launch')||msg.includes('rocket')){const launches=await fetchSpaceX();if(launches){let resp=`🚀 <strong>Upcoming SpaceX Launches</strong><br><br>`;launches.forEach(l=>{const name=l.name||'Unknown mission';const date=l.date_local?new Date(l.date_local).toLocaleDateString():'TBD';resp+=`• <strong>${escHtml(name)}</strong><br>&nbsp;&nbsp;📅 ${date}<br>`;});return resp;}}

  // Crypto
  if(msg.includes('bitcoin')||msg.includes('btc')||msg.includes('ethereum')||msg.includes('eth')||msg.includes('crypto')||msg.includes('price')){let coin='bitcoin';if(msg.includes('ethereum')||msg.includes('eth'))coin='ethereum';else if(msg.includes('doge'))coin='dogecoin';const data=await fetchCrypto(coin);if(data){const name=data.name||coin;const price=data.market_data?.current_price?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD'})||'Unknown';const change=data.market_data?.price_change_percentage_24h?.toFixed(2)||'0';return`💰 <strong>${escHtml(name)}</strong><br>• <strong>Price:</strong> ${price}<br>• <strong>24h Change:</strong> ${change}%`;}}

  // Reddit
  if(msg.includes('reddit')||msg.includes('r/')){let sub=msg.replace(/\b(reddit|r\/|show me|tell me|about|posts|from)\b/gi,'').trim()||'programming';const posts=await fetchReddit(sub);if(posts){let resp=`📱 <strong>r/${escHtml(sub)} - Hot Posts</strong><br><br>`;posts.forEach(p=>{const title=p.data?.title||'No title';const score=p.data?.score||0;resp+=`• <strong>${escHtml(title)}</strong> (${score}↑)<br>`;});return resp;}}

  // Wikipedia
  const Q_PATS=['what is','what are','what was','what were','who is','who are','who was','who were','where is','where are','where was','where were','when is','when was','why is','why was','how is','how was','tell me about','explain','describe','define'];
  if(Q_PATS.some(p=>msg.includes(p))){
    let topic=msg;for(const p of Q_PATS){if(msg.includes(p)){topic=msg.replace(p,'').trim();break;}}
    topic=topic.replace(/[?!.]/g,'').replace(/^(the |a |an )/i,'').trim();topic=correctTypos(topic);
    for(const[k,v]of Object.entries(ASTRONOMY)){if(topic.includes(k)){topic=v;break;}}
    if(topic.length>2){
      let wiki=await fetchWikiSummary(topic);
      if(!wiki){const sr=await searchWikipedia(topic);if(sr?.title)wiki=await fetchWikiSummary(sr.title);}
      if(!wiki){const ddg=await searchDDG(topic);if(ddg)wiki={extract:ddg.extract,title:ddg.title};}
      if(wiki?.extract)return formatWiki(wiki.extract);
    }
  }

  // Dictionary fallback
  const COMMON=new Set(['hi','hey','hello','how','what','why','when','where','lol','ok','okay','yes','no','thanks','thank','please','are','you','doing','can','help','the','a','an','is','was','were','been','have','has','had','do','does','did','will','would','could','should','may','might','must','to','for','of','in','on','at','by','with','from','about','tell','just','very','too','also','some','more','then','than','only','not','but','and','or','so','if','its','it','this','that','me','my','your','book','books','novel','author','find','search','look','get','give','make','take','come','go','see','know','think','want','need','use','work','time','year','people','way','day','thing','good','new','first','last','long','great','little','own','other','old','right','big','high','different','small','large','next','early','young','important','public','bad','same','able']);
  const words=msg.split(/\s+/).filter(w=>w.length>2&&!COMMON.has(w.replace(/[^a-z]/g,'')));
  if(words.length){const w=words[Math.floor(Math.random()*words.length)].replace(/[^a-z]/g,'');const data=await fetchWord(w);const def=getDefinition(data);if(def&&def.length>20)return`📖 <strong>${escHtml(w)}:</strong> ${escHtml(def)}`;}

  return pick(["I'm not sure I understand. Could you rephrase that? 🤔","That's interesting — could you give me more context?","I can help with weather 🌤️, math 🧮, translations 🌐, facts, code 💻, notes 📝, and reminders ⏰. What do you need?","Could you be more specific? I'd love to help! 😊"]);
}

function formatWiki(extract){
  const abbrs=['U.S.','U.K.','Dr.','Mr.','Mrs.','Ms.','Prof.','Sr.','Jr.','St.','Ave.','etc.','e.g.','i.e.'];
  let tmp=extract;const ph={};
  abbrs.forEach((a,i)=>{const k=`__A${i}__`;ph[k]=a;tmp=tmp.replace(new RegExp(a.replace(/\./g,'\\.'),'g'),k);});
  let sentences=(tmp.match(/[^.!?]+[.!?]+/g)||[tmp]).map(s=>{for(const[k,v]of Object.entries(ph))s=s.replace(new RegExp(k,'g'),v);return s.trim();}).filter(Boolean);
  if(!sentences.length)return escHtml(extract);
  let out=`<strong>${escHtml(sentences[0])}</strong>`;
  if(sentences.length>1){out+='<br><br>';for(let i=1;i<Math.min(sentences.length,6);i++)out+=`• ${escHtml(sentences[i])}<br>`;}
  out+=`<br>${pick(["Let me know if you need more info.","Anything else you'd like to know?","Hope that helps! 😊"])}`;
  return out;
}
