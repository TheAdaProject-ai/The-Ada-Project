<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada - AI Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .message.ada .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .avatar {
            background: #28a745;
            margin-right: 0;
            margin-left: 10px;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .welcome-message {
            text-align: center;
            color: #6c757d;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            margin-bottom: 10px;
            color: #495057;
        }

        .attach-button {
            background: #6c757d;
            padding: 12px 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attach-button:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .attach-button svg {
            width: 20px;
            height: 20px;
        }

        #fileInput {
            display: none;
        }

        .file-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .file-preview img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
        }

        .file-preview video {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
        }

        .file-preview audio {
            width: 100%;
            max-width: 300px;
            margin-top: 8px;
            display: block;
            height: 40px;
        }

        .message.user .file-preview audio {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px;
        }

        .message.ada .file-preview audio {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 8px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin-top: 8px;
        }

        .file-icon {
            font-size: 24px;
        }

        .file-preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0;
        }

        .preview-item {
            position: relative;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .preview-item video {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .preview-item audio {
            width: 150px;
            height: 40px;
        }

        .preview-item .file-name {
            font-size: 12px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preview-item .remove-file {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            padding: 0;
        }

        .preview-item .remove-file:hover {
            background: #c82333;
        }

        .speaker-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #667eea;
            transition: background 0.2s;
            margin-left: 8px;
        }

        .speaker-button:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .speaker-button.speaking {
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }

        .speaker-button svg {
            width: 16px;
            height: 16px;
        }

        .mic-button {
            background: #6c757d;
            padding: 12px 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mic-button.recording {
            background: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .mic-button svg {
            width: 20px;
            height: 20px;
        }

        .autoread-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #495057;
        }

        .autoread-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .autoread-toggle label {
            cursor: pointer;
            user-select: none;
        }

        .knowledge-config {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .knowledge-config h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #495057;
        }

        .knowledge-input {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .knowledge-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .knowledge-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .knowledge-status {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 8px;
        }

        .knowledge-status.loaded {
            color: #28a745;
        }

        .knowledge-config {
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="container">
            <div class="header">
                <h1>Ada</h1>
                <p>Your AI Assistant</p>
            </div>
            <div class="chat-area" id="chatArea">
                <div class="welcome-message">
                    <h2>Hello! I'm Ada</h2>
                    <p>I'm here to help you. Feel free to ask me anything!</p>
                </div>
            </div>
            <div class="input-area">
                <div class="knowledge-config">
                    <h3>Knowledge Base Configuration</h3>
                    <div class="knowledge-input">
                        <input type="text" id="knowledgeToken" placeholder="GitHub Personal Access Token">
                        <button onclick="setKnowledgeToken()">Set Token</button>
                    </div>
                    <div class="knowledge-input">
                        <input type="text" id="knowledgeRepo" placeholder="owner/repo (e.g., username/knowledge-base)">
                        <button onclick="loadKnowledgeBase()">Load Knowledge</button>
                    </div>
                    <div class="knowledge-status" id="knowledgeStatus">No knowledge base loaded</div>
                </div>
                <div class="file-preview-area" id="filePreviewArea"></div>
                <div class="autoread-toggle">
                    <input type="checkbox" id="autoreadCheckbox">
                    <label for="autoreadCheckbox">Auto-read Ada's messages</label>
                </div>
                <div class="input-container">
                    <button class="attach-button" onclick="document.getElementById('fileInput').click()" title="Attach file">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                    </button>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.zip,.rar" onchange="handleFileUpload(event)">
                    <button class="mic-button" id="micButton" onclick="toggleSpeechRecognition()" title="Speak to type">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                    <input type="text" id="userInput" placeholder="Type your message here...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let autoReadEnabled = false;
        let knowledgeToken = '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';
        let knowledgeRepo = 'TheAdaProject-ai/The-Ada-Project';
        let knowledgeBase = {};
        let dictionary = {};
        let knowledgeLoaded = false;

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (message || selectedFiles.length > 0) {
                // Send text message if present
                if (message) {
                    addMessage(message, 'user');
                    input.value = '';
                }
                
                // Send files if present
                if (selectedFiles.length > 0) {
                    for (let i = 0; i < selectedFiles.length; i++) {
                        addMessage(null, 'user', selectedFiles[i]);
                    }
                    selectedFiles = [];
                    updateFilePreview();
                }
                
                        // Generate Ada's response using knowledge base
                setTimeout(() => {
                    const response = generateResponse(message);
                    addMessage(response, 'ada');
                }, 1000);
            }
        }

        function addMessage(text, sender, file = null) {
            const chatArea = document.getElementById('chatArea');
            const welcomeMessage = chatArea.querySelector('.welcome-message');
            
            if (welcomeMessage) {
                welcomeMessage.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = sender === 'ada' ? 'A' : 'U';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            // Process Ada's messages for code modifications
            let processedText = text;
            let codeModification = null;
            
            if (sender === 'ada' && text) {
                // Check for code modification format: ```filename:code```
                const codeBlockRegex = /```(\w+):([\s\S]*?)```/g;
                const matches = [...text.matchAll(codeBlockRegex)];
                
                if (matches.length > 0) {
                    // Extract code modifications
                    matches.forEach(match => {
                        const fileName = match[1];
                        const codeContent = match[2].trim();
                        
                        // Update or create file
                        codeFiles[fileName] = codeContent;
                        
                        // If this is the current file, update the editor
                        if (fileName === currentFile) {
                            document.getElementById('codeEditor').value = codeContent;
                        }
                        
                        updateFileList();
                    });
                    
                    // Remove code blocks from the displayed message
                    processedText = text.replace(codeBlockRegex, '[Code updated in editor]');
                }
            }
            
            if (processedText) {
                const textSpan = document.createElement('span');
                textSpan.textContent = processedText;
                content.appendChild(textSpan);
            } else if (file) {
                // If no text but file is present, add a label
                const labelSpan = document.createElement('span');
                labelSpan.textContent = 'Sent a file:';
                labelSpan.style.display = 'block';
                labelSpan.style.marginBottom = '4px';
                content.appendChild(labelSpan);
            }
            
            if (file) {
                const filePreview = document.createElement('div');
                filePreview.className = 'file-preview';
                
                // Always show file name
                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                
                let icon = '📄';
                if (file.type && file.type.startsWith('image/')) icon = '🖼️';
                else if (file.type && file.type.startsWith('video/')) icon = '🎬';
                else if (file.type && file.type.startsWith('audio/')) icon = '🎵';
                else if (file.name.match(/\.(mp3|wav|ogg|m4a|flac)$/i)) icon = '🎵';
                
                fileInfo.innerHTML = `<span class="file-icon">${icon}</span><span>${file.name}</span>`;
                filePreview.appendChild(fileInfo);
                
                // Add media preview based on type
                if (file.type && file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.style.marginTop = '8px';
                    filePreview.appendChild(img);
                } else if (file.type && file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = URL.createObjectURL(file);
                    video.controls = true;
                    video.style.marginTop = '8px';
                    filePreview.appendChild(video);
                } else if (file.type && file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|ogg|m4a|flac)$/i)) {
                    const audioWrapper = document.createElement('div');
                    audioWrapper.style.width = '300px';
                    audioWrapper.style.marginTop = '8px';
                    audioWrapper.style.padding = '8px';
                    audioWrapper.style.background = 'rgba(0,0,0,0.1)';
                    audioWrapper.style.borderRadius = '8px';
                    audioWrapper.style.border = '1px solid rgba(0,0,0,0.2)';
                    
                    const audio = document.createElement('audio');
                    audio.src = URL.createObjectURL(file);
                    audio.controls = true;
                    audio.style.width = '100%';
                    audio.style.height = '40px';
                    audio.style.minHeight = '40px';
                    audio.style.display = 'block';
                    
                    audio.onerror = function() {
                        audio.style.display = 'none';
                        const errorMsg = document.createElement('div');
                        errorMsg.textContent = 'Audio could not be played';
                        errorMsg.style.color = 'red';
                        errorMsg.style.fontSize = '12px';
                        audioWrapper.appendChild(errorMsg);
                    };
                    
                    audioWrapper.appendChild(audio);
                    filePreview.appendChild(audioWrapper);
                }
                
                content.appendChild(filePreview);
            }
            
            if (sender === 'ada') {
                messageDiv.appendChild(content);
                
                // Add speaker button for Ada's messages
                if (processedText) {
                    const speakerBtn = document.createElement('button');
                    speakerBtn.className = 'speaker-button';
                    speakerBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>`;
                    speakerBtn.onclick = () => speakText(processedText, speakerBtn);
                    messageDiv.appendChild(speakerBtn);
                    
                    // Auto-read if enabled
                    if (autoReadEnabled) {
                        setTimeout(() => speakText(processedText, speakerBtn), 500);
                    }
                }
            } else {
                messageDiv.appendChild(content);
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            if (files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    selectedFiles.push(files[i]);
                }
                updateFilePreview();
            }
            
            // Reset file input
            event.target.value = '';
        }

        function updateFilePreview() {
            const previewArea = document.getElementById('filePreviewArea');
            previewArea.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    previewItem.appendChild(img);
                } else if (file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = URL.createObjectURL(file);
                    previewItem.appendChild(video);
                } else if (file.type.startsWith('audio/')) {
                    const audio = document.createElement('audio');
                    audio.src = URL.createObjectURL(file);
                    audio.controls = true;
                    previewItem.appendChild(audio);
                } else {
                    const icon = document.createElement('span');
                    icon.className = 'file-icon';
                    icon.textContent = '📄';
                    previewItem.appendChild(icon);
                }
                
                const fileName = document.createElement('span');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                previewItem.appendChild(fileName);
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-file';
                removeBtn.textContent = '×';
                removeBtn.onclick = () => {
                    selectedFiles.splice(index, 1);
                    updateFilePreview();
                };
                previewItem.appendChild(removeBtn);
                
                previewArea.appendChild(previewItem);
            });
        }

        function speakText(text, button) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                // Try to use a female voice for Ada
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(voice => voice.name.includes('female') || voice.name.includes('Female') || voice.name.includes('Samantha') || voice.name.includes('Victoria'));
                if (femaleVoice) {
                    utterance.voice = femaleVoice;
                }
                
                utterance.onstart = () => {
                    button.classList.add('speaking');
                };
                
                utterance.onend = () => {
                    button.classList.remove('speaking');
                };
                
                utterance.onerror = () => {
                    button.classList.remove('speaking');
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Text-to-speech is not supported in your browser.');
            }
        }

        // Load voices when they become available
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // Speech Recognition
        let recognition = null;
        let isRecording = false;

        function toggleSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Speech recognition is not supported in your browser. Please use Chrome or Edge.');
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('micButton').classList.add('recording');
            };

            recognition.onresult = (event) => {
                const input = document.getElementById('userInput');
                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    input.value = finalTranscript;
                } else if (interimTranscript) {
                    input.value = interimTranscript;
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopRecording();
            };

            recognition.onend = () => {
                stopRecording();
            };

            recognition.start();
        }

        function stopRecording() {
            if (recognition) {
                recognition.stop();
            }
            isRecording = false;
            document.getElementById('micButton').classList.remove('recording');
        }

        // Auto-read toggle
        document.getElementById('autoreadCheckbox').addEventListener('change', function(e) {
            autoReadEnabled = e.target.checked;
        });

        // Knowledge Base Functions
        function setKnowledgeToken() {
            const tokenInput = document.getElementById('knowledgeToken');
            if (tokenInput.value.trim()) {
                knowledgeToken = tokenInput.value.trim();
                document.getElementById('knowledgeStatus').textContent = 'Token set! Now load knowledge base.';
                tokenInput.value = '';
            } else {
                alert('Please enter a valid GitHub token');
            }
        }

        async function loadKnowledgeBase() {
            // Use pre-configured variables instead of input fields
            console.log('Loading knowledge base...');
            console.log('Repo:', knowledgeRepo);
            
            if (!knowledgeToken) {
                console.error('No GitHub token configured');
                return;
            }
            
            if (!knowledgeRepo) {
                console.error('No GitHub repository configured');
                return;
            }
            
            const status = document.getElementById('knowledgeStatus');
            if (status) {
                status.textContent = 'Loading knowledge base...';
            }
            
            try {
                const [owner, repoName] = knowledgeRepo.split('/');
                console.log(`Fetching from: ${owner}/${repoName}/Basic-knowledge/`);
                
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/contents/Basic-knowledge/`, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('GitHub API error:', errorText);
                    throw new Error(`Failed to fetch repository files: ${response.status}`);
                }
                
                const files = await response.json();
                console.log('Files found:', files.length);
                knowledgeBase = {};
                
                for (const file of files) {
                    console.log('Processing file:', file.name);
                    if (file.type === 'file' && (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.name.endsWith('.json'))) {
                        const fileResponse = await fetch(file.url, {
                            headers: {
                                'Accept': 'application/vnd.github.v3+raw'
                            }
                        });
                        
                        if (fileResponse.ok) {
                            const content = await fileResponse.text();
                            knowledgeBase[file.name] = content;
                            console.log('Loaded:', file.name, 'Size:', content.length);
                            
                            // Parse dictionary-common.txt
                            if (file.name === 'dictionary-common.txt') {
                                try {
                                    dictionary = parseOxfordDictionary(content);
                                    console.log('Dictionary loaded with', Object.keys(dictionary).length, 'entries');
                                } catch (error) {
                                    console.error('Error parsing dictionary:', error);
                                }
                            }
                        } else {
                            console.error('Failed to load file:', file.name);
                        }
                    }
                }
                
                knowledgeLoaded = true;
                console.log('Knowledge base loaded successfully with', Object.keys(knowledgeBase).length, 'files');
                
                if (status) {
                    status.textContent = `Knowledge base loaded with ${Object.keys(knowledgeBase).length} files`;
                    status.classList.add('loaded');
                }
            } catch (error) {
                console.error('Error loading knowledge base:', error);
                if (status) {
                    status.textContent = 'Error loading knowledge base. Check console for details.';
                }
            }
        }

        function parseOxfordDictionary(content) {
            const parsed = {};
            const lines = content.split('\n');
            
            console.log('Total lines:', lines.length);
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                // Skip lines that are just letters (like "A", "B", etc.)
                if (trimmed.length <= 2 && /^[A-Za-z]+$/.test(trimmed)) continue;
                
                // Parse dictionary entry
                // Format: Word  part-of-speech definition
                const match = trimmed.match(/^([A-Za-z\-]+)\s+(.+)$/);
                if (match) {
                    const word = match[1].toLowerCase();
                    const definition = match[2];
                    
                    // Create entry with definition and generate response templates
                    parsed[word] = {
                        definition: definition,
                        context: 'general',
                        response_templates: generateResponseTemplates(word, definition)
                    };
                } else {
                    console.log('Failed to match line:', trimmed.substring(0, 50));
                }
            }
            
            console.log('Parsed entries:', Object.keys(parsed).length);
            return parsed;
        }
        
        function generateResponseTemplates(word, definition) {
            // Generate thoughtful response templates based on the word and definition
            const templates = [];
            
            // Analyze the definition to understand context
            const definitionLower = definition.toLowerCase();
            
            // Generate contextual responses based on definition analysis
            if (definitionLower.includes('prefix') || definitionLower.includes('suffix')) {
                templates.push(`"${word}" is a ${definitionLower.includes('prefix') ? 'prefix' : 'suffix'}. This means it's added to the beginning or end of words to modify their meaning.`);
                templates.push(`I understand "${word}" is a ${definitionLower.includes('prefix') ? 'prefix' : 'suffix'}. ${definition}`);
            } else if (definitionLower.includes('n.') || definitionLower.includes('noun')) {
                templates.push(`"${word}" is a noun. ${definition} It refers to a person, place, thing, or idea.`);
                templates.push(`Based on the definition, "${word}" is a noun meaning ${definition}`);
            } else if (definitionLower.includes('v.') || definitionLower.includes('verb')) {
                templates.push(`"${word}" is a verb. ${definition} It describes an action or state.`);
                templates.push(`I see "${word}" is a verb. ${definition}`);
            } else if (definitionLower.includes('adj.') || definitionLower.includes('adjective')) {
                templates.push(`"${word}" is an adjective. ${definition} It describes a quality or characteristic.`);
                templates.push(`"${word}" is an adjective meaning ${definition}`);
            } else if (definitionLower.includes('adv.') || definitionLower.includes('adverb')) {
                templates.push(`"${word}" is an adverb. ${definition} It modifies verbs, adjectives, or other adverbs.`);
                templates.push(`"${word}" is an adverb. ${definition}`);
            } else if (definitionLower.includes('abbr.') || definitionLower.includes('abbreviation')) {
                templates.push(`"${word}" is an abbreviation. ${definition} It's a shortened form of a word or phrase.`);
                templates.push(`I understand "${word}" is an abbreviation. ${definition}`);
            } else if (definitionLower.includes('prep.') || definitionLower.includes('preposition')) {
                templates.push(`"${word}" is a preposition. ${definition} It shows the relationship between words.`);
                templates.push(`"${word}" is a preposition meaning ${definition}`);
            } else {
                // Generic thoughtful response
                templates.push(`"${word}" means ${definition} Based on this, I can help you understand how it's used.`);
                templates.push(`I understand "${word}" as ${definition} What would you like to know about it?`);
                templates.push(`The definition of "${word}" is ${definition} How can I help you with this?`);
            }
            
            return templates;
        }
        
        function correctTypos(text) {
            const commonTypos = {
                "helo": "hello", "heloo": "hello", "hii": "hi", "heyoo": "hey", "thnks": "thanks",
                "thankyou": "thank you", "thank u": "thank you", "thx": "thanks", "ty": "thank you",
                "plz": "please", "pls": "please", "wats": "what's", "wat": "what", "wut": "what",
                "hw": "how", "how r u": "how are you", "how ru": "how are you", "u": "you",
                "ur": "your", "ya": "you", "yea": "yeah", "ok": "okay", "k": "okay",
                "gud": "good", "gd": "good", "gr8": "great", "awsum": "awesome", "amazin": "amazing",
                "lov": "love", "luv": "love", "sory": "sorry", "srry": "sorry",
                "cant": "can't", "dont": "don't", "didnt": "didn't", "doesnt": "doesn't",
                "isnt": "isn't", "arent": "aren't", "wasnt": "wasn't", "havent": "haven't",
                "shouldnt": "shouldn't", "wouldnt": "wouldn't", "couldnt": "couldn't",
                "yo": "hello", "hey": "hello", "ayo": "hello", "wassup": "how are you",
                "sup": "how are you", "how r ya": "how are you", "hw r u": "how are you",
                // Dyslexia-friendly corrections
                "teh": "the", "taht": "that", "adn": "and", "nad": "and", "hte": "the",
                "th": "the", "te": "the", "ad": "and", "abd": "and", "dys": "this",
                "dis": "this", "tih": "this", "wih": "with", "wit": "with", "wiht": "with",
                "whcih": "which", "waht": "what", "wha": "what", "were": "where",
                "wehre": "where", "hwo": "how", "wh": "how", "wo": "how", "ow": "how",
                "youe": "you", "yuo": "you", "yo": "you", "yur": "your", "yor": "your",
                "yoru": "your", "thier": "their", "tehir": "their", "thay": "they",
                "tehy": "they", "im": "i'm", "iam": "i am", "i m": "i am",
                "coudl": "could", "culd": "could", "shoudl": "should", "shuld": "should",
                "woudl": "would", "wuld": "would", "wll": "will", "wil": "will",
                "wlil": "will", "thikn": "think", "thnk": "think", "thik": "think",
                "thn": "then", "hten": "then", "tehn": "then", "becuase": "because",
                "becuse": "because", "becasue": "because", "knwo": "know", "kown": "know",
                "konw": "know", "kow": "know", "new": "know", "knew": "know", "nwo": "know",
                "whic": "which", "wich": "which", "whihc": "which", "whne": "when",
                "wen": "when", "wehn": "when", "wher": "where", "wehre": "where",
                "whre": "where", "wy": "why", "wo": "who", "evrey": "every",
                "eveyr": "every", "evry": "every", "evey": "every", "eny": "any",
                "an": "any", "anyoen": "anyone", "anyoone": "anyone", "someoen": "someone",
                "someoone": "someone", "nobdy": "nobody", "nothign": "nothing",
                "nothng": "nothing", "noting": "nothing", "alwasy": "always",
                "alway": "always", "alwas": "always", "nevr": "never", "nev": "never",
                "nevre": "never", "sometims": "sometimes", "sometiems": "sometimes",
                "somtimes": "sometimes", "usally": "usually", "usualy": "usually",
                "usally": "usually", "ofen": "often", "ofte": "often", "oftne": "often",
                "mayeb": "maybe", "mayb": "maybe", "maby": "maybe", "maeby": "maybe",
                "probaly": "probably", "probabaly": "probably", "probalby": "probably"
            };
            
            let corrected = text;
            for (const [typo, correction] of Object.entries(commonTypos)) {
                const regex = new RegExp(`\\b${typo}\\b`, 'gi');
                corrected = corrected.replace(regex, correction);
            }
            
            return corrected;
        }
        
        function generateResponse(message) {
            let lowerMessage = message.toLowerCase();
            
            // Apply typo correction
            lowerMessage = correctTypos(lowerMessage);
            
            if (!knowledgeLoaded) {
                return "I'm Ada! I don't have any knowledge loaded yet. Please configure a GitHub knowledge base in the settings above so I can answer your questions.";
            }
            
            // Oxford Dictionary-based response generation
            if (Object.keys(dictionary).length > 0) {
                // Check if message matches any dictionary entry
                for (const [key, entry] of Object.entries(dictionary)) {
                    // Check if the key is in the message
                    if (lowerMessage.includes(key)) {
                        // Found a match in dictionary, use response template
                        if (entry.response_templates && entry.response_templates.length > 0) {
                            return entry.response_templates[Math.floor(Math.random() * entry.response_templates.length)];
                        }
                    }
                }
            }
            
            // Fallback to knowledge base pattern matching
            let response = "I'm not sure about that. Could you be more specific?";
            
            // Search through knowledge base for relevant information
            let relevantContent = [];
            
            for (const [fileName, content] of Object.entries(knowledgeBase)) {
                // Skip dictionary files for knowledge base search
                if (fileName === 'Oxford English Dictionary.txt' || fileName === 'dictionary-common.txt') continue;
                
                const lowerContent = content.toLowerCase();
                
                // Check if any words from the message appear in the content
                const messageWords = lowerMessage.split(' ').filter(word => word.length > 2);
                const matches = messageWords.filter(word => lowerContent.includes(word));
                
                if (matches.length > 0) {
                    relevantContent.push({ fileName, content, matches: matches.length });
                }
            }
            
            // Sort by relevance (most matches first)
            relevantContent.sort((a, b) => b.matches - a.matches);
            
            if (relevantContent.length > 0 && relevantContent[0].matches >= 1) {
                const bestMatch = relevantContent[0];
                
                // Extract a relevant paragraph or sentence from the content
                const sentences = bestMatch.content.split(/[.!?]+/).filter(s => s.trim().length > 10);
                
                if (sentences.length > 0) {
                    // Find the sentence with the most keyword matches
                    let bestSentence = sentences[0];
                    let maxMatches = 0;
                    
                    for (const sentence of sentences) {
                        const lowerSentence = sentence.toLowerCase();
                        const matches = messageWords.filter(word => lowerSentence.includes(word)).length;
                        if (matches > maxMatches) {
                            maxMatches = matches;
                            bestSentence = sentence;
                        }
                    }
                    
                    response = `${bestSentence.trim()}`;
                    return response;
                }
            }
            
            return response;
        }

        // Allow sending message with Enter key
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Auto-load knowledge base on initialization
        window.addEventListener('load', function() {
            // Auto-load knowledge base (configured behind the scenes)
            loadKnowledgeBase();
        });
    </script>
