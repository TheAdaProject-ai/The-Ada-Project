<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada.Coffee вҖ“ Geospatial Hub</title>
<link rel="icon" type="image/png" href="Icons/Ada.Coffee.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#92400e;--accent-dark:#78350f;--accent-muted:#fef3c7;
  --bg:#fafafa;--surface:#ffffff;--surface2:#f4f4f5;
  --border:#e4e4e7;--border2:#d4d4d8;
  --text:#18181b;--muted:#71717a;--hint:#a1a1aa;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'DM Sans',system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;
  --border:#3f3f46;--border2:#52525b;
  --text:#fafafa;--muted:#a1a1aa;--hint:#71717a;
  --accent-muted:#451a03;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;overflow:hidden}

header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:200}
.logo-mark{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px;flex-shrink:0}
.header-title{font-size:14.5px;font-weight:600;color:var(--text);line-height:1.1}
.header-sub{font-size:11px;color:var(--muted)}
.search-wrap{display:flex;align-items:center;gap:6px;margin-left:16px;flex:1;max-width:320px}
.search-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font:13.5px var(--font);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--hint)}
.search-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font:500 13px var(--font);cursor:pointer;transition:background .15s;white-space:nowrap}
.search-btn:hover{background:var(--accent-dark)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:14px}
.hdr-btn:hover{background:var(--surface2);color:var(--text)}

.layout{flex:1;display:grid;grid-template-columns:280px 1fr 280px;overflow:hidden}

/* Panels */
.panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{border-right:none;border-left:1px solid var(--border)}
.panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* Map */
.map-wrap{position:relative}
#map{width:100%;height:100%}

/* Cards */
.info-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.info-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:var(--muted)}
.info-row .val{font-weight:500;color:var(--text);text-align:right}
.weather-big{font-size:28px;font-weight:600;color:var(--text);margin:6px 0}
.weather-desc{font-size:13px;color:var(--muted);margin-bottom:8px}
.flag-display{font-size:28px;margin-bottom:6px}

/* News */
.news-item{padding:12px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;margin-bottom:4px}
.news-meta{font-size:11.5px;color:var(--hint)}

/* Loading/error states */
.state-msg{text-align:center;padding:24px 12px;font-size:13px;color:var(--muted)}
.state-icon{font-size:28px;margin-bottom:8px}

/* Coordinate display */
.coords-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;font-family:var(--font);color:var(--muted);z-index:500;pointer-events:none;box-shadow:var(--shadow)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <img src="The Ada Project - Logo.png" alt="Ada Logo" class="logo-mark">
    <div class="header-title">Ada.Coffee</div>
    <div class="header-sub">Geospatial Hub</div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search address or cityвҖҰ">
    <button class="search-btn" onclick="searchAddress()">Search</button>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="toggleDark()" id="darkBtn">рҹҢҷ</button>
  </div>
</header>

<div class="layout">
  <!-- Left: Weather + Country -->
  <div class="panel">
    <div class="panel-header">рҹ“Қ Location Info</div>
    <div class="panel-body">
      <div id="weatherPanel"><div class="state-msg"><div class="state-icon">рҹҢӨпёҸ</div>Loading weatherвҖҰ</div></div>
      <div id="countryPanel"><div class="state-msg"><div class="state-icon">рҹҢҚ</div>Loading countryвҖҰ</div></div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="coords-bar" id="coordsBar">Click or drag to explore</div>
  </div>

  <!-- Right: News -->
  <div class="panel panel-right">
    <div class="panel-header">рҹ“° News Feed</div>
    <div class="panel-body" id="newsPanel"><div class="state-msg"><div class="state-icon">рҹ“°</div>Loading newsвҖҰ</div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map,marker,dark=false;
let curLat=40.7128,curLng=-74.006;
const cache={dict:{}};
function toggleDark(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('darkBtn').textContent=dark?'вҳҖпёҸ':'рҹҢҷ';localStorage.setItem('ada-coffee-dark',dark?'1':'0');}
if(localStorage.getItem('ada-coffee-dark')==='1')toggleDark();

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchAddress();});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){if(n==null)return'вҖ”';return Number(n).toLocaleString();}
// Rest of your code...

const wIcon=c=>c===0?'вҳҖпёҸ':c<=2?'вӣ…':c<=3?'вҳҒпёҸ':c<=49?'рҹҢ«пёҸ':c<=67?'рҹҢ§пёҸ':c<=77?'вқ„пёҸ':c<=82?'рҹҢҰпёҸ':c<=86?'рҹҢЁпёҸ':'вӣҲпёҸ';
const wDesc=c=>c===0?'Clear sky':c<=2?'Partly cloudy':c<=3?'Overcast':c<=49?'Foggy':c<=59?'Drizzle':c<=67?'Rain':c<=77?'Snow':c<=82?'Rain showers':c<=86?'Snow showers':'Thunderstorm';

function initMap(){
  map=L.map('map',{zoomControl:true}).setView([curLat,curLng],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'В© OpenStreetMap В© CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  marker=L.marker([curLat,curLng],{draggable:true}).addTo(map);
  marker.on('dragend',e=>{const ll=e.target.getLatLng();updateLoc(ll.lat,ll.lng);});
  map.on('click',e=>{marker.setLatLng(e.latlng);updateLoc(e.latlng.lat,e.latlng.lng);});
  updateLoc(curLat,curLng);
}

async function updateLoc(lat,lng){
  curLat=Math.max(-90,Math.min(90,lat));
  curLng=((lng+180)%360+360)%360-180;
  document.getElementById('coordsBar').textContent=`${curLat.toFixed(4)}, ${curLng.toFixed(4)}`;
  await Promise.all([fetchWeather(),fetchCountry()]);
}

async function searchAddress(){
  const q=document.getElementById('searchInput').value.trim();if(!q)return;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
    const d=await r.json();
    if(d&&d.length){
      const lat=parseFloat(d[0].lat),lng=parseFloat(d[0].lon);
      map.setView([lat,lng],12);marker.setLatLng([lat,lng]);
      updateLoc(lat,lng);document.getElementById('searchInput').value='';
    }else{alert('Address not found.');}
  }catch(e){alert('Search failed.');}
}

async function fetchWeather(){
  const panel=document.getElementById('weatherPanel');
  panel.innerHTML='<div class="state-msg"><div class="state-icon">рҹҢӨпёҸ</div>LoadingвҖҰ</div>';
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${curLat}&longitude=${curLng}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,precipitation_probability&timezone=auto&forecast_days=1`);
    const d=await r.json();const cw=d.current_weather;
    if(!cw)throw new Error('No weather data');
    const temp=Math.round(cw.temperature);const wind=Math.round(cw.windspeed);
    const hum=d.hourly?.relativehumidity_2m?.[0]??'вҖ”';
    const feels=d.hourly?.apparent_temperature?.[0]!=null?Math.round(d.hourly.apparent_temperature[0]):'вҖ”';
    const rain=d.hourly?.precipitation_probability?.[0]??'вҖ”';
    panel.innerHTML=`<div class="info-card">
      <div class="info-card-title">${wIcon(cw.weathercode)} Weather</div>
      <div class="weather-big">${temp}В°C</div>
      <div class="weather-desc">${wDesc(cw.weathercode)}</div>
      <div class="info-row"><span class="lbl">Feels like</span><span class="val">${feels}В°C</span></div>
      <div class="info-row"><span class="lbl">Wind</span><span class="val">${wind} km/h</span></div>
      <div class="info-row"><span class="lbl">Humidity</span><span class="val">${hum}%</span></div>
      <div class="info-row"><span class="lbl">Rain chance</span><span class="val">${rain}%</span></div>
    </div>`;
  }catch(e){panel.innerHTML='<div class="state-msg"><div class="state-icon">вҡ пёҸ</div>Weather unavailable</div>';}
}

async function fetchCountry(){
  const panel=document.getElementById('countryPanel');
  panel.innerHTML='<div class="state-msg"><div class="state-icon">рҹҢҚ</div>LoadingвҖҰ</div>';
  try{
    // Reverse geocode
    const geoR=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${curLat}&lon=${curLng}&format=json&addressdetails=1`);
    const geoD=await geoR.json();
    const addr=geoD.address||{};
    const cc=addr.country_code;
    if(!cc)throw new Error('no country code');
    const cR=await fetch(`https://restcountries.com/v3.1/alpha/${cc}`);
    const cD=await cR.json();const c=Array.isArray(cD)?cD[0]:cD;
    const flag=c.flag||c.flags?.emoji||'рҹҸіпёҸ';
    const name=c.name?.common||addr.country||'Unknown';
    const pop=c.population?.toLocaleString()||'вҖ”';
    const cap=(c.capital||['вҖ”'])[0];
    const region=c.region||'вҖ”';
    const cur=Object.values(c.currencies||{})[0]?.name||'вҖ”';
    const lang=Object.values(c.languages||{})[0]||'вҖ”';
    // Build location detail
    const city=addr.city||addr.town||addr.village||'';
    const state=addr.state||addr.province||addr.county||'';
    const locationDetail=[city,state,addr.country].filter(Boolean).join(', ');
    panel.innerHTML=`<div class="info-card">
      <div class="flag-display">${esc(flag)}</div>
      <div class="info-card-title">${esc(name)}</div>
      ${locationDetail?`<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">${esc(locationDetail)}</div>`:''}
      <div class="info-row"><span class="lbl">Population</span><span class="val">${pop}</span></div>
      <div class="info-row"><span class="lbl">Capital</span><span class="val">${esc(cap)}</span></div>
      <div class="info-row"><span class="lbl">Region</span><span class="val">${esc(region)}</span></div>
      <div class="info-row"><span class="lbl">Currency</span><span class="val">${esc(cur)}</span></div>
      <div class="info-row"><span class="lbl">Language</span><span class="val">${esc(lang)}</span></div>
    </div>`;
    fetchNews(name);
  }catch(e){
    panel.innerHTML='<div class="state-msg"><div class="state-icon">рҹҢҠ</div>International waters or unknown location</div>';
    fetchNews('world');
  }
}

async function fetchNews(country){
  const panel=document.getElementById('newsPanel');
  panel.innerHTML='<div class="state-msg"><div class="state-icon">рҹ“°</div>Loading newsвҖҰ</div>';
  try{
    const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(country)}&hl=en&gl=US&ceid=US:en`;
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=12`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();const items=d.items||[];
    if(!items.length)throw new Error('no items');
    panel.innerHTML=items.slice(0,10).map(item=>{
      const title=item.title||'No title';
      const source=item.author||item.source||'';
      const date=item.pubDate?new Date(item.pubDate).toLocaleDateString([],{month:'short',day:'numeric'}):'';
      const link=item.link||'#';
      return`<div class="news-item"><a href="${esc(link)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit"><div class="news-title">${esc(title)}</div></a><div class="news-meta">${[source,date].filter(Boolean).map(esc).join(' В· ')}</div></div>`;
    }).join('');
  }catch(e){
    // Fallback to Actually Relevant
    try{
      const r2=await fetch('https://actually-relevant-api.onrender.com/api/feed');
      const text=await r2.text();
      const xml=new DOMParser().parseFromString(text,'text/xml');
      const items=[...xml.querySelectorAll('item')].slice(0,10);
      if(items.length){
        panel.innerHTML=items.map(item=>{
          const title=item.querySelector('title')?.textContent||'';
          const cat=item.querySelector('category')?.textContent||'News';
          const date=item.querySelector('pubDate')?.textContent;
          const fdate=date?new Date(date).toLocaleDateString([],{month:'short',day:'numeric'}):'';
          return`<div class="news-item"><div class="news-title">${esc(title)}</div><div class="news-meta">${esc(cat)}${fdate?' В· '+fdate:''}</div></div>`;
        }).join('');return;
      }
    }catch(_){}
    panel.innerHTML='<div class="state-msg"><div class="state-icon">рҹ“°</div>News unavailable</div>';
  }
}

async function apiDict(word){if(cache.dict[word])return cache.dict[word];try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);if(r.ok){const d=await r.json();cache.dict[word]=d;return d;}}catch(_){}return null;}
async function getWordContext(word){const d=await apiDict(word);if(!d||!d[0])return null;const entry=d[0];const pos=entry.meanings?.[0]?.partOfSpeech||'unknown';const meaning=entry.meanings?.[0]?.definitions?.[0]?.definition||'definition not found';return{word:entry.word,phonetic:entry.phonetic,pos,meaning};}
async function apiThesaurus(word){
  if(cache.thesaurus?.[word])return cache.thesaurus[word];
  try{
    const r=await fetch(`https://api.datamuse.com/words?rel_syn=${encodeURIComponent(word)}&max=10`);
    if(r.ok){
      const d=await r.json();
      if(!cache.thesaurus)cache.thesaurus={};
      cache.thesaurus[word]=d;
      return d;
    }
  }catch(_){}
  return null;
}
const ABBREVIATIONS={'hru':'how are you','hmu':'hit me up','nm':'not much','nvm':'never mind','brb':'be right back','btw':'by the way','imo':'in my opinion','tbh':'to be honest','idk':'i do not know','ikr':'i know right','lol':'laugh out loud','omg':'oh my god','smh':'shaking my head','ttyl':'talk to you later','ngl':'not gonna lie','rn':'right now','afaik':'as far as i know','bbl':'be back later','cu':'see you','g2g':'got to go','ic':'i see','k':'okay','lmk':'let me know','nbd':'no big deal','plz':'please','thx':'thanks','u':'you','ur':'your','w/':'with','w/o':'without','y':'why'};
function expandAbbreviations(text){let result=text.toLowerCase();for(const[abbr,full]of Object.entries(ABBREVIATIONS)){result=result.replace(new RegExp(`\\b${abbr}\\b`,'gi'),full);}return result;}
async function spellCheck(word){
  if(cache.spell?.[word])return cache.spell[word];
  try{
    const r=await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(word)}&max=5`);
    if(r.ok){
      const d=await r.json();
      if(!cache.spell)cache.spell={};
      cache.spell[word]=d;
      return d;
    }
  }catch(_){}
  return null;
}

async function apiWeather(city){
  if(cache.weather?.[city])return cache.weather[city];
  try{
    const g=await(await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`)).json();
    if(!g.results?.length)return null;
    const{latitude:lat,longitude:lon,name,country,admin1}=g.results[0];
    const w=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,precipitation_probability&timezone=auto&forecast_days=1`)).json();
    const cw=w.current_weather;
    if(!cw)return null;
    const wD=c=>c===0?'вҳҖпёҸ Clear sky':c<=2?'вӣ… Partly cloudy':c<=3?'вҳҒпёҸ Overcast':c<=49?'рҹҢ«пёҸ Foggy':c<=59?'рҹҢҰпёҸ Drizzle':c<=67?'рҹҢ§пёҸ Rainy':c<=77?'вқ„пёҸ Snowy':c<=82?'рҹҢҰпёҸ Rain showers':c<=86?'рҹҢЁпёҸ Snow showers':'вӣҲпёҸ Thunderstorm';
    return{name,country,region:admin1||'',temp:Math.round(cw.temperature),wind:Math.round(cw.windspeed),desc:wD(cw.weathercode),hum:w.hourly?.relativehumidity_2m?.[0]??'вҖ”',feels:w.hourly?.apparent_temperature?.[0]??Math.round(cw.temperature),rain:w.hourly?.precipitation_probability?.[0]??0};
  }catch(_){}
  return null;
}

initMap();
</script>
</body>
</html>
