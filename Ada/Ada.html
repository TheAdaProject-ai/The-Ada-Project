<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada – AI Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#5b6af0;--accent-dark:#4453d6;
  --bg:#f4f5f7;--surface:#fff;--border:#e2e4e9;
  --text:#1a1c22;--muted:#6b7280;
  --user-bubble:#5b6af0;--ada-bubble:#fff;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --toast-bg:#1a1c22;--toast-text:#fff;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1c22;--border:#2d3040;
  --text:#e8eaf0;--muted:#9ca3af;
  --ada-bubble:#252836;--user-bubble:#4453d6;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --toast-bg:#e8eaf0;--toast-text:#1a1c22;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .25s}
.app{width:100%;max-width:700px;height:100dvh;max-height:900px;background:var(--surface);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:background .25s}
@media(max-width:720px){.app{border-radius:0;max-height:100dvh}}
header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);transition:background .25s,border-color .25s}
.ada-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9b6ef0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
header h1{font-size:16px;font-weight:700;color:var(--text)}
header p{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:5px}
.hdr-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:14px}
.hdr-btn:hover{background:var(--bg);color:var(--text)}
.chat{flex:1;overflow-y:auto;padding:14px 12px;scroll-behavior:smooth;display:flex;flex-direction:column;gap:10px;min-height:0}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.welcome{text-align:center;margin:auto;padding:24px 12px}
.welcome .big-dot{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9b6ef0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:24px;margin:0 auto 12px}
.welcome h2{font-size:18px;color:var(--text);margin-bottom:6px}
.welcome p{font-size:13px;color:var(--muted);line-height:1.6;max-width:320px;margin:0 auto 14px}
.quick-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{padding:5px 11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.msg.ada .msg-avatar{background:linear-gradient(135deg,var(--accent),#9b6ef0)}
.msg.user .msg-avatar{background:#34d399}
.msg-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bubble);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;transition:background .25s,border-color .25s}
.msg.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.reaction-chip{font-size:15px;cursor:pointer;padding:1px 5px;border-radius:8px;background:var(--bg);border:1px solid var(--border);transition:transform .15s;user-select:none}
.reaction-chip:hover{transform:scale(1.25)}
.reaction-bar{display:flex;gap:4px;margin-top:3px;opacity:0;transition:opacity .2s;flex-wrap:wrap}
.msg:hover .reaction-bar,.reaction-bar:focus-within{opacity:1}
.react-pick{font-size:14px;cursor:pointer;padding:2px 5px;border-radius:8px;background:var(--bg);border:1px solid var(--border);transition:transform .15s;user-select:none}
.react-pick:hover{transform:scale(1.2)}
.code-block{background:#1e1e2e;color:#cdd6f4;border-radius:10px;padding:12px;font-family:'Courier New',monospace;font-size:12.5px;overflow-x:auto;margin:6px 0;position:relative;line-height:1.6}
.code-lang{font-size:10px;color:#7c7f93;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.copy-code{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;color:#cdd6f4;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:background .15s}
.copy-code:hover{background:rgba(255,255,255,.2)}
.code-block pre{white-space:pre-wrap;word-break:break-word}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--ada-bubble);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;transition:background .25s,border-color .25s}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
.input-area{padding:10px 12px 13px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background .25s,border-color .25s}
.input-row{display:flex;gap:6px;align-items:flex-end}
textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:14px;font-family:inherit;outline:none;line-height:1.5;max-height:110px;overflow-y:auto;transition:border-color .2s,background .25s;background:var(--bg);color:var(--text)}
textarea:focus{border-color:var(--accent);background:var(--surface)}
textarea::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.05)}
.send-btn:active{transform:scale(.96)}
.send-btn svg{width:15px;height:15px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);color:var(--toast-text);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:1000;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ada-dot">A</div>
    <div><h1>Ada</h1><p>Your AI Assistant</p></div>
    <div class="hdr-btns">
      <button class="hdr-btn" title="Toggle dark mode" onclick="toggleDark()" id="darkBtn">🌙</button>
    </div>
  </header>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="big-dot">A</div>
      <h2>Hello, I'm Ada! 👋</h2>
      <p>Ask me anything — weather, math, translations, facts, code, crypto, space, jokes, and more.</p>
      <div class="quick-chips">
        <span class="chip" onclick="quickSend('What is the weather in London?')">🌤️ Weather</span>
        <span class="chip" onclick="quickSend('Calculate 15% of 240')">🧮 Math</span>
        <span class="chip" onclick="quickSend('Translate hello to French')">🌐 Translate</span>
        <span class="chip" onclick="quickSend('Write a Python hello world')">💻 Code</span>
        <span class="chip" onclick="quickSend('What is quantum computing?')">🔍 Fact</span>
        <span class="chip" onclick="quickSend('Tell me a fun fact')">✨ Fun fact</span>
        <span class="chip" onclick="quickSend('Bitcoin price')">💰 Crypto</span>
        <span class="chip" onclick="quickSend('Latest SpaceX launch')">🚀 Space</span>
        <span class="chip" onclick="quickSend('Show me r/programming hot posts')">📱 Reddit</span>
        <span class="chip" onclick="quickSend('Show me a random dog picture')">🐶 Dog pic</span>
        <span class="chip" onclick="quickSend('Tell me a joke')">😄 Joke</span>
        <span class="chip" onclick="quickSend('What is my IP address?')">🌐 My IP</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="Message Ada…" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="send()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══ State ═══ */
let darkMode=false;
const KB_TOKEN='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';
const KB_REPO='TheAdaProject-ai/The-Ada-Project';
let knowledgeBase={};
const dictCache={},wikiCache={},bookCache={};
const EMOJIS=['👍','❤️','😂','😮','🎉','🔥'];
const LANG_NAMES={fr:'French',es:'Spanish',de:'German',it:'Italian',pt:'Portuguese',ja:'Japanese',zh:'Chinese',ru:'Russian',ar:'Arabic',ko:'Korean',nl:'Dutch',pl:'Polish',tr:'Turkish',hi:'Hindi',sv:'Swedish',uk:'Ukrainian',fi:'Finnish',no:'Norwegian',da:'Danish',el:'Greek',he:'Hebrew',cs:'Czech',ro:'Romanian',hu:'Hungarian',th:'Thai',vi:'Vietnamese',id:'Indonesian'};

/* ═══ Init ═══ */
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-dark')==='1')toggleDark();
window.addEventListener('load',()=>loadKnowledgeBase());

/* ═══ Dark mode ═══ */
function toggleDark(){darkMode=!darkMode;document.documentElement.setAttribute('data-theme',darkMode?'dark':'');document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';localStorage.setItem('ada-dark',darkMode?'1':'0');}

/* ═══ Helpers ═══ */
function quickSend(t){document.getElementById('msgInput').value=t;send();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);}

/* ═══ Send ═══ */
async function send(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text)return;
  removeWelcome();
  appendMessage(text,'user');
  input.value='';input.style.height='auto';
  const tyEl=appendTyping();
  try{const reply=await generateResponse(text);tyEl.remove();appendMessage(reply,'ada');}
  catch(e){tyEl.remove();appendMessage('Sorry, something went wrong. Please try again.','ada');}
}
function removeWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}
function appendTyping(){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className='msg ada';
  wrap.innerHTML='<div class="msg-avatar">A</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;return wrap;
}
function appendMessage(text,sender){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className=`msg ${sender}`;
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=sender==='ada'?'A':'U';
  const body=document.createElement('div');body.className='msg-body';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(sender==='ada')bubble.innerHTML=renderAdaText(text);
  else bubble.textContent=text;
  body.appendChild(bubble);
  if(sender==='ada'){
    const rbar=document.createElement('div');rbar.className='reaction-bar';
    const reactDiv=document.createElement('div');reactDiv.className='reactions';
    EMOJIS.forEach(emoji=>{
      const b=document.createElement('span');b.className='react-pick';b.textContent=emoji;
      b.onclick=()=>{
        const ex=reactDiv.querySelector(`[data-emoji="${emoji}"]`);
        if(ex){const c=parseInt(ex.dataset.count||1)+1;ex.textContent=emoji+(c>1?` ${c}`:'');ex.dataset.count=c;}
        else{const chip=document.createElement('span');chip.className='reaction-chip';chip.textContent=emoji;chip.dataset.emoji=emoji;chip.dataset.count=1;chip.onclick=()=>chip.remove();reactDiv.appendChild(chip);}
        rbar.style.opacity='0';
      };
      rbar.appendChild(b);
    });
    body.appendChild(rbar);
    body.appendChild(reactDiv);
  }
  wrap.appendChild(avatar);wrap.appendChild(body);
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
}
function renderAdaText(text){
  return text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const l=lang||'code';const id='cb'+Math.random().toString(36).slice(2);
    return `<div class="code-block"><div class="code-lang">${escHtml(l)}</div><button class="copy-code" onclick="copyCode('${id}')">Copy</button><pre id="${id}">${escHtml(code.trim())}</pre></div>`;
  });
}
function copyCode(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Copied!'));}

/* ═══ Knowledge Base ═══ */
async function loadKnowledgeBase(){
  try{
    const[owner,repo]=KB_REPO.split('/');
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/Basic-knowledge/`,{headers:{'Accept':'application/vnd.github.v3+json','Authorization':`token ${KB_TOKEN}`}});
    if(!res.ok)return;
    const files=await res.json();
    for(const f of files){if(f.type==='file'&&/\.(md|txt|json)$/.test(f.name)){const r=await fetch(f.download_url||f.url);if(r.ok)knowledgeBase[f.name]=await r.text();}}
  }catch(_){}
}

/* ═══ APIs ═══ */
async function fetchWikiSummary(t){if(wikiCache[t])return wikiCache[t];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`);if(r.ok){const d=await r.json();if(d?.extract){wikiCache[t]=d;return d;}}}catch(_){}return null;}
async function searchWikipedia(q){if(q.length<3)return null;try{const r=await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(q)}&limit=5&namespace=0&format=json&origin=*`);if(r.ok){const d=await r.json();if(d?.[1]?.length){const title=d[1][0];if(q.split(' ').some(p=>p.length>3&&title.toLowerCase().includes(p))||title.toLowerCase().includes(q))return{title};}}}catch(_){}return null;}
async function searchDDG(q){try{const r=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=0`);if(r.ok){const d=await r.json();if(d.Abstract)return{extract:d.Abstract};if(d.RelatedTopics?.[0]?.Text)return{extract:d.RelatedTopics[0].Text};}}catch(_){}return null;}
async function fetchBooks(q){if(bookCache[q])return bookCache[q];try{const r=await fetch(`https://gutendex.com/books?search=${encodeURIComponent(q)}`);if(r.ok){const d=await r.json();if(d.results?.length){bookCache[q]=d.results;return d.results;}}}catch(_){}return null;}
async function fetchWord(word){if(dictCache[word])return dictCache[word];try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);if(r.ok){const d=await r.json();dictCache[word]=d;return d;}}catch(_){}return null;}
function getDefinition(data){return data?.[0]?.meanings?.[0]?.definitions?.[0]?.definition||null;}
async function fetchWeatherData(city){
  try{
    const gR=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const gD=await gR.json();if(!gD.results?.length)return null;
    const{latitude:lat,longitude:lon,name,country}=gD.results[0];
    const wR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature&timezone=auto&forecast_days=1`);
    const wD=await wR.json();
    return{name,country,cw:wD.current_weather,hum:wD.hourly?.relativehumidity_2m?.[0]??'—',feels:wD.hourly?.apparent_temperature?.[0]!=null?Math.round(wD.hourly.apparent_temperature[0]):'—'};
  }catch(_){return null;}
}
function wIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';if(c<=49)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c<=82)return'🌦️';if(c<=86)return'🌨️';return'⛈️';}
function wDesc(c){if(c===0)return'Clear sky';if(c<=2)return'Partly cloudy';if(c<=3)return'Overcast';if(c<=49)return'Foggy';if(c<=59)return'Drizzle';if(c<=67)return'Rainy';if(c<=77)return'Snow';if(c<=82)return'Rain showers';if(c<=86)return'Snow showers';return'Thunderstorm';}
async function fetchCountry(name){try{const r=await fetch(`https://restcountries.com/v3.1/name/${encodeURIComponent(name)}`);if(r.ok){const d=await r.json();if(d?.length)return d[0];}}catch(_){}return null;}
async function fetchNASA(q){try{const r=await fetch(`https://images-api.nasa.gov/search?q=${encodeURIComponent(q)}&media_type=image`);if(r.ok){const d=await r.json();if(d?.collection?.items?.length)return d.collection.items.slice(0,3);}}catch(_){}return null;}
async function fetchSpaceX(){try{const r=await fetch('https://api.spacexdata.com/v4/launches/upcoming');if(r.ok){const d=await r.json();if(d?.length)return d.slice(0,3);}}catch(_){}return null;}
async function fetchCrypto(coin){try{const r=await fetch(`https://api.coingecko.com/api/v3/coins/${encodeURIComponent(coin)}`);if(r.ok)return await r.json();}catch(_){}return null;}
async function fetchReddit(sub){try{const r=await fetch(`https://www.reddit.com/r/${encodeURIComponent(sub)}/hot.json`);if(r.ok){const d=await r.json();if(d?.data?.children?.length)return d.data.children.slice(0,3);}}catch(_){}return null;}
async function fetchDog(){try{const r=await fetch('https://dog.ceo/api/breeds/image/random');if(r.ok){const d=await r.json();return d.message;}}catch(_){}return null;}
async function fetchCatFact(){try{const r=await fetch('https://catfact.ninja/fact');if(r.ok){const d=await r.json();return d.fact;}}catch(_){}return null;}
async function fetchJoke(){try{const r=await fetch('https://v2.jokeapi.dev/joke/Any?blacklistFlags=nsfw,racist,sexist,explicit');if(r.ok){const d=await r.json();if(d.type==='single')return d.joke;if(d.type==='twopart')return`${d.setup}<br><br>...${d.delivery}`;}}catch(_){}return null;}
async function fetchIP(){try{const r=await fetch('https://ipapi.co/json/');if(r.ok)return await r.json();}catch(_){}return null;}
async function fetchExchange(from,to,amount){try{const r=await fetch(`https://api.frankfurter.app/latest?amount=${amount}&from=${from}&to=${to}`);if(r.ok){const d=await r.json();return d.rates?.[to];}}catch(_){}return null;}
async function fetchFood(name){try{const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(name)}&search_simple=1&action=process&json=1&page_size=1`);if(r.ok){const d=await r.json();if(d.products?.length)return d.products[0];}}catch(_){}return null;}
async function fetchUniversities(country){try{const r=await fetch(`http://universities.hipolabs.com/search?country=${encodeURIComponent(country)}`);if(r.ok){const d=await r.json();return d.slice(0,5);}}catch(_){}return null;}
async function fetchAgify(name){try{const r=await fetch(`https://api.agify.io/?name=${encodeURIComponent(name)}`);if(r.ok)return await r.json();}catch(_){}return null;}
async function fetchGenderize(name){try{const r=await fetch(`https://api.genderize.io/?name=${encodeURIComponent(name)}`);if(r.ok)return await r.json();}catch(_){}return null;}

/* ═══ Calculator ═══ */
function safeCalc(input){
  let e=input.toLowerCase().trim();
  const pct=e.match(/^([\d.]+)\s*%\s*of\s*([\d.]+)$/);if(pct)return parseFloat(pct[1])/100*parseFloat(pct[2]);
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs').replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan').replace(/\bpi\b/g,'Math.PI').replace(/\be\b/g,'Math.E').replace(/\blog\b/g,'Math.log10').replace(/\bln\b/g,'Math.log').replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil').replace(/\bround\b/g,'Math.round').replace(/\^/g,'**').replace(/×/g,'*').replace(/÷/g,'/').replace(/[^0-9+\-*/.(),%\sMathsqrtabcilognudEeP]/g,'');
  const r=Function('"use strict";return('+e+')')();
  if(typeof r!=='number'||!isFinite(r))throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}

/* ═══ Typo correction ═══ */
const TYPOS={"helo":"hello","heloo":"hello","hii":"hi","thnks":"thanks","thankyou":"thank you","thank u":"thank you","thx":"thanks","ty":"thank you","plz":"please","pls":"please","wats":"what's","wat":"what","wut":"what","u":"you","ur":"your","ya":"you","gud":"good","gr8":"great","sory":"sorry","srry":"sorry","cant":"can't","dont":"don't","didnt":"didn't","doesnt":"doesn't","isnt":"isn't","teh":"the","adn":"and","becuase":"because","im":"i'm"};
function correctTypos(text){let o=text;for(const[t,c]of Object.entries(TYPOS))o=o.replace(new RegExp(`\\b${t.replace(/'/g,"\\'")}\\b`,'gi'),c);return o;}

/* ═══ Format Wikipedia ═══ */
function formatWiki(extract){
  const abbrs=['U.S.','U.K.','Dr.','Mr.','Mrs.','Ms.','Prof.','Sr.','Jr.','etc.','e.g.','i.e.'];
  let tmp=extract;const ph={};
  abbrs.forEach((a,i)=>{const k=`__A${i}__`;ph[k]=a;tmp=tmp.replace(new RegExp(a.replace(/\./g,'\\.'),'g'),k);});
  let sentences=(tmp.match(/[^.!?]+[.!?]+/g)||[tmp]).map(s=>{for(const[k,v]of Object.entries(ph))s=s.replace(new RegExp(k,'g'),v);return s.trim();}).filter(Boolean);
  if(!sentences.length)return escHtml(extract);
  let out=`<strong>${escHtml(sentences[0])}</strong>`;
  if(sentences.length>1){out+='<br><br>';for(let i=1;i<Math.min(sentences.length,6);i++)out+=`• ${escHtml(sentences[i])}<br>`;}
  out+=`<br>${pick(["Let me know if you need more info.","Anything else you'd like to know?","Hope that helps! 😊"])}`;
  return out;
}

/* ═══ Response engine ═══ */
async function generateResponse(raw){
  if(!raw.trim())return"I didn't catch that. Could you say it again?";
  let msg=correctTypos(raw.toLowerCase().trim());

  // Fun facts
  if(msg.includes('fun fact')||msg.includes('random fact')||msg.includes('tell me a fact')||msg.includes('surprise me'))return pick(FUN_FACTS);

  // Jokes
  if(msg.includes('joke')||msg.includes('make me laugh')||msg.includes('tell me something funny')){const j=await fetchJoke();if(j)return`😄 ${j}`;}

  // Dog picture
  if(msg.includes('dog')&&(msg.includes('picture')||msg.includes('photo')||msg.includes('image')||msg.includes('show')||msg.includes('random'))){const url=await fetchDog();if(url)return`🐶 Here's a random dog!<br><br><img src="${url}" alt="Random dog" style="max-width:100%;border-radius:12px;margin-top:4px">`;}

  // Cat fact
  if(msg.includes('cat fact')||(msg.includes('cat')&&msg.includes('fact'))){const f=await fetchCatFact();if(f)return`🐱 <strong>Cat Fact:</strong><br>${escHtml(f)}`;}

  // IP address
  if(msg.includes('my ip')||msg.includes('ip address')||msg.includes('what is my ip')){const ip=await fetchIP();if(ip)return`🌐 <strong>Your IP Info</strong><br>• <strong>IP:</strong> ${escHtml(ip.ip)}<br>• <strong>City:</strong> ${escHtml(ip.city||'—')}<br>• <strong>Region:</strong> ${escHtml(ip.region||'—')}<br>• <strong>Country:</strong> ${escHtml(ip.country_name||'—')}<br>• <strong>ISP:</strong> ${escHtml(ip.org||'—')}`;}

  // Currency exchange  e.g. "convert 100 USD to EUR"
  const exMatch=msg.match(/([\d.]+)\s+([a-z]{3})\s+(?:to|in)\s+([a-z]{3})/i);
  if(exMatch){const amount=parseFloat(exMatch[1]),from=exMatch[2].toUpperCase(),to=exMatch[3].toUpperCase();const result=await fetchExchange(from,to,amount);if(result!=null)return`💱 <strong>${amount} ${from}</strong> = <strong style="color:var(--accent)">${result.toFixed(2)} ${to}</strong>`;}

  // Weather
  const wMatch=msg.match(/weather\s+(?:in|for|at)?\s*(.+)/);
  if(wMatch){const city=wMatch[1].replace(/[?.!]/g,'').trim();if(city.length>1){const w=await fetchWeatherData(city);if(w){const temp=Math.round(w.cw.temperature),wind=Math.round(w.cw.windspeed);return`🌤️ <strong>${escHtml(w.name)}, ${escHtml(w.country)}</strong><br>${wIcon(w.cw.weathercode)} ${temp}°C — ${wDesc(w.cw.weathercode)}<br>💨 Wind: ${wind} km/h &nbsp;💧 Humidity: ${w.hum}% &nbsp;🌡️ Feels like: ${w.feels}°C`;}}}

  // Calculator
  const calcPats=[/(?:calculate|compute|what(?:'s|\s+is)\s+(?:the\s+result\s+of\s+)?)([\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)/i,/^([\d][\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)\s*=?\s*\??$/i,/([\d.]+\s*%\s*of\s*[\d.]+)/i];
  for(const pat of calcPats){const m=msg.match(pat);if(m){try{const result=safeCalc(m[1]);return`🧮 <strong>${escHtml(m[1].trim())}</strong> = <strong style="color:var(--accent)">${escHtml(String(result))}</strong>`;}catch(_){}}}

  // Translation
  const tMatch=msg.match(/translate\s+"?(.+?)"?\s+(?:to|into)\s+(\w+)/i);
  if(tMatch){const tText=tMatch[1].trim(),tLang=tMatch[2].toLowerCase();const lMap={french:'fr',spanish:'es',german:'de',italian:'it',portuguese:'pt',japanese:'ja',chinese:'zh',russian:'ru',arabic:'ar',korean:'ko',dutch:'nl',polish:'pl',turkish:'tr',hindi:'hi',swedish:'sv',ukrainian:'uk',finnish:'fi',norwegian:'no',danish:'da',greek:'el',hebrew:'he',czech:'cs',romanian:'ro',hungarian:'hu',thai:'th',vietnamese:'vi',indonesian:'id'};const code=lMap[tLang];if(code){try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(tText)}&langpair=en|${code}`);const d=await r.json();const t=d.responseData?.translatedText;if(t&&d.responseStatus===200)return`🌐 <strong>${LANG_NAMES[code]||tLang}:</strong> ${escHtml(t)}`;}catch(_){}}}

  // Greetings
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k}\\b`,'i');if(re.test(msg)&&msg.replace(re,'').trim().length<5)return pick(arr);}

  // Personal
  for(const[k,arr]of Object.entries(PERSONAL)){if(msg.includes(k))return pick(arr);}

  // Code snippets
  for(const[key,code]of Object.entries(CODE_SNIPPETS)){const kParts=key.split(' ');if(kParts.every(p=>msg.includes(p)))return`💻 Here's a ${escHtml(key)} example:<br><br>${code}`;}
  if(msg.includes('code')||msg.includes('write a')||msg.includes('show me')||msg.includes('example')){
    const langs={python:'python',javascript:'javascript',js:'javascript',java:'java','c++':'cpp',html:'html',css:'css'};
    for(const[k,v]of Object.entries(langs)){if(msg.includes(k)){const starters={python:'```python\n# Python starter\ndef main():\n    print("Hello from Python!")\n\nif __name__ == "__main__":\n    main()\n```',javascript:'```javascript\n// JavaScript starter\nfunction main() {\n  console.log("Hello from JavaScript!");\n}\nmain();\n```',html:'```html\n<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>My Page</title></head>\n<body><h1>Hello World!</h1></body>\n</html>\n```',css:'```css\nbody {\n  font-family: sans-serif;\n  background: #f4f5f7;\n  color: #1a1c22;\n}\n```'};return starters[v]?`💻 Here's a ${v} starter:<br><br>${starters[v]}`:`💻 I can help with ${v} code! What should it do?`;}}
    return`💻 I can help with code! Which language? (Python, JavaScript, Java, HTML, CSS…)`;
  }

  // Knowledge base
  if(Object.keys(knowledgeBase).length>0){const words=msg.split(' ').filter(w=>w.length>3);for(const word of words){for(const content of Object.values(knowledgeBase)){if(content.toLowerCase().includes(word)){const idx=content.toLowerCase().indexOf(word);const snip=content.substring(Math.max(0,idx-80),idx+200).trim();if(snip.length>30)return`📚 From my knowledge base:<br><br>${escHtml(snip)}`;}}}};

  // Books
  if(/\b(book|books|novel|author)\b/.test(msg)){const q=msg.replace(/\b(book|books|novel|author)\b/gi,'').trim();if(q.length>2){const books=await fetchBooks(q);if(books?.length){const b=books[0];return`📖 <strong>${escHtml(b.title||'Unknown')}</strong><br>by ${escHtml(b.authors?.[0]?.name||'Unknown')}<br><br><strong>Downloads:</strong> ${(b.download_count||0).toLocaleString()} (Gutenberg)<br>${b.subjects?.length?`<strong>Subjects:</strong> ${escHtml(b.subjects.slice(0,3).join(', '))}<br>`:''}<br>Anything else?`;}}}

  // Countries
  if(msg.includes('population of')||msg.includes('capital of')||msg.includes('flag of')||msg.includes('country')){let country=msg.replace(/\b(population of|flag of|capital of|country|population|flag|the|a|an|in|of|for|about|what is|what's|show me|tell me)\b/gi,'').trim();if(country.length>2){const c=await fetchCountry(country);if(c){const name=c.name?.common||country,pop=c.population?.toLocaleString()||'Unknown',cap=(c.capital||['Unknown'])[0],region=c.region||'Unknown',cur=Object.values(c.currencies||{})[0]?.name||'Unknown',lang=Object.values(c.languages||{})[0]||'Unknown';return`🌍 <strong>${escHtml(name)}</strong><br>• <strong>Population:</strong> ${pop}<br>• <strong>Capital:</strong> ${escHtml(cap)}<br>• <strong>Region:</strong> ${escHtml(region)}<br>• <strong>Currency:</strong> ${escHtml(cur)}<br>• <strong>Language:</strong> ${escHtml(lang)}`;}}};

  // Universities  e.g. "universities in Canada"
  const uniMatch=msg.match(/universities?\s+(?:in|of)\s+(.+)/i);
  if(uniMatch){const unis=await fetchUniversities(uniMatch[1].trim());if(unis?.length){let resp=`🎓 <strong>Universities in ${escHtml(uniMatch[1].trim())}</strong><br><br>`;unis.forEach(u=>{resp+=`• <strong>${escHtml(u.name)}</strong><br>&nbsp;&nbsp;${escHtml(u.web_pages?.[0]||'')}<br>`;});return resp;}}

  // NASA / Space
  if(msg.includes('nasa')||msg.includes('space')||msg.includes('astronomy')||msg.includes('galaxy')||msg.includes('planet')){const q=msg.replace(/\b(nasa|space|astronomy|galaxy|planet|show me|tell me|about|images|photos)\b/gi,' ').trim();const results=await fetchNASA(q||'universe');if(results){let resp=`🚀 <strong>NASA Images</strong><br><br>`;results.forEach(r=>{const title=r.data?.[0]?.title||'No title';const desc=r.data?.[0]?.description?.substring(0,100)||'';resp+=`• <strong>${escHtml(title)}</strong><br>&nbsp;&nbsp;${escHtml(desc)}…<br>`;});return resp;}}

  // SpaceX
  if(msg.includes('spacex')||msg.includes('rocket launch')){const launches=await fetchSpaceX();if(launches){let resp=`🚀 <strong>Upcoming SpaceX Launches</strong><br><br>`;launches.forEach(l=>{const name=l.name||'Unknown';const date=l.date_local?new Date(l.date_local).toLocaleDateString():'TBD';resp+=`• <strong>${escHtml(name)}</strong><br>&nbsp;&nbsp;📅 ${date}<br>`;});return resp;}}

  // Crypto
  if(msg.includes('bitcoin')||msg.includes('btc')||msg.includes('ethereum')||msg.includes('eth')||msg.includes('crypto')||msg.includes('dogecoin')||msg.includes('doge')||msg.includes('litecoin')){let coin='bitcoin';if(msg.includes('ethereum')||msg.includes('eth'))coin='ethereum';else if(msg.includes('doge'))coin='dogecoin';else if(msg.includes('litecoin'))coin='litecoin';const data=await fetchCrypto(coin);if(data){const price=data.market_data?.current_price?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD'})||'Unknown';const change=(data.market_data?.price_change_percentage_24h||0).toFixed(2);const cap=data.market_data?.market_cap?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD',notation:'compact'})||'—';const arrow=parseFloat(change)>=0?'📈':'📉';return`💰 <strong>${escHtml(data.name||coin)}</strong><br>• <strong>Price:</strong> ${price}<br>• <strong>24h Change:</strong> ${arrow} ${change}%<br>• <strong>Market Cap:</strong> ${cap}`;}}

  // Reddit
  if(msg.includes('reddit')||msg.includes('r/')){let sub=msg.replace(/\b(reddit|r\/|show me|tell me|about|posts|from|hot)\b/gi,'').trim().replace(/\s+/g,'')||'programming';const posts=await fetchReddit(sub);if(posts){let resp=`📱 <strong>r/${escHtml(sub)} — Hot Posts</strong><br><br>`;posts.forEach(p=>{resp+=`• <strong>${escHtml(p.data?.title||'No title')}</strong> (${p.data?.score||0}↑)<br>`;});return resp;}}

  // Food nutrition
  const foodMatch=msg.match(/(?:nutrition|calories|food info|ingredients)\s+(?:for|of|in)?\s+(.+)/i);
  if(foodMatch){const food=await fetchFood(foodMatch[1].trim());if(food){const name=food.product_name||foodMatch[1];const cal=food.nutriments?.['energy-kcal_100g']?.toFixed(0)||'—';const fat=food.nutriments?.fat_100g?.toFixed(1)||'—';const carbs=food.nutriments?.carbohydrates_100g?.toFixed(1)||'—';const protein=food.nutriments?.proteins_100g?.toFixed(1)||'—';return`🥗 <strong>${escHtml(name)}</strong> (per 100g)<br>• <strong>Calories:</strong> ${cal} kcal<br>• <strong>Fat:</strong> ${fat}g<br>• <strong>Carbs:</strong> ${carbs}g<br>• <strong>Protein:</strong> ${protein}g`;}}

  // Age/gender prediction
  if(msg.match(/age of\s+(?:the\s+name\s+)?(\w+)/i)||msg.includes('predict age')){const nm=(msg.match(/age of\s+(?:the\s+name\s+)?(\w+)/i)||[])[1];if(nm){const[ag,ge]=await Promise.all([fetchAgify(nm),fetchGenderize(nm)]);let resp=`🔮 <strong>Predictions for "${escHtml(nm)}"</strong><br>`;if(ag?.age)resp+=`• <strong>Average age:</strong> ${ag.age}<br>`;if(ge?.gender)resp+=`• <strong>Likely gender:</strong> ${ge.gender} (${Math.round((ge.probability||0)*100)}% confidence)<br>`;return resp;}}

  // Wikipedia Q&A
  const Q_PATS=['what is','what are','what was','what were','who is','who are','who was','who were','where is','where are','when is','when was','why is','why was','how is','how was','tell me about','explain','describe','define'];
  if(Q_PATS.some(p=>msg.includes(p))){
    let topic=msg;for(const p of Q_PATS){if(msg.includes(p)){topic=msg.replace(p,'').trim();break;}}
    topic=topic.replace(/[?!.]/g,'').replace(/^(the |a |an )/i,'').trim();
    topic=correctTypos(topic);
    for(const[k,v]of Object.entries(ASTRONOMY)){if(topic.includes(k)){topic=v;break;}}
    if(topic.length>2){
      let wiki=await fetchWikiSummary(topic);
      if(!wiki){const sr=await searchWikipedia(topic);if(sr?.title)wiki=await fetchWikiSummary(sr.title);}
      if(!wiki){const ddg=await searchDDG(topic);if(ddg)wiki={extract:ddg.extract};}
      if(wiki?.extract)return formatWiki(wiki.extract);
    }
  }

  // Dictionary fallback
  const COMMON=new Set(['hi','hey','hello','how','what','why','when','where','are','you','doing','can','help','the','a','an','is','was','were','been','have','has','had','do','does','did','will','would','could','should','may','might','must','to','for','of','in','on','at','by','with','from','about','tell','just','very','too','also','some','more','then','than','only','not','but','and','or','so','if','its','it','this','that','me','my','your']);
  const words=msg.split(/\s+/).filter(w=>w.length>2&&!COMMON.has(w.replace(/[^a-z]/g,'')));
  if(words.length){const w=words[Math.floor(Math.random()*words.length)].replace(/[^a-z]/g,'');const data=await fetchWord(w);const def=getDefinition(data);if(def&&def.length>20)return`📖 <strong>${escHtml(w)}:</strong> ${escHtml(def)}`;}

  return pick(["I'm not sure I understand. Could you rephrase that? 🤔","That's interesting — could you give me more context?","I can help with weather 🌤️, math 🧮, translations 🌐, facts, code 💻, crypto 💰, and much more. What do you need?","Could you be more specific? I'd love to help! 😊"]);
}
