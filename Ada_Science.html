<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada.Science – Explore the Universe</title>
<link rel="icon" type="image/png" href="Icons/Ada.Science.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#8b5cf6;--accent-dark:#7c3aed;--accent-muted:#f3e8ff;
  --bg:#fafafa;--surface:#ffffff;--surface2:#f4f4f5;
  --border:#e4e4e7;--border2:#d4d4d8;
  --text:#18181b;--muted:#71717a;--hint:#a1a1aa;
  --user-bg:#8b5cf6;--ada-bg:#ffffff;
  --code-bg:#18181b;--code-text:#e4e4e7;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
[data-theme="dark"]{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;
  --border:#3f3f46;--border2:#52525b;
  --text:#fafafa;--muted:#a1a1aa;--hint:#71717a;
  --ada-bg:#27272a;--accent-muted:#5b21b6;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}
.new-btn{width:100%;padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font:500 13px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
.new-btn:hover{background:var(--accent-dark)}
.new-btn svg{width:14px;height:14px;flex-shrink:0}
.conv-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.conv-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:background .12s;margin-bottom:2px;font-size:12.5px;color:var(--muted);line-height:1.4;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid transparent}
.conv-item:hover{background:var(--surface2);color:var(--text)}
.conv-item.active{background:var(--accent-muted);color:var(--accent);border-color:var(--accent-muted)}
[data-theme="dark"] .conv-item.active{background:#5b21b6;color:#d8b4fe;border-color:#5b21b6}
.conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.conv-date{font-size:11px;color:var(--hint);flex-shrink:0}
.conv-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.conv-item:hover .conv-actions{opacity:1}
.conv-act-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--hint);font-size:13px;line-height:1;transition:all .12s}
.conv-act-btn:hover{background:var(--border);color:var(--text)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo-mark{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0}
.bot-name-display{font-size:15px;font-weight:600;color:var(--text);line-height:1.1}
.header-sub{font-size:11.5px;color:var(--muted);line-height:1}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-btn{width:34px;height:34px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:15px}
.hdr-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.chat-area{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:20px}
.welcome{padding:32px 0 16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.welcome-mark{width:64px;height:64px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:26px;margin-bottom:8px}
.welcome h2{font-size:22px;font-weight:600;color:var(--text)}
.welcome p{font-size:14px;color:var(--muted);max-width:420px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px}
.chip{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-av{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg-av.user-av{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.msg-body{display:flex;flex-direction:column;gap:5px;min-width:0}
.bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14.5px;line-height:1.65;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-size:11px;color:var(--hint);padding:0 4px}
.msg.user .msg-meta{text-align:right}
.typing-bubble{padding:12px 18px;background:var(--ada-bg);border:1px solid var(--border);border-radius:var(--radius-lg);border-bottom-left-radius:4px;box-shadow:var(--shadow);display:flex;gap:5px;align-items:center}
.typing-dot{width:7px;height:7px;background:var(--hint);border-radius:50%;animation:bounce 1.3s infinite}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-6px);opacity:1}}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{max-width:720px;margin:0 auto}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:8px 8px 8px 16px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--accent)}
textarea{flex:1;resize:none;border:none;background:transparent;font:14.5px/1.5 var(--font);outline:none;color:var(--text);min-height:24px;max-height:130px;overflow-y:auto;scrollbar-width:thin;padding:4px 0}
textarea::placeholder{color:var(--hint)}
.send-btn{width:36px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.04)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:16px;height:16px}
.input-hint{font-size:11.5px;color:var(--hint);margin-top:8px;text-align:center}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.space-img{width:80px;height:80px;object-fit:cover;border-radius:8px;float:left;margin-right:12px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" onclick="newChat()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        New conversation
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>
  <div class="main">
    <header>
      <img src="The Ada Project - Logo.png" alt="Ada Logo" class="logo-mark">
      <div>
        <div class="bot-name-display" id="botNameDisplay">Ada.Science</div>
        <div class="header-sub">Explore the Universe</div>
      </div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="Ask about space, physics, chemistry, or biology…" oninput="autoGrow(this)"></textarea>
          <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="2" x2="6" y2="10"/><polyline points="14 2 9 14 6 10 2 7 14 2"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let dark=false,convs=[],curId=null,busy=false;
let botName='Ada.Science';
const cache={};

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-science-dark')==='1')toggleDark();
loadConvs();if(!curId)newChat();

function toggleDark(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';localStorage.setItem('ada-science-dark',dark?'1':'0');}
function loadConvs(){const s=localStorage.getItem('ada-science-convs');if(s){convs=JSON.parse(s);renderConvs();}}
function saveConvs(){localStorage.setItem('ada-science-convs',JSON.stringify(convs));}
function fmtDate(iso){const d=new Date(iso),now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function renderConvs(){
  const el=document.getElementById('convList');
  if(!convs.length){el.innerHTML='<div style="padding:12px;font-size:12px;color:var(--hint);text-align:center">No conversations yet</div>';return;}
  el.innerHTML=convs.map(c=>`<div class="conv-item${c.id===curId?' active':''}" onclick="loadConv('${c.id}')"><div class="conv-title">${esc(c.title||'New conversation')}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0"><div class="conv-date">${fmtDate(c.date)}</div><div class="conv-actions"><button class="conv-act-btn" onclick="event.stopPropagation();dlConv('${c.id}')">⬇</button><button class="conv-act-btn" onclick="event.stopPropagation();delConv('${c.id}')">✕</button></div></div></div>`).join('');
}
function newChat(){curId=Date.now().toString();convs.unshift({id:curId,title:'New conversation',date:new Date().toISOString(),msgs:[]});saveConvs();renderConvs();document.getElementById('chatInner').innerHTML='';showWelcome();}
function loadConv(id){curId=id;const c=convs.find(x=>x.id===id);if(!c)return;document.getElementById('chatInner').innerHTML='';hideWelcome();c.msgs.forEach(m=>appendMsg(m.text,m.role,false));renderConvs();scrollBot();}
function saveMsg(text,role){if(!curId)newChat();const c=convs.find(x=>x.id===curId);if(c){c.msgs.push({text,role});if(c.msgs.length===1||c.title==='New conversation')c.title=text.slice(0,38)+(text.length>38?'…':'');saveConvs();renderConvs();}}
function delConv(id){convs=convs.filter(x=>x.id!==id);saveConvs();if(curId===id){curId=null;newChat();}else renderConvs();}
function dlConv(id){const c=convs.find(x=>x.id===id);if(!c)return;let t=`${botName}: ${c.title}\nDate: ${new Date(c.date).toLocaleString()}\n${'─'.repeat(40)}\n\n`;c.msgs.forEach(m=>{t+=`[${m.role==='ada'?botName:'You'}]: ${m.text}\n\n`;});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));a.download=`chat-${c.title.replace(/[^a-z0-9]/gi,'-')}.txt`;a.click();}

function showWelcome(){
  document.getElementById('chatInner').innerHTML=`<div class="welcome"><div class="welcome-mark">🔬</div><h2>Welcome to Ada.Science</h2><p>Ask me about space, physics, chemistry, biology, and more!</p><div class="chips"><span class="chip" onclick="qs('NASA images')">🚀 NASA Images</span><span class="chip" onclick="qs('SpaceX launches')">🛸 SpaceX</span><span class="chip" onclick="qs('Periodic table')">⚗️ Elements</span><span class="chip" onclick="qs('DNA structure')">🧬 DNA</span><span class="chip" onclick="qs('Physics basics')">⚡ Physics</span></div></div>`;
}
function hideWelcome(){const w=document.getElementById('chatInner').querySelector('.welcome');if(w)w.remove();}

async function send(){
  if(busy)return;
  const inp=document.getElementById('msgInput');const text=inp.value.trim();if(!text)return;
  busy=true;document.querySelector('.send-btn').disabled=true;
  hideWelcome();appendMsg(text,'user');saveMsg(text,'user');inp.value='';inp.style.height='auto';
  const ty=appendTyping();
  try{
    const r=await respond(text);ty.remove();appendMsg(r,'ada');saveMsg(r,'ada');
  }catch(e){ty.remove();appendMsg('Something went wrong — please try again. 😕','ada');}
  finally{busy=false;document.querySelector('.send-btn').disabled=false;}
}
function qs(t){document.getElementById('msgInput').value=t;send();}

function appendMsg(text,role,doScroll=true){
  const ci=document.getElementById('chatInner');
  const w=document.createElement('div');w.className=`msg ${role}`;
  const av=document.createElement('div');av.className=role==='ada'?'msg-av':'msg-av user-av';av.textContent=role==='ada'?'S':'U';
  const body=document.createElement('div');body.className='msg-body';
  const bub=document.createElement('div');bub.className='bubble';
  if(role==='ada')bub.innerHTML=renderMd(text);else bub.textContent=text;
  const meta=document.createElement('div');meta.className='msg-meta';meta.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  body.appendChild(bub);body.appendChild(meta);w.appendChild(av);w.appendChild(body);ci.appendChild(w);
  if(doScroll)scrollBot();
}
function appendTyping(){
  const ci=document.getElementById('chatInner');
  const w=document.createElement('div');w.className='msg ada';
  w.innerHTML=`<div class="msg-av">S</div><div class="msg-body"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  ci.appendChild(w);scrollBot();return w;
}
function scrollBot(){requestAnimationFrame(()=>{const ca=document.getElementById('chatArea');ca.scrollTop=ca.scrollHeight;});}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}
function renderMd(text){
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\n/g,'<br>');
  return text;
}

// NASA API
async function getNASAImages(query){
  const key=`nasa_${query}`;
  if(cache.nasa?.[key])return cache.nasa[key];
  try{
    const r=await fetch(`https://images-api.nasa.gov/search?q=${encodeURIComponent(query)}&media_type=image`);
    if(r.ok){
      const d=await r.json();
      if(!cache.nasa)cache.nasa={};
      cache.nasa[key]=d;
      return d;
    }
  }catch(_){}
  return null;
}

// SpaceX API
async function getSpaceXLaunches(){
  const key='spacex_launches';
  if(cache.spacex?.[key])return cache.spacex[key];
  try{
    const r=await fetch('https://api.spacexdata.com/v4/launches/upcoming');
    if(r.ok){
      const d=await r.json();
      if(!cache.spacex)cache.spacex={};
      cache.spacex[key]=d;
      return d;
    }
  }catch(_){}
  return null;
}

async function respond(raw){
  const msg=raw.toLowerCase().trim();
  
  // Greetings
  const GREETINGS={'hi':'Hi there! 🔬 What scientific topic interests you?','hello':'Hello! 🚀 Ask me about space, physics, chemistry, or biology!','hey':'Hey! ⚗️ What would you like to learn about today?','what can you do':"I can help you explore space, physics, chemistry, biology, and more! Ask me about NASA, SpaceX, the periodic table, or scientific concepts!"};
  for(const[k,v]of Object.entries(GREETINGS)){if(msg.includes(k))return v;}
  
  // NASA images
  if(/nasa|space|astronomy|hubble|james webb/i.test(msg)){
    const query=msg.replace(/(?:nasa|space|astronomy|hubble|james webb|show|me|about|images?|photos?)\b/gi,' ').trim()||'galaxy';
    const results=await getNASAImages(query);
    if(results?.collection?.items?.length){
      let out='🚀 **NASA Image Library**\n\n';
      results.collection.items.slice(0,3).forEach(r=>{
        const title=r.data?.[0]?.title||'';
        const desc=(r.data?.[0]?.description||'').substring(0,100);
        const img=r.links?.[0]?.href||'';
        out+=`**${esc(title)}**\n${img?`![${esc(title)}](${img})\n`:''}${desc?esc(desc)+'…\n':''}\n`;
      });
      return out;
    }
  }
  
  // SpaceX launches
  if(/spacex|rocket launch|falcon|starship/i.test(msg)){
    const launches=await getSpaceXLaunches();
    if(launches?.length){
      let out='🛸 **Upcoming SpaceX Launches**\n\n';
      launches.slice(0,4).forEach(l=>{
        const name=l.name||'Unknown';
        const date=l.date_local?new Date(l.date_local).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'TBD';
        out+=`• **${esc(name)}**\n  Date: ${date}\n\n`;
      });
      return out;
    }
  }
  
  // Periodic table
  if(/periodic table|element|chemical|atom/i.test(msg)){
    const elementM=msg.match(/(?:tell me about|info about)\s+(?:the element)?\s*([a-z]+?)$/i);
    const element=elementM?elementM[1].trim():'hydrogen';
    const elements={
      'hydrogen':'H - Atomic #1\n\nLightest element, most abundant in universe. Used in fuel cells and rocket fuel.',
      'helium':'He - Atomic #2\n\nInert gas, second most abundant. Used in balloons, cooling, and deep-sea diving.',
      'carbon':'C - Atomic #6\n\nBasis of all organic life. Found in diamonds, graphite, and all living organisms.',
      'oxygen':'O - Atomic #8\n\nEssential for respiration. Makes up 21% of Earth\'s atmosphere.',
      'iron':'Fe - Atomic #26\n\nMost common metal on Earth. Essential for blood (hemoglobin) and steel production.',
      'gold':'Au - Atomic #79\n\nPrecious metal, highly conductive. Used in electronics, jewelry, and as monetary standard.'
    };
    const info=elements[element.toLowerCase()]||elements['hydrogen'];
    return `⚗️ **${esc(element.charAt(0).toUpperCase()+element.slice(1))}**\n\n${info}`;
  }
  
  // Physics concepts
  if(/physics|force|energy|gravity|quantum/i.test(msg)){
    if(/gravity/i.test(msg)){
      return `⚡ **Gravity**

**Newton's Law of Universal Gravitation:**
F = G × (m₁ × m₂) / r²

Where:
• F = gravitational force
• G = gravitational constant (6.674×10⁻¹¹ N·m²/kg²)
• m₁, m₂ = masses of the objects
• r = distance between centers

**Interesting facts:**
• Gravity is the weakest of the four fundamental forces
• It's responsible for Earth's orbit around the Sun
• Without gravity, we would float off into space`;
    }
    if(/quantum/i.test(msg)){
      return `⚡ **Quantum Mechanics**

**Key concepts:**
• Wave-particle duality - particles behave like waves
• Uncertainty principle - can't know position and momentum exactly
• Superposition - particles exist in multiple states simultaneously
• Entanglement - particles linked across distances

**Applications:**
• Quantum computing
• Quantum cryptography
• MRI machines
• Lasers and semiconductors`;
    }
    return `⚡ **Physics Fundamentals**

**Newton's Laws:**
1. An object at rest stays at rest (inertia)
2. F = ma (force equals mass times acceleration)
3. Every action has an equal and opposite reaction

**Energy types:**
• Kinetic (motion)
• Potential (stored)
• Thermal (heat)
• Chemical (bonds)
• Electrical (charge)`;
  }
  
  // DNA
  if(/dna|genetics|gene/i.test(msg)){
    return `🧬 **DNA (Deoxyribonucleic Acid)**

**Structure:**
• Double helix discovered by Watson and Crick (1953)
• Made of nucleotides: A, T, C, G
• A pairs with T, C pairs with G
• Contains genetic instructions for life

**Function:**
• Stores genetic information
• Controls cell activities
• Passed from parents to offspring
• Determines traits and characteristics

**Fun facts:**
• Human DNA is 99.9% identical between individuals
• If unwound, your DNA would stretch 10 billion miles
• You share 50% DNA with each parent`;
  }
  
  // Biology basics
  if(/biology|cell|organism/i.test(msg)){
    return `🧬 **Cell Biology**

**Cell types:**
• Prokaryotic - no nucleus (bacteria)
• Eukaryotic - with nucleus (plants, animals, humans)

**Cell organelles:**
• Nucleus - contains DNA
