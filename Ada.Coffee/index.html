<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada.Coffee – Geospatial Hub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#8b5a2b;--accent-dark:#6b4423;
  --bg:#f4f5f7;--surface:#fff;--border:#e2e4e9;
  --text:#1a1c22;--muted:#6b7280;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1c22;--border:#2d3040;
  --text:#e8eaf0;--muted:#9ca3af;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;transition:background .25s}

header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.ada-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a67c52);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
header h1{font-size:16px;font-weight:700;color:var(--text)}
header p{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:5px}
.hdr-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:14px}
.hdr-btn:hover{background:var(--bg);color:var(--text)}

.search-container{display:flex;align-items:center;gap:8px;margin-left:16px}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);font-size:13px;width:200px;outline:none;transition:all .15s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,90,43,.1)}
.search-input::placeholder{color:var(--muted)}

.main-container{flex:1;display:grid;grid-template-columns:300px 1fr 320px;gap:0;overflow:hidden}

.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-right{border-right:none;border-left:1px solid var(--border)}

.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;color:var(--text);font-size:14px;display:flex;align-items:center;gap:8px}
.sidebar-content{flex:1;overflow-y:auto;padding:12px 16px}

.map-container{background:#e8eaf0;position:relative}
#map{width:100%;height:100%}

.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-weight:600;color:var(--text);font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.weather-main{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.weather-icon{font-size:36px}
.weather-temp{font-size:28px;font-weight:700;color:var(--text)}
.weather-detail{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:4px}
.country-flag{font-size:48px;margin-bottom:8px}
.country-info{font-size:13px;color:var(--muted);line-height:1.6}
.country-info strong{color:var(--text)}

.news-item{padding:10px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-title{font-weight:600;color:var(--text);font-size:13px;margin-bottom:4px;line-height:1.4}
.news-source{font-size:11px;color:var(--muted)}
.news-time{font-size:11px;color:var(--muted);margin-top:2px}

.loading{text-align:center;padding:20px;color:var(--muted)}
.error{text-align:center;padding:20px;color:#ef4444;font-size:13px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="ada-dot">C</div>
  <div><h1>Ada.Coffee</h1><p>Geospatial Hub</p></div>
  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="Search address..." onkeypress="handleSearchKeypress(event)">
    <button class="hdr-btn" onclick="searchAddress()" title="Search">🔍</button>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" title="Toggle dark mode" onclick="toggleDark()" id="darkBtn">🌙</button>
  </div>
</header>

<div class="main-container">
  <!-- Left Sidebar: Weather & Country -->
  <div class="sidebar">
    <div class="sidebar-header">🌍 Location Info</div>
    <div class="sidebar-content">
      <div class="card" id="weatherCard">
        <div class="card-title">🌤️ Weather</div>
        <div id="weatherContent">
          <div class="loading">Loading weather...</div>
        </div>
      </div>
      <div class="card" id="countryCard">
        <div class="card-title">🏳️ Country</div>
        <div id="countryContent">
          <div class="loading">Loading country info...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Center: Map -->
  <div class="map-container">
    <div id="map"></div>
  </div>

  <!-- Right Sidebar: News -->
  <div class="sidebar sidebar-right">
    <div class="sidebar-header">📰 News Feed</div>
    <div class="sidebar-content" id="newsContent">
      <div class="loading">Loading news...</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, marker;
let darkMode = false;
let currentCountry = '';

// Initialize map
function initMap() {
  map = L.map('map').setView([40.7128, -74.0060], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  marker = L.marker([40.7128, -74.0060], { draggable: true }).addTo(map);
  
  marker.on('dragend', function(e) {
    const latlng = e.target.getLatLng();
    updateLocation(latlng.lat, latlng.lng);
  });

  map.on('click', function(e) {
    marker.setLatLng(e.latlng);
    updateLocation(e.latlng.lat, e.latlng.lng);
  });

  updateLocation(40.7128, -74.0060);
}

// Update location and fetch data
async function updateLocation(lat, lng) {
  const coords = validateCoordinates(lat, lng);
  currentLat = coords.lat;
  currentLng = coords.lng;
  await Promise.all([
    fetchWeather(coords.lat, coords.lng),
    fetchCountry(coords.lat, coords.lng)
  ]);
}

// Handle search keypress (Enter to search)
function handleSearchKeypress(event) {
  if (event.key === 'Enter') {
    searchAddress();
  }
}

// Search for address using OpenStreetMap geocoding
async function searchAddress() {
  const input = document.getElementById('searchInput');
  const address = input.value.trim();
  
  if (!address) return;
  
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
    const data = await res.json();
    
    if (data && data.length > 0) {
      const result = data[0];
      const lat = parseFloat(result.lat);
      const lng = parseFloat(result.lon);
      
      // Move map to location
      map.setView([lat, lng], 12);
      marker.setLatLng([lat, lng]);
      
      // Update data
      updateLocation(lat, lng);
      
      // Clear input
      input.value = '';
    } else {
      alert('Address not found');
    }
  } catch (e) {
    console.error('Search failed:', e);
    alert('Search failed. Please try again.');
  }
}

// Fetch weather from Open-Meteo
async function fetchWeather(lat, lng, population = null) {
  const content = document.getElementById('weatherContent');
  content.innerHTML = '<div class="loading">Loading weather...</div>';

  try {
    console.log('Fetching weather for:', lat, lng);
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature&timezone=auto&forecast_days=1`);
    console.log('Weather API response status:', res.status);
    
    if (!res.ok) {
      throw new Error(`Weather API returned ${res.status}`);
    }
    
    const data = await res.json();
    console.log('Weather API data:', data);
    
    const current = data.current_weather;
    if (!current) {
      throw new Error('No current weather data returned');
    }
    
    const humidity = data.hourly?.relativehumidity_2m?.[0] || '—';
    const feelsLike = data.hourly?.apparent_temperature?.[0] != null ? Math.round(data.hourly.apparent_temperature[0]) : '—';

    const temp = Math.round(current.temperature);
    const wind = Math.round(current.windspeed);
    const icon = getWeatherIcon(current.weathercode);

    content.innerHTML = `
      <div class="weather-main">
        <span class="weather-icon">${icon}</span>
        <span class="weather-temp">${temp}°C</span>
      </div>
      <div class="weather-detail">
        <span>💨 ${wind} km/h</span>
        <span>💧 ${humidity}%</span>
      </div>
      <div class="weather-detail">
        <span>🌡️ Feels like ${feelsLike}°C</span>
      </div>
      ${population ? `<div class="weather-detail"><span>👥 Population: ${population}</span></div>` : ''}
    `;
  } catch (e) {
    console.error('Failed to fetch weather:', e);
    content.innerHTML = '<div class="error">Invalid location for weather</div>';
  }
}

// Fetch country info from REST Countries
async function fetchCountry(lat, lng) {
  const content = document.getElementById('countryContent');
  content.innerHTML = '<div class="loading">Loading country info...</div>';

  try {
    console.log('Fetching country info for:', lat, lng);
    const res = await fetch(`https://restcountries.com/v3.1/rev/geocode?lat=${lat}&lon=${lng}`);
    console.log('Country API response status:', res.status);
    let data = await res.json();
    console.log('Country API data:', data);
    
    if (!data || !data.length) {
      console.log('No data from geocode, trying fallback');
      // Fallback to reverse geocoding
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
      console.log('Reverse geocode status:', geoRes.status);
      const geoData = await geoRes.json();
      console.log('Reverse geocode data:', geoData);
      if (geoData.address?.country_code) {
        const countryRes = await fetch(`https://restcountries.com/v3.1/alpha/${geoData.address.country_code}`);
        console.log('Country by code status:', countryRes.status);
        data = await countryRes.json();
        console.log('Country by code data:', data);
      } else if (geoData.address?.country) {
        // If no country code but we have country name, use that
        currentCountry = geoData.address.country;
        await fetchNews(currentCountry);
        content.innerHTML = `
          <div class="country-info">
            <strong>Name:</strong> ${geoData.address.country}<br>
            <strong>Capital:</strong> —<br>
            <strong>Population:</strong> —<br>
            <strong>Currency:</strong> —
          </div>
        `;
        return;
      }
    }

    if (data && data.length) {
      const country = data[0];
      const flag = country.flags?.emoji || '🏳️';
      const name = country.name?.common || 'Unknown';
      const capital = country.capital?.[0] || '—';
      const population = country.population?.toLocaleString() || '—';
      const currency = country.currencies ? Object.values(country.currencies)[0]?.name || '—' : '—';

      currentCountry = name;
      await fetchNews(name);
      
      // Update weather with population
      await fetchWeather(currentLat, currentLng, population);

      content.innerHTML = `
        <div class="country-flag">${flag}</div>
        <div class="country-info">
          <strong>Name:</strong> ${name}<br>
          <strong>Capital:</strong> ${capital}<br>
          <strong>Currency:</strong> ${currency}
        </div>
      `;
    } else {
      console.log('No country found - likely in ocean or invalid location');
      currentCountry = 'International Waters';
      await fetchNews(currentCountry);
      content.innerHTML = `
        <div class="country-info">
          <strong>Location:</strong> International Waters<br>
          <strong>Capital:</strong> —<br>
          <strong>Currency:</strong> —
        </div>
      `;
    }
  } catch (e) {
    console.error('Failed to fetch country info:', e);
    currentCountry = 'Unknown Location';
    await fetchNews(currentCountry);
    content.innerHTML = '<div class="error">Location detection failed</div>';
  }
}

// Fetch news from Actually Relevant News API (free, no API key required)
async function fetchNews(country) {
  const content = document.getElementById('newsContent');
  content.innerHTML = '<div class="loading">Loading news...</div>';

  // Detect detailed location (country, state/province, region)
  const location = await getLocationDetails(currentLat, currentLng);
  
  if (location) {
    content.innerHTML = `
      <div class="news-item">
        <div class="news-title">${escapeHtml(location)}</div>
        <div class="news-source">Location detected</div>
      </div>
    `;
  } else {
    content.innerHTML = `
      <div class="news-item">
        <div class="news-title">${country}</div>
        <div class="news-source">Location detected</div>
      </div>
    `;
  }
  
  // Actually Relevant News API - curated global news that matters to humanity
  try {
    console.log('Fetching news from Actually Relevant API...');
    const res = await fetch('https://actually-relevant-api.onrender.com/api/feed');
    console.log('News API response status:', res.status);
    
    const text = await res.text();
    console.log('News API response length:', text.length);
    
    // Parse RSS feed
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(text, 'text/xml');
    const items = xmlDoc.querySelectorAll('item');
    console.log('News items found:', items.length);
    
    const newsItems = [];
    items.forEach(item => {
      const title = item.querySelector('title')?.textContent || '';
      const link = item.querySelector('link')?.textContent || '';
      const description = item.querySelector('description')?.textContent || '';
      const category = item.querySelector('category')?.textContent || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      
      newsItems.push({ title, link, description, category, pubDate });
    });

    if (newsItems.length > 0) {
      content.innerHTML = (content.innerHTML || '') + newsItems.slice(0, 10).map(item => `
        <div class="news-item">
          <div class="news-title">${escapeHtml(item.title)}</div>
          <div class="news-source">${escapeHtml(item.category || 'Actually Relevant')}</div>
          <div class="news-time">${formatDate(item.pubDate)}</div>
        </div>
      `).join('');
    } else {
      console.log('No news items found in RSS feed');
      content.innerHTML = (content.innerHTML || '') + `
        <div class="news-item">
          <div class="news-title">No news available</div>
          <div class="news-source">API returned no items</div>
        </div>
      `;
    }
  } catch (e) {
    console.error('Failed to fetch news:', e);
    content.innerHTML = (content.innerHTML || '') + `
      <div class="error">Failed to load news</div>
      <div class="news-item">
        <div class="news-title">API Error: ${escapeHtml(e.message)}</div>
        <div class="news-source">Check browser console for details</div>
      </div>
    `;
  }
}

let currentLat, currentLng;

// Validate and clamp coordinates to valid ranges
function validateCoordinates(lat, lng) {
  // Clamp latitude to -90 to 90
  const clampedLat = Math.max(-90, Math.min(90, lat));
  // Clamp longitude to -180 to 180
  const clampedLng = ((lng + 180) % 360 + 360) % 360 - 180;
  return { lat: clampedLat, lng: clampedLng };
}

// Update location and fetch data
async function updateLocation(lat, lng) {
  const coords = validateCoordinates(lat, lng);
  currentLat = coords.lat;
  currentLng = coords.lng;
  await Promise.all([
    fetchWeather(coords.lat, coords.lng),
    fetchCountry(coords.lat, coords.lng)
  ]);
}

// Get detailed location from coordinates (works globally)
async function getLocationDetails(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`);
    const data = await res.json();
    
    const address = data.address || {};
    const parts = [];
    
    // Add country
    if (address.country) parts.push(address.country);
    
    // Add state/province/region
    const region = address.state || address.province || address.region || address.county || address.state_district;
    if (region && region !== address.country) parts.push(region);
    
    // Add city/town if available
    const city = address.city || address.town || address.village || address.municipality;
    if (city) parts.push(city);
    
    return parts.length > 0 ? parts.join(', ') : null;
  } catch (e) {
    return null;
  }
}

}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '⛅';
  if (code <= 3) return '☁️';
  if (code <= 49) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦️';
  if (code <= 86) return '🌨️';
  return '⛈️';
}

function toggleDark() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('ada-coffee-dark', darkMode ? '1' : '0');
}

// Initialize
if (localStorage.getItem('ada-coffee-dark') === '1') toggleDark();
initMap();
</script>
</body>
