<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada – Bare Minimum</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#ec4899;--accent-dark:#db2777;
  --bg:#f4f5f7;--surface:#fff;--border:#e2e4e9;
  --text:#1a1c22;--muted:#6b7280;
  --user-bubble:#ec4899;--ada-bubble:#fff;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --toast-bg:#1a1c22;--toast-text:#fff;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1c22;--border:#2d3040;
  --text:#e8eaf0;--muted:#9ca3af;
  --ada-bubble:#252836;--user-bubble:#db2777;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --toast-bg:#e8eaf0;--toast-text:#1a1c22;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .25s}
.app{width:100%;max-width:700px;height:100dvh;max-height:900px;background:var(--surface);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:background .25s}
@media(max-width:720px){.app{border-radius:0;max-height:100dvh}}
header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);transition:background .25s,border-color .25s}
.ada-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f472b6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
header h1{font-size:16px;font-weight:700;color:var(--text)}
header p{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:5px}
.hdr-btn{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:14px}
.hdr-btn:hover{background:var(--bg);color:var(--text)}
.chat{flex:1;overflow-y:auto;padding:14px 12px;scroll-behavior:smooth;display:flex;flex-direction:column;gap:10px;min-height:0}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.welcome{text-align:center;margin:auto;padding:24px 12px}
.welcome .big-dot{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f472b6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:24px;margin:0 auto 12px}
.welcome h2{font-size:18px;color:var(--text);margin-bottom:6px}
.welcome p{font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 14px}
.quick-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{padding:5px 11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.msg.ada .msg-avatar{background:linear-gradient(135deg,var(--accent),#f472b6)}
.msg.user .msg-avatar{background:#34d399}
.msg-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bubble);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;transition:background .25s,border-color .25s}
.msg.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
.code-block{background:#1e1e2e;color:#cdd6f4;border-radius:10px;padding:12px;font-family:'Courier New',monospace;font-size:12.5px;overflow-x:auto;margin:6px 0;position:relative;line-height:1.6}
.code-lang{font-size:10px;color:#7c7f93;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.copy-code{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;color:#cdd6f4;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:background .15s}
.copy-code:hover{background:rgba(255,255,255,.2)}
.code-block pre{white-space:pre-wrap;word-break:break-word}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;background:var(--ada-bubble);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;transition:background .25s,border-color .25s}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
.input-area{padding:10px 12px 13px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background .25s,border-color .25s}
.input-row{display:flex;gap:6px;align-items:flex-end}
textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:14px;font-family:inherit;outline:none;line-height:1.5;max-height:110px;overflow-y:auto;transition:border-color .2s,background .25s;background:var(--bg);color:var(--text)}
textarea:focus{border-color:var(--accent);background:var(--surface)}
textarea::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.05)}
.send-btn:active{transform:scale(.96)}
.send-btn svg{width:15px;height:15px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);color:var(--toast-text);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:1000;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ada-dot">A</div>
    <div><h1>Ada</h1><p>Bare Minimum</p></div>
    <div class="hdr-btns">
      <button class="hdr-btn" title="Toggle dark mode" onclick="toggleDark()" id="darkBtn">🌙</button>
    </div>
  </header>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="big-dot">A</div>
      <h2>Hello, I'm Ada!</h2>
      <p>This is the bare minimum build. I can chat, do math, and help with code — all without external APIs.</p>
      <div class="quick-chips">
        <span class="chip" onclick="quickSend('Hello')">👋 Hello</span>
        <span class="chip" onclick="quickSend('Tell me a fun fact')">✨ Fun fact</span>
        <span class="chip" onclick="quickSend('Calculate 15% of 240')">🧮 Math</span>
        <span class="chip" onclick="quickSend('Write a Python hello world')">💻 Code</span>
        <span class="chip" onclick="quickSend('What can you do?')">❓ What can you do?</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="Message Ada…" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="send()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══ State ═══ */
let darkMode=false;

/* ═══ Init ═══ */
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-dark')==='1')toggleDark();


/* ═══ Dark mode ═══ */
function toggleDark(){darkMode=!darkMode;document.documentElement.setAttribute('data-theme',darkMode?'dark':'');document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';localStorage.setItem('ada-dark',darkMode?'1':'0');}

/* ═══ Helpers ═══ */
function quickSend(t){document.getElementById('msgInput').value=t;send();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);}

/* ═══ Send ═══ */
async function send(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text)return;
  removeWelcome();
  appendMessage(text,'user');
  input.value='';input.style.height='auto';
  const tyEl=appendTyping();
  // Small delay to mimic thinking
  await new Promise(r=>setTimeout(r,400+Math.random()*400));
  const reply=generateResponse(text);
  tyEl.remove();
  appendMessage(reply,'ada');
}

function removeWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}

function appendTyping(){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className='msg ada';
  wrap.innerHTML='<div class="msg-avatar">A</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;return wrap;
}

function appendMessage(text,sender){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className=`msg ${sender}`;
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=sender==='ada'?'A':'U';
  const body=document.createElement('div');body.className='msg-body';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(sender==='ada')bubble.innerHTML=renderAdaText(text);
  else bubble.textContent=text;
  body.appendChild(bubble);
  wrap.appendChild(avatar);wrap.appendChild(body);
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
}

function renderAdaText(text){
  return text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const l=lang||'code';const id='cb'+Math.random().toString(36).slice(2);
    return `<div class="code-block"><div class="code-lang">${escHtml(l)}</div><button class="copy-code" onclick="copyCode('${id}')">Copy</button><pre id="${id}">${escHtml(code.trim())}</pre></div>`;
  });
}
function copyCode(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Copied!'));}

/* ═══ Typo correction ═══ */
const TYPOS={"helo":"hello","heloo":"hello","hii":"hi","thnks":"thanks","thankyou":"thank you","thx":"thanks","ty":"thank you","plz":"please","pls":"please","u":"you","ur":"your","gud":"good","gr8":"great","sory":"sorry","srry":"sorry","cant":"can't","dont":"don't","im":"i'm"};
function correctTypos(text){let o=text;for(const[t,c]of Object.entries(TYPOS))o=o.replace(new RegExp(`\\b${t.replace(/'/g,"\\'")}\\b`,'gi'),c);return o;}

/* ═══ Calculator (no external API) ═══ */
function safeCalc(input){
  let e=input.toLowerCase().trim();
  const pct=e.match(/^([\d.]+)\s*%\s*of\s*([\d.]+)$/);if(pct)return parseFloat(pct[1])/100*parseFloat(pct[2]);
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs').replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan').replace(/\bpi\b/g,'Math.PI').replace(/\be\b/g,'Math.E').replace(/\blog\b/g,'Math.log10').replace(/\bln\b/g,'Math.log').replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil').replace(/\bround\b/g,'Math.round').replace(/\^/g,'**').replace(/×/g,'*').replace(/÷/g,'/').replace(/[^0-9+\-*/.(),%\sMathsqrtabcilognudEeP]/g,'');
  const r=Function('"use strict";return('+e+')')();
  if(typeof r!=='number'||!isFinite(r))throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}

/* ═══ Static data ═══ */
const GREETINGS={
  'hi':["Hello! How can I help you today? 😊","Hi there! What's on your mind?"],
  'hello':["Hi! Great to see you. How can I help?","Hello! What would you like to know?"],
  'hey':["Hey! How can I help?","Hi there! What can I do for you?"],
  'how are you':["I'm doing great, thanks for asking! How about you? 😊","Functioning perfectly! What can I help with?"],
  'good morning':["Good morning! ☀️ Hope your day is great."],
  'good night':["Good night! 🌙 Sleep well."],
  'bye':["Goodbye! Take care! 👋","See you later!"],
  'thank you':["You're welcome! 😊","Happy to help!"],
  'thanks':["You're welcome!","Anytime! 😊"],
  'what can you do':["I can chat 💬, do math 🧮, help with code 💻, and answer questions from my knowledge base. Add facts below to teach me more!"]
};
const PERSONAL={
  'i love cats':["Cats are wonderful! 🐱"],'i love dogs':["Dogs are amazing! 🐶"],
  'i love':["That's great! Tell me more about it. 😊"],
  'do you like':["As an AI I don't have personal preferences, but I'm here to help!"],
  'do you love':["I'm an AI, so I don't feel emotions, but I love being helpful! 😊"]
};
const FUN_FACTS=["🦊 A group of flamingos is called a 'flamboyance'.","🍯 Honey never spoils — archaeologists found 3,000-year-old honey in Egyptian tombs.","🌊 The ocean produces over 50% of Earth's oxygen.","🐙 Octopuses have three hearts and blue blood!","🌙 A day on Venus is longer than a year on Venus.","🐘 Elephants are the only animals that can't jump.","⚡ Lightning strikes Earth about 100 times per second.","🦋 Butterflies taste with their feet.","🔢 There are more possible chess games than atoms in the observable universe.","🧠 Your brain generates about 20 watts — enough to power a dim light bulb.","🦈 Sharks are older than trees — they've existed for over 400 million years.","🌌 There are more stars in the universe than grains of sand on all Earth's beaches."];
const CODE_SNIPPETS={'hello world python':'```python\nprint("Hello, World!")\n```','hello world javascript':'```javascript\nconsole.log("Hello, World!");\n```','hello world java':'```java\npublic class Main {\n  public static void main(String[] args) {\n    System.out.println("Hello, World!");\n  }\n}\n```','hello world html':'```html\n<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Hello</title></head>\n<body><h1>Hello, World!</h1></body>\n</html>\n```','for loop python':'```python\nfor i in range(10):\n    print(i)\n```','for loop javascript':'```javascript\nfor (let i = 0; i < 10; i++) {\n  console.log(i);\n}\n```','function python':'```python\ndef greet(name):\n    return f"Hello, {name}!"\nprint(greet("Ada"))\n```','function javascript':'```javascript\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\nconsole.log(greet("Ada"));\n```','fibonacci python':'```python\ndef fibonacci(n):\n    a, b = 0, 1\n    for _ in range(n):\n        print(a, end=" ")\n        a, b = b, a + b\nfibonacci(10)\n```'};

/* ═══ Response engine (no external APIs — local only) ═══ */
function generateResponse(raw){
  if(!raw.trim())return"I didn't catch that. Could you say it again?";
  let msg=correctTypos(raw.toLowerCase().trim());

  // Fun facts
  if(msg.includes('fun fact')||msg.includes('random fact')||msg.includes('surprise me'))return pick(FUN_FACTS);

  // Calculator
  const calcPats=[/(?:calculate|compute|what(?:'s|\s+is)\s+(?:the\s+result\s+of\s+)?)([\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)/i,/^([\d][\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)\s*=?\s*\??$/i,/([\d.]+\s*%\s*of\s*[\d.]+)/i];
  for(const pat of calcPats){const m=msg.match(pat);if(m){try{const result=safeCalc(m[1]);return`🧮 <strong>${escHtml(m[1].trim())}</strong> = <strong style="color:var(--accent)">${escHtml(String(result))}</strong>`;}catch(_){}}}

  // Greetings
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k}\\b`,'i');if(re.test(msg)&&msg.replace(re,'').trim().length<5)return pick(arr);}

  // Personal
  for(const[k,arr]of Object.entries(PERSONAL)){if(msg.includes(k))return pick(arr);}

  // Code snippets
  for(const[key,code]of Object.entries(CODE_SNIPPETS)){const kParts=key.split(' ');if(kParts.every(p=>msg.includes(p)))return`💻 Here's a ${escHtml(key)} example:<br><br>${code}`;}
  if(msg.includes('code')||msg.includes('write a')||msg.includes('show me')||msg.includes('example')){
    const langs={python:'python',javascript:'javascript',js:'javascript',java:'java',html:'html',css:'css'};
    for(const[k,v]of Object.entries(langs)){if(msg.includes(k)){const starters={python:'```python\n# Python starter\ndef main():\n    print("Hello from Python!")\n\nif __name__ == "__main__":\n    main()\n```',javascript:'```javascript\n// JavaScript starter\nfunction main() {\n  console.log("Hello!");\n}\nmain();\n```',html:'```html\n<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Page</title></head>\n<body><h1>Hello World!</h1></body>\n</html>\n```',css:'```css\nbody {\n  font-family: sans-serif;\n  background: #f4f5f7;\n  color: #1a1c22;\n}\n```'};return starters[v]?`💻 Here's a ${v} starter:<br><br>${starters[v]}`:`💻 I can help with ${v} code! What should it do?`;}}
    return`💻 I can help with code! Which language? (Python, JavaScript, Java, HTML, CSS…)`;
  }

  // Fallback
  return pick([
    "I'm not sure I understand. Could you rephrase that? 🤔",
    "That's interesting — could you give me more context?",
    "I can do math 🧮 and help with code 💻. You can also add knowledge below to teach me more!",
    "Could you be more specific? I'd love to help! 😊"
  ]);
}
</script>
</body>
</html>
