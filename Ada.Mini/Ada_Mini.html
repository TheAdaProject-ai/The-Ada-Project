<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada – Bare Minimum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#be185d;--accent-dark:#9d174d;--accent-muted:#fce7f3;
  --bg:#fafafa;--surface:#ffffff;--surface2:#f4f4f5;
  --border:#e4e4e7;--border2:#d4d4d8;
  --text:#18181b;--muted:#71717a;--hint:#a1a1aa;
  --user-bg:#be185d;--ada-bg:#ffffff;
  --code-bg:#18181b;--code-text:#e4e4e7;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
[data-theme="dark"]{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;
  --border:#3f3f46;--border2:#52525b;
  --text:#fafafa;--muted:#a1a1aa;--hint:#71717a;
  --ada-bg:#27272a;--accent-muted:#500724;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}
.new-btn{width:100%;padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font:500 13px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
.new-btn:hover{background:var(--accent-dark)}
.new-btn svg{width:14px;height:14px;flex-shrink:0}
.conv-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin}
.conv-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:background .12s;margin-bottom:2px;font-size:12.5px;color:var(--muted);line-height:1.4;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid transparent}
.conv-item:hover{background:var(--surface2);color:var(--text)}
.conv-item.active{background:var(--accent-muted);color:var(--accent);border-color:var(--accent-muted)}
[data-theme="dark"] .conv-item.active{background:#500724;color:#fbcfe8;border-color:#500724}
.conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.conv-date{font-size:11px;color:var(--hint);flex-shrink:0}
.conv-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.conv-item:hover .conv-actions{opacity:1}
.conv-act-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--hint);font-size:13px;line-height:1;transition:all .12s}
.conv-act-btn:hover{background:var(--border);color:var(--text)}
/* KB panel */
.kb-panel{border-top:1px solid var(--border);padding:12px 16px}
.kb-label{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kb-field textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font:13px var(--font);background:var(--surface2);color:var(--text);outline:none;resize:none;min-height:72px;line-height:1.5;transition:border-color .15s}
.kb-field textarea:focus{border-color:var(--accent)}
.kb-btn{width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:7px;font:500 12.5px var(--font);cursor:pointer;transition:background .15s;margin-top:6px}
.kb-btn:hover{background:var(--accent-dark)}
.kb-saved{text-align:center;font-size:11.5px;color:var(--accent);margin-top:5px;opacity:0;transition:opacity .3s}
.kb-saved.show{opacity:1}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo-mark{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0}
.header-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.1}
.header-sub{font-size:11.5px;color:var(--muted);line-height:1}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-btn{width:34px;height:34px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:15px}
.hdr-btn:hover{background:var(--surface2);color:var(--text)}
.chat-area{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth;scrollbar-width:thin}
.chat-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:20px}
.welcome{padding:32px 0 16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.welcome-mark{width:64px;height:64px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:26px;margin-bottom:8px}
.welcome h2{font-size:22px;font-weight:600;color:var(--text)}
.welcome p{font-size:14px;color:var(--muted);max-width:420px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px}
.chip{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-av{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg-av.user-av{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.msg-body{display:flex;flex-direction:column;gap:5px;min-width:0}
.bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14.5px;line-height:1.65;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-size:11px;color:var(--hint);padding:0 4px}
.msg.user .msg-meta{text-align:right}
.typing-bubble{padding:12px 18px;background:var(--ada-bg);border:1px solid var(--border);border-radius:var(--radius-lg);border-bottom-left-radius:4px;box-shadow:var(--shadow);display:flex;gap:5px;align-items:center}
.typing-dot{width:7px;height:7px;background:var(--hint);border-radius:50%;animation:bounce 1.3s infinite}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-6px);opacity:1}}
.code-wrap{background:var(--code-bg);border-radius:10px;margin:10px 0;overflow:hidden}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.code-lang-badge{font-size:11px;color:#71717a;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.copy-btn{padding:4px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#a1a1aa;border-radius:5px;font-size:11.5px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.copy-btn:hover{background:rgba(255,255,255,.14);color:#e4e4e7}
.code-wrap pre{padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--code-text)}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{max-width:720px;margin:0 auto}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:8px 8px 8px 16px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--accent)}
textarea{flex:1;resize:none;border:none;background:transparent;font:14.5px/1.5 var(--font);outline:none;color:var(--text);min-height:24px;max-height:130px;overflow-y:auto;scrollbar-width:thin;padding:4px 0}
textarea::placeholder{color:var(--hint)}
.send-btn{width:36px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.04)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:16px;height:16px}
.input-hint{font-size:11.5px;color:var(--hint);margin-top:8px;text-align:center}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" onclick="newChat()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        New conversation
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="kb-panel">
      <div class="kb-label">Knowledge base</div>
      <div class="kb-field">
        <textarea id="kbInput" placeholder="Add facts, context, or information here — Ada will use it in her responses…"></textarea>
      </div>
      <button class="kb-btn" onclick="saveKB()">Save knowledge</button>
      <div class="kb-saved" id="kbSaved">✓ Saved</div>
    </div>
  </div>
  <div class="main">
    <header>
      <div class="logo-mark">A</div>
      <div>
        <div class="header-title">Ada</div>
        <div class="header-sub">Bare Minimum</div>
      </div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="Message Ada…" oninput="autoGrow(this)"></textarea>
          <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="2" x2="6" y2="10"/><polyline points="14 2 9 14 6 10 2 7 14 2"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let dark=false,convs=[],curId=null,userKB='';

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-mini-dark')==='1')toggleDark();
userKB=localStorage.getItem('ada-mini-kb')||'';
if(userKB)document.getElementById('kbInput').value=userKB;
loadConvs();if(!curId)newChat();

function saveKB(){userKB=document.getElementById('kbInput').value.trim();localStorage.setItem('ada-mini-kb',userKB);const s=document.getElementById('kbSaved');s.classList.add('show');setTimeout(()=>s.classList.remove('show'),2000);}
function toggleDark(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';localStorage.setItem('ada-mini-dark',dark?'1':'0');}
function loadConvs(){const s=localStorage.getItem('ada-mini-convs');if(s){convs=JSON.parse(s);renderConvs();}}
function saveConvs(){localStorage.setItem('ada-mini-convs',JSON.stringify(convs));}
function fmtDate(iso){const d=new Date(iso),now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function renderConvs(){
  const el=document.getElementById('convList');
  if(!convs.length){el.innerHTML='<div style="padding:12px;font-size:12px;color:var(--hint);text-align:center">No conversations yet</div>';return;}
  el.innerHTML=convs.map(c=>`<div class="conv-item${c.id===curId?' active':''}" onclick="loadConv('${c.id}')"><div class="conv-title">${esc(c.title||'New conversation')}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0"><div class="conv-date">${fmtDate(c.date)}</div><div class="conv-actions"><button class="conv-act-btn" onclick="event.stopPropagation();dlConv('${c.id}')">⬇</button><button class="conv-act-btn" onclick="event.stopPropagation();delConv('${c.id}')">✕</button></div></div></div>`).join('');
}
function newChat(){curId=Date.now().toString();convs.unshift({id:curId,title:'New conversation',date:new Date().toISOString(),msgs:[]});saveConvs();renderConvs();document.getElementById('chatInner').innerHTML='';showWelcome();}
function loadConv(id){curId=id;const c=convs.find(x=>x.id===id);if(!c)return;document.getElementById('chatInner').innerHTML='';hideWelcome();c.msgs.forEach(m=>appendMsg(m.text,m.role,false));renderConvs();scrollBot();}
function saveMsg(text,role){if(!curId)newChat();const c=convs.find(x=>x.id===curId);if(c){c.msgs.push({text,role});if(c.msgs.length===1||c.title==='New conversation')c.title=text.slice(0,38)+(text.length>38?'…':'');saveConvs();renderConvs();}}
function delConv(id){convs=convs.filter(x=>x.id!==id);saveConvs();if(curId===id){curId=null;newChat();}else renderConvs();}
function dlConv(id){const c=convs.find(x=>x.id===id);if(!c)return;let t=`Ada: ${c.title}\n${'─'.repeat(40)}\n\n`;c.msgs.forEach(m=>{t+=`[${m.role==='ada'?'Ada':'You'}]: ${m.text}\n\n`;});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));a.download=`ada-${c.title.replace(/[^a-z0-9]/gi,'-')}.txt`;a.click();}

function showWelcome(){
  document.getElementById('chatInner').innerHTML=`<div class="welcome"><div class="welcome-mark">A</div><h2>Hi, I'm Ada</h2><p>Bare minimum build — chat, math, and code, no external APIs needed. Add facts in the sidebar to teach me more.</p><div class="chips"><span class="chip" onclick="qs('Hello')">👋 Hello</span><span class="chip" onclick="qs('Tell me a fun fact')">✨ Fun fact</span><span class="chip" onclick="qs('Calculate 15% of 240')">🧮 Math</span><span class="chip" onclick="qs('Write a Python hello world')">💻 Code</span><span class="chip" onclick="qs('What can you do?')">❓ Capabilities</span></div></div>`;
}
function hideWelcome(){const w=document.getElementById('chatInner').querySelector('.welcome');if(w)w.remove();}

function send(){
  const inp=document.getElementById('msgInput');const text=inp.value.trim();if(!text)return;
  hideWelcome();appendMsg(text,'user');saveMsg(text,'user');inp.value='';inp.style.height='auto';
  const ty=appendTyping();
  setTimeout(()=>{const r=respond(text);ty.remove();appendMsg(r,'ada');saveMsg(r,'ada');},250+Math.random()*200);
}
function qs(t){document.getElementById('msgInput').value=t;send();}

function appendMsg(text,role,doScroll=true){
  const ci=document.getElementById('chatInner');
  const w=document.createElement('div');w.className=`msg ${role}`;
  const av=document.createElement('div');av.className=role==='ada'?'msg-av':'msg-av user-av';av.textContent=role==='ada'?'A':'U';
  const body=document.createElement('div');body.className='msg-body';
  const bub=document.createElement('div');bub.className='bubble';
  if(role==='ada')bub.innerHTML=renderMd(text);else bub.textContent=text;
  const meta=document.createElement('div');meta.className='msg-meta';meta.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  body.appendChild(bub);body.appendChild(meta);w.appendChild(av);w.appendChild(body);ci.appendChild(w);
  if(doScroll)scrollBot();
}
function appendTyping(){
  const ci=document.getElementById('chatInner');const w=document.createElement('div');w.className='msg ada';
  w.innerHTML='<div class="msg-av">A</div><div class="msg-body"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  ci.appendChild(w);scrollBot();return w;
}
function scrollBot(){const ca=document.getElementById('chatArea');ca.scrollTop=ca.scrollHeight;}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

function renderMd(text){
  text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{const id='cb'+Math.random().toString(36).slice(2);return`<div class="code-wrap"><div class="code-header"><span class="code-lang-badge">${esc(lang||'code')}</span><button class="copy-btn" onclick="cpCode('${id}')">Copy</button></div><pre id="${id}">${esc(code.trim())}</pre></div>`;});
  text=text.replace(/`([^`]+)`/g,'<code style="font-family:var(--mono);font-size:12.5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px">$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  return text;
}
function cpCode(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.textContent).then(()=>toast('✓ Copied'));}

const TYPOS={"helo":"hello","heloo":"hello","hii":"hi","thnks":"thanks","thankyou":"thank you","thx":"thanks","ty":"thank you","plz":"please","pls":"please","u":"you","ur":"your","gud":"good","gr8":"great","sory":"sorry","srry":"sorry","cant":"can't","dont":"don't","im":"i'm"};
function fixT(t){let o=t;for(const[k,v]of Object.entries(TYPOS))o=o.replace(new RegExp(`\\b${k.replace(/'/g,"\\'")}\\b`,'gi'),v);return o;}

function safeCalc(input){
  let e=input.toLowerCase().trim();
  const pct=e.match(/^([\d.]+)\s*%\s*of\s*([\d.]+)$/);if(pct)return parseFloat(pct[1])/100*parseFloat(pct[2]);
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs').replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan').replace(/\bpi\b/g,'Math.PI').replace(/\be\b/g,'Math.E').replace(/\blog\b/g,'Math.log10').replace(/\bln\b/g,'Math.log').replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil').replace(/\bround\b/g,'Math.round').replace(/\^/g,'**').replace(/×/g,'*').replace(/÷/g,'/').replace(/[^0-9+\-*/.(),%\sMathsqrtabcilognudEeP]/g,'');
  const r=Function('"use strict";return('+e+')')();
  if(typeof r!=='number'||!isFinite(r))throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}

const GREETINGS={'hi':["Hello! How can I help? 😊","Hi there! What's on your mind?"],'hello':["Hi! Great to see you.","Hello! What would you like to know?"],'hey':["Hey! What can I do for you?"],'how are you':["Doing great, thanks! How about you? 😊"],'good morning':["Good morning! ☀️"],'good night':["Good night! 🌙"],'bye':["Goodbye! Take care! 👋"],'thank you':["You're welcome! 😊"],'thanks':["Anytime! 😊"],'what can you do':["I can chat 💬, do math 🧮, help with code 💻, and use any facts you add to the knowledge base on the left!"]};
const FACTS=["🦊 A group of flamingos is called a 'flamboyance'.","🍯 Honey never spoils — 3,000-year-old honey was found in Egyptian tombs.","🌊 The ocean produces over 50% of Earth's oxygen.","🐙 Octopuses have three hearts and blue blood.","🌙 A day on Venus is longer than a year on Venus.","🐘 Elephants are the only animals that can't jump.","⚡ Lightning strikes Earth about 100 times per second.","🦋 Butterflies taste with their feet.","🧠 Your brain generates about 20 watts — enough to power a dim bulb."];
const CODE_EXAMPLES={
  'python hello world':'```python\nprint("Hello, World!")\n```',
  'javascript hello world':'```javascript\nconsole.log("Hello, World!");\n```',
  'html hello world':'```html\n<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Hello</title></head>\n<body><h1>Hello, World!</h1></body>\n</html>\n```',
  'python for loop':'```python\nfor i in range(10):\n    print(i)\n```',
  'javascript for loop':'```javascript\nfor (let i = 0; i < 10; i++) {\n  console.log(i);\n}\n```',
  'python function':'```python\ndef greet(name):\n    return f"Hello, {name}!"\n\nprint(greet("Ada"))\n```',
  'javascript function':'```javascript\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\n\nconsole.log(greet("Ada"));\n```',
  'python fibonacci':'```python\ndef fibonacci(n):\n    a, b = 0, 1\n    for _ in range(n):\n        print(a, end=" ")\n        a, b = b, a + b\n\nfibonacci(10)\n```',
  'python list comprehension':'```python\n# List comprehension\nsquares = [x**2 for x in range(10)]\nprint(squares)\n```',
  'javascript array':'```javascript\n// Array methods\nconst nums = [1, 2, 3, 4, 5];\nconst doubled = nums.map(n => n * 2);\nconsole.log(doubled);\n```',
};

function respond(raw){
  const msg=fixT(raw.toLowerCase().trim());

  if(/fun fact|random fact|surprise me/.test(msg))return pick(FACTS);

  // Calculator
  let calcMsg=msg.replace(/\bplus\b/gi,'+').replace(/\bminus\b/gi,'-').replace(/\btimes\b/gi,'*').replace(/\bdivided by\b/gi,'/').replace(/\bsquare root of\b/gi,'sqrt').replace(/\^/g,'**');
  const calcPats=[/(?:calculate|compute|what(?:'s|\s+is)\s+(?:the\s+result\s+of\s+)?)([\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)/i,/^([\d][\d\s\+\-\*\/\^\(\)\.sqrtabcilognudEePi×÷]+(?:\s*%\s*of\s*[\d.]+)?)\s*=?\s*\??$/i,/([\d.]+\s*%\s*of\s*[\d.]+)/i];
  for(const pat of calcPats){const m=calcMsg.match(pat);if(m){try{const r=safeCalc(m[1]);return`🧮 **${esc(m[1].trim())}** = **${r}**`;}catch(_){}}}

  // Greetings
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k}\\b`,'i');if(re.test(msg)){const remaining=msg.replace(re,'').trim().toLowerCase();if(remaining.length<5||/^(how|what|who|where|when|why|are|you|doing|up|is|was|were|it|this|that|there|here|good|bad|ok|okay|thanks|thank|please|yes|no|maybe|sure|alright|cool|great|awesome|nice|fine|well|so|and|or|but|just|now|today|tonight|tomorrow|yesterday|morning|evening|afternoon|night|day|week|month|year|time|about|with|for|to|from|of|in|on|at|by|the|a|an)$/i.test(remaining))return pick(arr);}}

  // Knowledge base search
  if(userKB){
    const words=msg.split(/\s+/).filter(w=>w.length>4);
    for(const word of words){
      if(userKB.toLowerCase().includes(word)){
        const idx=userKB.toLowerCase().indexOf(word);
        const snip=userKB.substring(Math.max(0,idx-80),idx+220).trim();
        if(snip.length>20)return`📚 From my knowledge base:\n\n${esc(snip)}`;
      }
    }
  }

  // Code snippets — check exact combos first
  for(const[key,code]of Object.entries(CODE_EXAMPLES)){
    const parts=key.split(' ');if(parts.every(p=>msg.includes(p)))return`💻 Here's a ${esc(key)} example:\n\n${code}`;
  }

  // Code generation
  if(/\b(code|write|show|example|function|script|snippet)\b/.test(msg)){
    const langMap={python:'python',javascript:'js',js:'javascript',html:'html',css:'css',java:'java'};
    for(const[k,v]of Object.entries(langMap)){
      if(msg.includes(k)){
        const starters={
          python:'```python\n# Python starter\ndef main():\n    print("Hello from Python!")\n\nif __name__ == "__main__":\n    main()\n```',
          javascript:'```javascript\n// JavaScript starter\nfunction main() {\n  console.log("Hello!");\n}\nmain();\n```',
          html:'```html\n<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Page</title></head>\n<body><h1>Hello World!</h1></body>\n</html>\n```',
          css:'```css\nbody {\n  font-family: sans-serif;\n  background: #fafafa;\n  color: #18181b;\n}\n```',
        };
        return starters[v]?`💻 Here's a ${v} starter:\n\n${starters[v]}`:`💻 I can help with ${v} code. What should it do?`;
      }
    }
    return`💻 I can help with code! Which language? Python, JavaScript, HTML, CSS…`;
  }

  return pick([
    "I'm not sure I understand — could you rephrase that? 🤔",
    "Could you give me more context? I'd love to help! 😊",
    "I can do math 🧮 and help with code 💻. You can also add facts in the sidebar for me to use.",
  ]);
}
</script>
