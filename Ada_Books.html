<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada.Books – Literary AI Assistant</title>
<link rel="icon" type="image/png" href="Icons/Ada.Books.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7c3aed;--accent-dark:#6d28d9;--accent-muted:#ede9fe;
  --bg:#fafafa;--surface:#ffffff;--surface2:#f4f4f5;
  --border:#e4e4e7;--border2:#d4d4d8;
  --text:#18181b;--muted:#71717a;--hint:#a1a1aa;
  --user-bg:#7c3aed;--ada-bg:#ffffff;
  --code-bg:#18181b;--code-text:#e4e4e7;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
[data-theme="dark"]{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;
  --border:#3f3f46;--border2:#52525b;
  --text:#fafafa;--muted:#a1a1aa;--hint:#71717a;
  --ada-bg:#27272a;--accent-muted:#2e1065;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}
.new-btn{width:100%;padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font:500 13px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
.new-btn:hover{background:var(--accent-dark)}
.new-btn svg{width:14px;height:14px;flex-shrink:0}
.conv-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.conv-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:background .12s;margin-bottom:2px;font-size:12.5px;color:var(--muted);line-height:1.4;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid transparent}
.conv-item:hover{background:var(--surface2);color:var(--text)}
.conv-item.active{background:var(--accent-muted);color:var(--accent);border-color:var(--accent-muted)}
[data-theme="dark"] .conv-item.active{background:#2e1065;color:#c4b5fd;border-color:#2e1065}
.conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.conv-date{font-size:11px;color:var(--hint);flex-shrink:0}
.conv-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.conv-item:hover .conv-actions{opacity:1}
.conv-act-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--hint);font-size:13px;line-height:1;transition:all .12s}
.conv-act-btn:hover{background:var(--border);color:var(--text)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo-mark{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0}
.header-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.1}
.header-sub{font-size:11.5px;color:var(--muted);line-height:1}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-btn{width:34px;height:34px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-size:15px}
.hdr-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.chat-area{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:20px}
.welcome{padding:32px 0 16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.welcome-mark{width:64px;height:64px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:26px;margin-bottom:8px}
.welcome h2{font-size:22px;font-weight:600;color:var(--text)}
.welcome p{font-size:14px;color:var(--muted);max-width:420px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px}
.chip{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ada{align-self:flex-start}
.msg-av{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg-av.user-av{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.msg-body{display:flex;flex-direction:column;gap:5px;min-width:0}
.bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14.5px;line-height:1.65;word-break:break-word}
.msg.ada .bubble{background:var(--ada-bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-size:11px;color:var(--hint);padding:0 4px}
.msg.user .msg-meta{text-align:right}
.typing-bubble{padding:12px 18px;background:var(--ada-bg);border:1px solid var(--border);border-radius:var(--radius-lg);border-bottom-left-radius:4px;box-shadow:var(--shadow);display:flex;gap:5px;align-items:center}
.typing-dot{width:7px;height:7px;background:var(--hint);border-radius:50%;animation:bounce 1.3s infinite}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-6px);opacity:1}}
.code-wrap{background:var(--code-bg);border-radius:10px;margin:10px 0;overflow:hidden}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.code-lang-badge{font-size:11px;color:#71717a;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.copy-btn{padding:4px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#a1a1aa;border-radius:5px;font-size:11.5px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.copy-btn:hover{background:rgba(255,255,255,.14);color:#e4e4e7}
.code-wrap pre{padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--code-text);scrollbar-width:thin}
.book-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:6px}
.book-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.book-card-author{font-size:12.5px;color:var(--accent);margin-bottom:10px;font-weight:500}
.book-card-row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
.book-card-row:last-child{border-bottom:none}
.book-card-row .lbl{color:var(--muted)}
.book-card-row .val{font-weight:500;color:var(--text);text-align:right}
.source-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--muted);margin:8px 0 0}
.source-pill span{font-weight:500;color:var(--accent)}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{max-width:720px;margin:0 auto}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:8px 8px 8px 16px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--accent)}
textarea{flex:1;resize:none;border:none;background:transparent;font:14.5px/1.5 var(--font);outline:none;color:var(--text);min-height:24px;max-height:130px;overflow-y:auto;scrollbar-width:thin;padding:4px 0}
textarea::placeholder{color:var(--hint)}
.send-btn{width:36px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.04)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:16px;height:16px}
.input-hint{font-size:11.5px;color:var(--hint);margin-top:8px;text-align:center}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" onclick="newChat()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        New conversation
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>
  <div class="main">
    <header>
      <img src="The Ada Project - Logo.png" alt="Ada Logo" class="logo-mark">
      <div>
        <div class="header-title">Ada.Books</div>
        <div class="header-sub">Literary AI Assistant</div>
      </div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="Ask about books, authors, literature…" oninput="autoGrow(this)"></textarea>
          <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="2" x2="6" y2="10"/><polyline points="14 2 9 14 6 10 2 7 14 2"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let dark=false,convs=[],curId=null,busy=false;
const cache={book:{},wiki:{},ia:{},iaContent:{},localFiles:{},dict:{}};
const IA_IDENTIFIERS=['gutenberg-the-city-of-god-volume-i','carmen-ariza-30312','a-concise-dictionary-of-middle-english-from-a.-d.-1150-to-1580-10625','books-arts-culture','herbal-simples-approved-for-modern-uses-of-cure-19352','arxiv-antitrust-on-aisle-five-how-well-do-divestiture-remedies-work','arxiv-a-hierarchical-spatial-aware-algorithm-with-efficient-reinforcement-learni','across-unknown-south-america-22483','a-compilation-of-the-messages-and-papers-of-the-presidents.-volume-8-part-3-grov','wikiversity-effective-defense-and-isil','wikiversity-technical-writing','a-system-of-practical-medicine.-by-american-authors.-vol.-1-39157'];
const LOCAL_BOOK_PATHS=['Dataset/Ada.Books/Literature','Dataset/Ada.Books/Science & Technology','Dataset/Ada.Books/History','Dataset/Ada.Books/Social Sciences & Society','Dataset/Ada.Books/Arts & Culture','Dataset/Ada.Books/Religion & Philosophy','Dataset/Ada.Books/Lifestyle & Hobbies','Dataset/Ada.Books/Health & Medicine','Dataset/Ada.Books/Education & Reference'];

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-books-dark')==='1')toggleDark();
loadConvs();if(!curId)newChat();

function toggleDark(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';localStorage.setItem('ada-books-dark',dark?'1':'0');}
function loadConvs(){const s=localStorage.getItem('ada-books-convs');if(s){convs=JSON.parse(s);renderConvs();}}
function saveConvs(){localStorage.setItem('ada-books-convs',JSON.stringify(convs));}
function fmtDate(iso){const d=new Date(iso),now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function renderConvs(){
  const el=document.getElementById('convList');
  if(!convs.length){el.innerHTML='<div style="padding:12px;font-size:12px;color:var(--hint);text-align:center">No conversations yet</div>';return;}
  el.innerHTML=convs.map(c=>`<div class="conv-item${c.id===curId?' active':''}" onclick="loadConv('${c.id}')"><div class="conv-title">${esc(c.title||'New conversation')}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0"><div class="conv-date">${fmtDate(c.date)}</div><div class="conv-actions"><button class="conv-act-btn" onclick="event.stopPropagation();dlConv('${c.id}')">⬇</button><button class="conv-act-btn" onclick="event.stopPropagation();delConv('${c.id}')">✕</button></div></div></div>`).join('');
}
function newChat(){curId=Date.now().toString();convs.unshift({id:curId,title:'New conversation',date:new Date().toISOString(),msgs:[]});saveConvs();renderConvs();document.getElementById('chatInner').innerHTML='';showWelcome();}
function loadConv(id){curId=id;const c=convs.find(x=>x.id===id);if(!c)return;document.getElementById('chatInner').innerHTML='';hideWelcome();c.msgs.forEach(m=>appendMsg(m.text,m.role,false));renderConvs();scrollBot();}
function saveMsg(text,role){if(!curId)newChat();const c=convs.find(x=>x.id===curId);if(c){c.msgs.push({text,role});if(c.msgs.length===1||c.title==='New conversation')c.title=text.slice(0,38)+(text.length>38?'…':'');saveConvs();renderConvs();}}
function delConv(id){convs=convs.filter(x=>x.id!==id);saveConvs();if(curId===id){curId=null;newChat();}else renderConvs();}
function dlConv(id){const c=convs.find(x=>x.id===id);if(!c)return;let t=`Ada.Books: ${c.title}\nDate: ${new Date(c.date).toLocaleString()}\n${'─'.repeat(40)}\n\n`;c.msgs.forEach(m=>{t+=`[${m.role==='ada'?'Ada':'You'}]: ${m.text}\n\n`;});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));a.download=`ada-books-${c.title.replace(/[^a-z0-9]/gi,'-')}.txt`;a.click();}

function showWelcome(){
  document.getElementById('chatInner').innerHTML=`<div class="welcome"><div class="welcome-mark">📚</div><h2>Hi, I'm Ada.Books</h2><p>Your literary companion. Ask about books, authors, themes, literary devices, or get recommendations.</p><div class="chips"><span class="chip" onclick="qs('Recommend a classic novel')">📖 Recommend</span><span class="chip" onclick="qs('Tell me about Shakespeare')">🎭 Shakespeare</span><span class="chip" onclick="qs('What is symbolism in literature?')">🔍 Literary terms</span><span class="chip" onclick="qs('Analyze themes in 1984')">💭 Theme analysis</span><span class="chip" onclick="qs('Who wrote Pride and Prejudice?')">❓ Author info</span><span class="chip" onclick="qs('Find books by Hemingway')">🔎 Search books</span><span class="chip" onclick="qs('What is the Hero Journey?')">🗺 Story structure</span><span class="chip" onclick="qs('Explain stream of consciousness')">🧠 Techniques</span></div></div>`;
}
function hideWelcome(){const w=document.getElementById('chatInner').querySelector('.welcome');if(w)w.remove();}

async function send(){
  if(busy)return;
  const inp=document.getElementById('msgInput');const text=inp.value.trim();if(!text)return;
  busy=true;document.querySelector('.send-btn').disabled=true;
  hideWelcome();appendMsg(text,'user');saveMsg(text,'user');inp.value='';inp.style.height='auto';
  const ty=appendTyping();
  try{const r=await respond(text);ty.remove();appendMsg(r,'ada');saveMsg(r,'ada');}
  catch(e){ty.remove();appendMsg('Something went wrong — please try again.','ada');}
  finally{busy=false;document.querySelector('.send-btn').disabled=false;}
}
function qs(t){document.getElementById('msgInput').value=t;send();}

function appendMsg(text,role,doScroll=true){
  const ci=document.getElementById('chatInner');
  const w=document.createElement('div');w.className=`msg ${role}`;
  const av=document.createElement('div');av.className=role==='ada'?'msg-av':'msg-av user-av';av.textContent=role==='ada'?'B':'U';
  const body=document.createElement('div');body.className='msg-body';
  const bub=document.createElement('div');bub.className='bubble';
  if(role==='ada')bub.innerHTML=renderMd(text);else bub.textContent=text;
  const meta=document.createElement('div');meta.className='msg-meta';meta.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  body.appendChild(bub);body.appendChild(meta);w.appendChild(av);w.appendChild(body);ci.appendChild(w);
  if(doScroll)scrollBot();
}
function appendTyping(){
  const ci=document.getElementById('chatInner');
  const w=document.createElement('div');w.className='msg ada';
  w.innerHTML='<div class="msg-av">B</div><div class="msg-body"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  ci.appendChild(w);scrollBot();return w;
}
function scrollBot(){requestAnimationFrame(()=>{const ca=document.getElementById('chatArea');ca.scrollTop=ca.scrollHeight;});}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

function renderMd(text){
  if(!text)return'';let o=String(text);
  const blocks=[];
  o=o.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{const id='cb'+Math.random().toString(36).slice(2,8);blocks.push(`<div class="code-wrap"><div class="code-header"><span class="code-lang-badge">${esc(lang||'code')}</span><button class="copy-btn" onclick="cpCode('${id}')">Copy</button></div><pre id="${id}">${esc(code.trim())}</pre></div>`);return`\x00B${blocks.length-1}\x00`;});
  o=o.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  o=o.replace(/^### (.+)$/gm,'<h3>$1</h3>');o=o.replace(/^## (.+)$/gm,'<h2>$1</h2>');o=o.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  o=o.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');o=o.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');o=o.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  o=o.replace(/`([^`]+)`/g,'<code style="font-family:var(--mono);font-size:12.5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px">$1</code>');
  o=o.replace(/((?:^[-•] .+\n?)+)/gm,block=>'<ul>'+block.trim().split('\n').map(l=>`<li>${l.replace(/^[-•] /,'')}</li>`).join('')+'</ul>');
  o=o.replace(/((?:^\d+\. .+\n?)+)/gm,block=>'<ol>'+block.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  const noWrap=/^(<h[1-3]|<ul|<ol|<div|<img|\x00B)/;
  o=o.split(/\n\n+/).map(chunk=>{chunk=chunk.replace(/\n/g,'<br>');return noWrap.test(chunk.trim())?chunk:`<p>${chunk}</p>`;}).join('');
  o=o.replace(/<p><\/p>/g,'');
  o=o.replace(/\x00B(\d+)\x00/g,(_,i)=>blocks[+i]);
  return o;
}
function cpCode(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.textContent).then(()=>toast('✓ Copied'));}

async function apiBooks(q){if(cache.book[q])return cache.book[q];try{const r=await fetch(`https://gutendex.com/books?search=${encodeURIComponent(q)}`);if(r.ok){const d=await r.json();if(d.results?.length){cache.book[q]=d.results;return d.results;}}}catch(_){}return null;}
async function apiWiki(title){if(cache.wiki[title])return cache.wiki[title];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);if(r.ok){const d=await r.json();if(d?.extract){cache.wiki[title]=d;return d;}}}catch(_){}return null;}
async function searchWiki(q){try{const r=await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(q)}&limit=3&namespace=0&format=json&origin=*`);if(r.ok){const d=await r.json();if(d?.[1]?.length)return{title:d[1][0]};}}catch(_){}return null;}
async function searchInternetArchive(q){if(cache.ia[q])return cache.ia[q];try{const identifierQuery=IA_IDENTIFIERS.map(id=>`identifier:${id}`).join(' OR ');const r=await fetch(`https://archive.org/advancedsearch.php?q=(${identifierQuery}) AND (${encodeURIComponent(q)})&fl[]=identifier&fl[]=title&output=json&rows=5`);if(r.ok){const d=await r.json();if(d?.docs?.length){cache.ia[q]=d.docs;return d.docs;}}}catch(_){}return null;}
async function searchArchiveFiles(q){if(cache.iaFiles?.[q])return cache.iaFiles[q];try{const r=await fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier&fl[]=title&fl[]=format&fl[]=year&output=json&rows=10`);if(r.ok){const d=await r.json();if(d?.docs?.length){if(!cache.iaFiles)cache.iaFiles={};cache.iaFiles[q]=d.docs;return d.docs;}}}catch(_){}return null;}
async function fetchInternetArchiveContent(identifier){if(cache.iaContent[identifier])return cache.iaContent[identifier];try{const r=await fetch(`https://archive.org/metadata/${identifier}`);if(r.ok){const d=await r.json();if(d?.files?.length){const textFiles=d.files.filter(f=>f.format==='Text'||f.name.endsWith('.txt')||f.name.endsWith('.md'));if(textFiles.length){const fileUrl=textFiles[0].name.includes('/')?`https://archive.org/download/${identifier}/${encodeURIComponent(textFiles[0].name).replace(/%2F/g,'/')}`:`https://archive.org/download/${identifier}/${textFiles[0].name}`;const tr=await fetch(fileUrl);if(tr.ok){const content=await tr.text();cache.iaContent[identifier]=content;return content;}}}}}catch(_){}return null;}

async function indexLocalFiles(){if(cache.localFiles.indexed)return;cache.localFiles.indexed=true;cache.localFiles.files=[];try{const r=await fetch('Dataset/Ada.Books/manifest.json');if(r.ok){const manifest=await r.json();cache.localFiles.files=manifest.files||[];}}catch(_){}}
async function searchLocalFiles(q){if(!cache.localFiles.indexed)await indexLocalFiles();const results=[];const query=q.toLowerCase();for(const file of cache.localFiles.files){if(file.name.toLowerCase().includes(query)||file.path.toLowerCase().includes(query))results.push(file);}return results;}
async function fetchLocalContent(filePath){if(cache.localFiles[filePath])return cache.localFiles[filePath];try{const r=await fetch(filePath);if(r.ok){const content=await r.text();cache.localFiles[filePath]=content;return content;}}catch(_){}return null;}
async function lookupWord(word){if(cache.dict[word])return cache.dict[word];try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);if(r.ok){const d=await r.json();if(d?.[0]){const entry=d[0];const meanings=entry.meanings?.slice(0,2).map(m=>({partOfSpeech:m.partOfSpeech,definitions:m.definitions?.slice(0,2).map(d=>d.definition)}))||[];cache.dict[word]={word:entry.word,phonetic:entry.phonetic,meanings};return cache.dict[word];}}}catch(_){}return null;}
async function getWordContext(word){const def=await lookupWord(word);if(!def)return null;const pos=def.meanings?.[0]?.partOfSpeech||'unknown';const meaning=def.meanings?.[0]?.definitions?.[0]||'definition not found';return{word,pos,meaning};}
async function apiThesaurus(word){
  if(cache.thesaurus?.[word])return cache.thesaurus[word];
  try{
    const r=await fetch(`https://api.datamuse.com/words?rel_syn=${encodeURIComponent(word)}&max=10`);
    if(r.ok){
      const d=await r.json();
      if(!cache.thesaurus)cache.thesaurus={};
      cache.thesaurus[word]=d;
      return d;
    }
  }catch(_){}
  return null;
}
const ABBREVIATIONS={'hru':'how are you','hmu':'hit me up','nm':'not much','nvm':'never mind','brb':'be right back','btw':'by the way','imo':'in my opinion','tbh':'to be honest','idk':'i do not know','ikr':'i know right','lol':'laugh out loud','omg':'oh my god','smh':'shaking my head','ttyl':'talk to you later','ngl':'not gonna lie','rn':'right now','afaik':'as far as i know','bbl':'be back later','cu':'see you','g2g':'got to go','ic':'i see','k':'okay','lmk':'let me know','nbd':'no big deal','plz':'please','thx':'thanks','u':'you','ur':'your','w/':'with','w/o':'without','y':'why'};
function expandAbbreviations(text){let result=text.toLowerCase();for(const[abbr,full]of Object.entries(ABBREVIATIONS)){result=result.replace(new RegExp(`\\b${abbr}\\b`,'gi'),full);}return result;}
async function spellCheck(word){
  if(cache.spell?.[word])return cache.spell[word];
  try{
    const r=await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(word)}&max=5`);
    if(r.ok){
      const d=await r.json();
      if(!cache.spell)cache.spell={};
      cache.spell[word]=d;
      return d;
    }
  }catch(_){}
  return null;
}

function fmtWiki(extract,title){
  const abbrs=['U.S.','U.K.','Dr.','Mr.','Mrs.','Ms.','Prof.','Sr.','Jr.','etc.','e.g.','i.e.'];
  let tmp=extract;const ph={};abbrs.forEach((a,i)=>{const k=`__A${i}__`;ph[k]=a;tmp=tmp.replace(new RegExp(a.replace(/\./g,'\\.'),'g'),k);});
  let sents=(tmp.match(/[^.!?]+[.!?]+/g)||[tmp]).map(s=>{for(const[k,v]of Object.entries(ph))s=s.replace(new RegExp(k,'g'),v);return s.trim();}).filter(Boolean);
  if(!sents.length)return esc(extract);
  let out=`<strong>${esc(sents[0])}</strong>`;
  if(sents.length>1){out+='<br><br>';for(let i=1;i<Math.min(sents.length,5);i++)out+=`• ${esc(sents[i])}<br>`;}
  if(title)out+=`<br><span class="source-pill">📖 Source: <span>Wikipedia — ${esc(title)}</span></span>`;
  return out;
}

const LEARNING_KEY='ada_books_learning';

async function callAIAPI(userMessage, context='You are Ada.Books, a literature expert. Answer briefly and clearly in 2-3 sentences.'){
  const providers=[
    {
      name:'groq',
      url:'https://api.groq.com/openai/v1/chat/completions',
      headers:{'Authorization':`Bearer ${API_KEYS.groq}`,'Content-Type':'application/json'},
      body:{model:'llama-3.3-70b-versatile',messages:[{role:'system',content:context},{role:'user',content:userMessage}],max_tokens:500,temperature:0.7},
      extract:(d)=>d.choices?.[0]?.message?.content
    },
    {
      name:'anthropic',
      url:'https://api.anthropic.com/v1/messages',
      headers:{'x-api-key':API_KEYS.anthropic,'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:{model:'claude-3-5-sonnet-20241022',max_tokens:500,system:context,messages:[{role:'user',content:userMessage}]},
      extract:(d)=>d.content?.[0]?.text
    },
    {
      name:'gemini',
      url:`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEYS.gemini}`,
      headers:{'Content-Type':'application/json'},
      body:{contents:[{parts:[{text:context+'\n\n'+userMessage}]}]},
      extract:(d)=>d.candidates?.[0]?.content?.parts?.[0]?.text
    },
    {
      name:'openai',
      url:'https://api.openai.com/v1/chat/completions',
      headers:{'Authorization':`Bearer ${API_KEYS.openai}`,'Content-Type':'application/json'},
      body:{model:'gpt-4o-mini',messages:[{role:'system',content:context},{role:'user',content:userMessage}],max_tokens:500,temperature:0.7},
      extract:(d)=>d.choices?.[0]?.message?.content
    }
  ];

  for(const provider of providers){
    try{
      const response=await fetch(provider.url,{
        method:'POST',
        headers:provider.headers,
        body:JSON.stringify(provider.body)
      });
      const data=await response.json();
      const aiResponse=provider.extract(data);
      if(aiResponse){
        const learned=JSON.parse(localStorage.getItem(LEARNING_KEY)||'{}');
        const key=userMessage.toLowerCase().trim().substring(0,50);
        learned[key]=aiResponse;
        localStorage.setItem(LEARNING_KEY,JSON.stringify(learned));
        return aiResponse;
      }
    }catch(e){
      console.error(`${provider.name} API error:`,e);
    }
  }
  return null;
}

async function respond(raw){
  const msg=raw.toLowerCase().trim();
  
  const learned=JSON.parse(localStorage.getItem(LEARNING_KEY)||'{}');
  for(const[k,v]of Object.entries(learned)){
    if(msg.includes(k.toLowerCase()))return v+' (learned)';
  }

  // Typo correction for common author names
  const AUTHOR_TYPOS={'shakespare':'shakespeare','shakespear':'shakespeare','austen':'jane austen','orwell':'george orwell','hemingway':'ernest hemingway','tolstoy':'leo tolstoy','woolf':'virginia woolf','dickens':'charles dickens','austen':'jane austen','twain':'mark twain','fitzgerald':'f scott fitzgerald','joyce':'james joyce','bronte':'bronte','dostoevsky':'fyodor dostoevsky','kafka':'franz kafka'};
  let correctedMsg=msg;
  for(const[typo,correct]of Object.entries(AUTHOR_TYPOS)){correctedMsg=correctedMsg.replace(new RegExp(typo,'gi'),correct);}

  // Greetings
  const GREETINGS={'hi':["Hello! I'm Ada.Books — your literary companion. Ask me about any book, author, or literary device! 📚","Hi there! Ready to explore the world of literature? Ask me anything about books or authors. 📖"],'hello':["Hello! I'm Ada.Books — your literary companion. Ask me about any book, author, or literary device! 📚","Hi there! Ready to explore the world of literature? Ask me anything about books or authors. 📖"],'hey':["Hey! I'm Ada.Books — your literary companion. Ask me about any book, author, or literary device! 📚"]};
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k}\\b`,'i');if(re.test(correctedMsg)){const remaining=correctedMsg.replace(re,'').trim().toLowerCase();if(remaining.length<5||/^(how|what|who|where|when|why|are|you|doing|up|is|was|were|it|this|that|there|here|good|bad|ok|okay|thanks|thank|please|yes|no|maybe|sure|alright|cool|great|awesome|nice|fine|well|so|and|or|but|just|now|today|tonight|tomorrow|yesterday|morning|evening|afternoon|night|day|week|month|year|time|about|with|for|to|from|of|in|on|at|by|the|a|an)$/i.test(remaining))return pick(arr);}}

  // Thank you
  if(/^(thanks|thank you|thx)[\s!]*$/.test(correctedMsg))return"You're welcome! Happy to help with your literary journey. 😊";

  // Known literary terms
  for(const[k,v]of Object.entries(LITERARY_KB)){if(correctedMsg.includes(k))return v;}

  // Known authors
  for(const[k,fn]of Object.entries(AUTHOR_KB)){if(correctedMsg.includes(k))return fn();}

  // Known books
  for(const[k,fn]of Object.entries(BOOK_KB)){if(correctedMsg.includes(k.replace(/ /g,'.*')))return fn();}

  // Recommendations
  if(/recommend|suggestion|what (should|to) read/.test(correctedMsg)){
    if(/sci.?fi|science fiction|space|futur/.test(correctedMsg))return pick(RECOMMENDATIONS.scifi);
    if(/mystery|detective|thriller|crime/.test(correctedMsg))return pick(RECOMMENDATIONS.mystery);
    return pick(RECOMMENDATIONS.classic);
  }

  // Archive.org file search
  if(/search archive|find file|archive file|train on/i.test(msg)){
    const query=msg.replace(/(?:search archive|find file|archive file|train on)/gi,'').trim();
    if(query.length>2){
      const files=await searchArchiveFiles(query);
      if(files?.length){
        let out='📁 **Files from Archive.org**\n\n';
        files.slice(0,5).forEach(f=>{
          const year=f.year?`(${f.year})`:'';
          const format=f.format?`[${f.format}]`:'';
          out+=`• **${esc(f.title||'Untitled')}** ${year} ${format}\n   ID: \`${esc(f.identifier)}\`\n`;
        });
        return out+'\n\nType "read [ID]" to fetch content from a specific file.';
      }
    }
  }

  // Read archive content by ID
  const readIdM=msg.match(/^read\s+([a-z0-9_\.-]+)$/i);
  if(readIdM){
    const content=await fetchInternetArchiveContent(readIdM[1]);
    if(content)return`📖 **Content from ${esc(readIdM[1])}**\n\n${esc(content.substring(0,1500))}...`;
    return `Could not fetch content for ID: ${esc(readIdM[1])}`;
  }

  // Book search via Gutendex
  if(/find books|search.*books?|books? by|gutenberg|download/.test(correctedMsg)){
    const q=correctedMsg.replace(/find books?|search.*books?\s*(by|about|on)?|books? by|gutenberg|download/gi,'').trim();
    if(q.length>2){
      const books=await apiBooks(q);
      if(books?.length){
        let html=`📚 <strong>Books matching "${esc(q)}"</strong><br><br>`;
        books.slice(0,3).forEach(b=>{html+=bookCard(b)+'<br>';});
        return html;
      }
    }
  }

  // Generic book request
  if(/^(give me a book|recommend a book|suggest a book|any book|random book|what book should i read|i want a book)[\s!?]*$/i.test(correctedMsg)){
    return pick(RECOMMENDATIONS.classic);
  }

  // Wikipedia lookup for authors/books/literary topics
  const qPats=['who is','who was','tell me about','what is','what was','explain','describe','about','read','give me'];
  if(qPats.some(p=>correctedMsg.includes(p))){
    let topic=correctedMsg;for(const p of qPats){if(correctedMsg.includes(p)){topic=correctedMsg.replace(p,'').trim();break;}}
    topic=topic.replace(/[?!.]/g,'').replace(/^(the |a |an )/i,'').trim();
    if(topic.length>2){
      const ia=await searchInternetArchive(topic);
      if(ia?.length){
        const content=await fetchInternetArchiveContent(ia[0].identifier);
        if(content){
          const excerpt=content.substring(0,800)+'...';
          return`📚 From the archive:\n\n${esc(excerpt)}\n\n<span class="source-pill">📖 Source: <span>Internet Archive — ${esc(ia[0].title)}</span></span>`;
        }
      }
      let wiki=await apiWiki(topic);
      if(!wiki){const sr=await searchWiki(topic);if(sr?.title)wiki=await apiWiki(sr.title);}
      if(wiki?.extract)return fmtWiki(wiki.extract,wiki.title||topic);
    }
  }

  // Generic book search fallback
  const words=correctedMsg.replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!['what','this','that','with','have','from','they','will','been','were','when','then','than','your','more','also','just','into','over','after','before','about'].includes(w));
  if(words.length){
    const q=words.slice(0,3).join(' ');
    const books=await apiBooks(q);
    if(books?.length)return`📚 Here's what I found on Gutenberg for <strong>"${esc(q)}"</strong>:<br><br>${bookCard(books[0])}`;
  }
  
  const aiResponse=await callAIAPI(raw);
  if(aiResponse)return aiResponse;

  return pick([
    "That's a rich literary topic! Could you be a bit more specific? I can look up books, authors, themes, or literary devices. 📚",
    "Interesting question! Try asking about a specific author, book title, or literary term — I'll do my best to help. 🎭",
    "I'm here to explore literature with you! Ask me about any book, author, or device like metaphor, symbolism, or irony. 📖",
  ]);
}
