<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada – AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#5b47e0;--accent-dark:#4836c4;--accent-muted:#ede9ff;
  --bg:#f6f6f4;--surface:#ffffff;--surface2:#f0f0ee;--surface3:#e6e6e2;
  --border:#e2e2de;--border2:#ccccc8;
  --text:#1a1a18;--muted:#696966;--hint:#a0a09b;
  --user-bg:#5b47e0;--code-bg:#16161a;--code-text:#e8e8e4;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 20px rgba(0,0,0,.07);
  --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;--surface3:#2e2e2b;
  --border:#2e2e2b;--border2:#3d3d39;
  --text:#eeeee9;--muted:#8a8a84;--hint:#55554f;
  --accent-muted:#2a2060;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 20px rgba(0,0,0,.35);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:256px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:14px 12px 10px}
.new-btn{width:100%;padding:9px 12px;background:var(--accent);color:#fff;border:none;border-radius:9px;font:500 13px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
.new-btn:hover{background:var(--accent-dark)}
.new-btn svg{width:13px;height:13px;flex-shrink:0}
.sidebar-section{padding:8px 14px 4px;font-size:10.5px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.06em}
.conv-list{flex:1;overflow-y:auto;padding:2px 8px 8px;scrollbar-width:none}
.conv-list::-webkit-scrollbar{display:none}
.conv-item{padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:1px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;gap:6px}
.conv-item:hover,.conv-item.active{background:var(--surface2);color:var(--text)}
.conv-item.active .conv-title{color:var(--accent);font-weight:600}
.conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.conv-actions{display:flex;gap:1px;opacity:0;transition:opacity .1s;flex-shrink:0}
.conv-item:hover .conv-actions{opacity:1}
.conv-act-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;color:var(--hint);font-size:12px;line-height:1;transition:all .1s}
.conv-act-btn:hover{background:var(--border2);color:var(--text)}
.conv-date{font-size:10.5px;color:var(--hint);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px;flex-shrink:0}
.header-title{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.header-sub{font-size:11px;color:var(--hint)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.hdr-btn{height:28px;padding:0 9px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;color:var(--muted);transition:all .12s;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:4px;white-space:nowrap}
.hdr-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.hdr-icon{width:28px;padding:0;justify-content:center;font-size:13px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.status-dot.busy{background:var(--accent);animation:pulse .9s ease infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.chat-area{flex:1;overflow-y:auto;padding:28px 0 12px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-inner{max-width:700px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:4px}
.welcome{padding:36px 0 20px}
.welcome-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;margin-bottom:14px;box-shadow:0 4px 20px rgba(91,71,224,.3)}
.welcome h2{font-size:26px;font-weight:600;color:var(--text);letter-spacing:-.03em;line-height:1.2;margin-bottom:6px}
.welcome p{font-size:14px;color:var(--muted);max-width:480px;line-height:1.7;margin-bottom:18px}
.chips-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 3px 12px rgba(91,71,224,.25)}
.msg{display:flex;gap:10px;align-items:flex-start;margin-bottom:4px}
.msg.user{justify-content:flex-end}
.msg.ada{justify-content:flex-start}
.msg-av{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.msg-av.user-av{background:var(--surface3);color:var(--muted);border:1px solid var(--border);font-size:11px}
.msg-body{display:flex;flex-direction:column;gap:3px;min-width:0;max-width:86%}
.msg.user .msg-body{align-items:flex-end}
.bubble{padding:11px 15px;border-radius:var(--radius-lg);font-size:14px;line-height:1.72;word-break:break-word}
.msg.ada .bubble{background:var(--surface);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-size:10.5px;color:var(--hint);padding:0 3px;display:flex;align-items:center;gap:8px}
.reaction-bar{display:flex;gap:3px;opacity:0;transition:opacity .12s;margin-top:2px;flex-wrap:wrap;align-items:center}
.msg:hover .reaction-bar,.reaction-bar:focus-within{opacity:1}
.react-btn{font-size:13px;cursor:pointer;padding:2px 5px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);transition:transform .08s;user-select:none;line-height:1.5}
.react-btn:hover{transform:scale(1.2)}
.copy-msg-btn{font-size:11px;cursor:pointer;padding:2px 8px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--hint);transition:all .1s;line-height:1.7;font-family:var(--font)}
.copy-msg-btn:hover{background:var(--border2);color:var(--text)}
.reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.reaction-chip{font-size:12px;cursor:pointer;padding:2px 7px;border-radius:5px;background:var(--accent-muted);border:1px solid var(--border);user-select:none;line-height:1.5}
.typing-bub{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);border-bottom-left-radius:4px;box-shadow:var(--shadow);display:flex;gap:5px;align-items:center}
.tdot{width:6px;height:6px;background:var(--hint);border-radius:50%;animation:tdot 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.code-wrap{background:var(--code-bg);border-radius:10px;margin:8px 0;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.code-lang{font-size:10px;color:#666;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.copy-btn{padding:3px 9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#777;border-radius:5px;font-size:10.5px;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.copy-btn:hover{background:rgba(255,255,255,.12);color:#bbb}
.code-wrap pre{padding:13px 15px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.65;color:var(--code-text);scrollbar-width:thin;scrollbar-color:#333 transparent}
.info-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin:4px 0}
.info-card-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.info-row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:var(--muted)}
.info-row .val{font-weight:500;color:var(--text);text-align:right;max-width:65%}
.src-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--muted);margin-top:7px}
.src-pill b{color:var(--accent);font-weight:600}
.input-area{padding:12px 20px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{max-width:700px;margin:0 auto}
.input-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;transition:border-color .15s,box-shadow .15s}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,71,224,.1)}
textarea{width:100%;resize:none;border:none;background:transparent;font:14px/1.6 var(--font);outline:none;color:var(--text);min-height:24px;max-height:140px;overflow-y:auto;scrollbar-width:thin;padding:11px 14px 0}
textarea::placeholder{color:var(--hint)}
.input-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 8px}
.input-tools{display:flex;gap:3px}
.itool{width:26px;height:26px;border:none;background:transparent;border-radius:5px;cursor:pointer;color:var(--hint);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:var(--font)}
.itool:hover{background:var(--surface3);color:var(--text)}
.send-btn{height:28px;padding:0 13px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;font-family:var(--font);transition:all .13s}
.send-btn:hover{background:var(--accent-dark)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:12px;height:12px}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--hint);text-align:center;margin-top:6px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:var(--bg);padding:9px 16px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:all .2s;z-index:999;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1}
.ada-md p{margin:0 0 8px}.ada-md p:last-child{margin-bottom:0}
.ada-md ul,.ada-md ol{padding-left:18px;margin:5px 0 8px}
.ada-md li{margin-bottom:2px;line-height:1.65}
.ada-md strong{font-weight:600}
.ada-md em{font-style:italic}
.ada-md a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(91,71,224,.3)}
.ada-md a:hover{border-color:var(--accent)}
.ada-md h1,.ada-md h2,.ada-md h3{font-weight:600;margin:12px 0 5px;letter-spacing:-.02em}
.ada-md h1{font-size:18px}.ada-md h2{font-size:16px}.ada-md h3{font-size:14.5px}
.ada-md blockquote{border-left:3px solid var(--accent);padding:3px 12px;color:var(--muted);margin:8px 0;font-style:italic;background:var(--accent-muted);border-radius:0 6px 6px 0}
.ada-md hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.ada-md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.ada-md th,.ada-md td{padding:6px 11px;border:1px solid var(--border);text-align:left}
.ada-md th{background:var(--surface2);font-weight:600}
.ada-md img{max-width:100%;border-radius:10px;margin:6px 0;display:block}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" onclick="newChat()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        New conversation
      </button>
    </div>
    <div class="sidebar-section">Recents</div>
    <div class="conv-list" id="convList"></div>
  </div>
  <div class="main">
    <header>
      <div class="logo-mark">A</div>
      <div>
        <div class="header-title">Ada</div>
        <div class="header-sub">AI Assistant — 100% independent</div>
      </div>
      <div class="hdr-right">
        <div class="status-dot" id="statusDot"></div>
        <button class="hdr-btn" onclick="dlConvCurrent()">⬇ Export</button>
        <button class="hdr-btn hdr-icon" onclick="toggleDark()" id="darkBtn">🌙</button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner"></div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="Ask Ada anything…" oninput="autoGrow(this)"></textarea>
          <div class="input-row">
            <div class="input-tools">
              <button class="itool" title="Weather" onclick="qs('Weather in ')">🌤</button>
              <button class="itool" title="Calculate" onclick="qs('Calculate ')">🧮</button>
              <button class="itool" title="Translate" onclick="qs('Translate to ')">🌐</button>
              <button class="itool" title="Code" onclick="qs('Write a ')">💻</button>
            </div>
            <button class="send-btn" id="sendBtn" onclick="send()">
              Send
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="11" y1="1" x2="4" y2="8"/><polyline points="11 1 7 11 4 8 1 5 11 1"/></svg>
            </button>
          </div>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

/* ══════════════════════════════════════════ STATE & BOOT ══════════════════════════════════════════ */
let dark=false,convs=[],curId=null,busy=false;
const cache={wiki:{},dict:{},book:{}};
const EMOJIS=['👍','❤️','😂','🔥','💡','🎉'];
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
if(localStorage.getItem('ada-dark')==='1')toggleDark();
loadConvs();if(!curId)newChat();

/* ══════════════════════════════════════════ THEME ══════════════════════════════════════════ */
function toggleDark(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';localStorage.setItem('ada-dark',dark?'1':'0');}

/* ══════════════════════════════════════════ CONVERSATIONS ══════════════════════════════════════════ */
function loadConvs(){try{const s=localStorage.getItem('ada-convs');if(s){convs=JSON.parse(s);renderConvs();}}catch(_){}}
function saveConvs(){try{localStorage.setItem('ada-convs',JSON.stringify(convs.slice(0,80)));}catch(_){}}
function renderConvs(){
  const el=document.getElementById('convList');
  if(!convs.length){el.innerHTML='<div style="padding:10px 16px;font-size:12px;color:var(--hint)">No conversations yet</div>';return;}
  el.innerHTML=convs.map(c=>`<div class="conv-item${c.id===curId?' active':''}" onclick="loadConv('${c.id}')"><div class="conv-title">${esc(c.title||'New conversation')}</div><div style="display:flex;align-items:center;gap:3px;flex-shrink:0"><div class="conv-date">${fmtDate(c.date)}</div><div class="conv-actions"><button class="conv-act-btn" onclick="event.stopPropagation();delConv('${c.id}')">✕</button></div></div></div>`).join('');
}
function fmtDate(iso){try{const d=new Date(iso),now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}catch(_){return '';}}
function newChat(){curId=Date.now().toString();convs.unshift({id:curId,title:'New conversation',date:new Date().toISOString(),msgs:[]});saveConvs();renderConvs();document.getElementById('chatInner').innerHTML='';showWelcome();}
function loadConv(id){curId=id;const c=convs.find(x=>x.id===id);if(!c)return;document.getElementById('chatInner').innerHTML='';hideWelcome();c.msgs.forEach(m=>appendMsg(m.text,m.role,false,m.src||''));renderConvs();scrollBot();}
function saveMsg(text,role,src2=''){if(!curId)newChat();const c=convs.find(x=>x.id===curId);if(c){c.msgs.push({text,role,src:src2});if(c.msgs.length===1||c.title==='New conversation')c.title=text.replace(/[#*\n<>]/g,'').trim().slice(0,46)+(text.length>46?'…':'');saveConvs();renderConvs();}}
function delConv(id){convs=convs.filter(x=>x.id!==id);saveConvs();if(curId===id){curId=null;newChat();}else renderConvs();}
function dlConvCurrent(){const c=convs.find(x=>x.id===curId);if(!c||!c.msgs.length){toast('Nothing to export yet');return;}let txt=`Ada Conversation: ${c.title}\nDate: ${new Date(c.date).toLocaleString()}\n${'-'.repeat(48)}\n\n`;c.msgs.forEach(m=>{txt+=`[${m.role==='ada'?'Ada':'You'}]:\n${m.text.replace(/<[^>]*>/g,'')}\n\n`;});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`ada-${c.title.replace(/[^a-z0-9]/gi,'-').slice(0,30)}.txt`;a.click();toast('✓ Exported');}

/* ══════════════════════════════════════════ SEND ══════════════════════════════════════════ */
async function send(){if(busy)return;const inp=document.getElementById('msgInput');const text=inp.value.trim();if(!text)return;hideWelcome();appendMsg(text,'user');saveMsg(text,'user');inp.value='';inp.style.height='auto';setBusy(true);const tyEl=appendTyping();try{const reply=await respond(text);tyEl.remove();const rsrc=reply&&reply.__src?reply.__src:'';const rtxt=reply&&reply.__text?reply.__text:(typeof reply==='string'?reply:'');appendMsg(rtxt,'ada',true,rsrc);saveMsg(rtxt,'ada',rsrc);}catch(e){tyEl.remove();appendMsg('Something went wrong — please try again. 😕','ada');}finally{setBusy(false);}}
function qs(t){const inp=document.getElementById('msgInput');inp.value=t;inp.focus();inp.setSelectionRange(t.length,t.length);autoGrow(inp);}
function setBusy(v){busy=v;document.getElementById('sendBtn').disabled=v;document.getElementById('statusDot').className='status-dot'+(v?' busy':'');}

/* ══════════════════════════════════════════ WELCOME ══════════════════════════════════════════ */
function showWelcome(){const ci=document.getElementById('chatInner');if(ci.querySelector('#ws'))return;const d=document.createElement('div');d.id='ws';const chips=[['🌤','Weather','Weather in Tokyo'],['🧮','Calculate','Calculate 17% of 850'],['🌐','Translate','Translate hello to French'],['💻','Code','Write a Python hello world'],['🔍','Explain','Explain black holes'],['📖','Define','Define serendipity'],['💰','Crypto','Bitcoin price'],['📡','Reddit','Show r/worldnews hot posts'],['🌍','Country','Population of Japan'],['🚀','SpaceX','Next SpaceX launch'],['📚','Books','Find books by Jules Verne'],['🎲','Fun fact','Random fun fact'],['🃏','Joke','Tell me a clever joke'],['🥗','Nutrition','Nutrition facts for avocado'],['🎓','University','Universities in Germany'],['💱','Currency','100 USD to EUR'],['🐶','Dog pic','Show me a dog picture'],['💬','Quote','Give me an inspirational quote']];d.innerHTML=`<div class="welcome"><div class="welcome-logo">✦</div><h2>Hi, I'm Ada.</h2><p>I answer questions using Wikipedia, live APIs, a built-in calculator, translator, and more. No cloud AI — everything runs right here.</p><div class="chips-grid">${chips.map(([ic,label,q])=>`<span class="chip" onclick="qs('${q.replace(/'/g,"&#39;")}')">${ic} ${label}</span>`).join('')}</div></div>`;ci.appendChild(d);}
function hideWelcome(){const w=document.getElementById('ws');if(w)w.remove();}

/* ══════════════════════════════════════════ RENDER MESSAGES ══════════════════════════════════════════ */
function appendMsg(text,role,doScroll=true,src2=''){
  const ci=document.getElementById('chatInner');
  const wrap=document.createElement('div');wrap.className=`msg ${role}`;

function renderMD(text){
  if(!text)return'';let o=String(text);
  const codeBlocks=[];
  o=o.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{const id='cb'+Math.random().toString(36).slice(2,8);const l=lang||'code';codeBlocks.push(`<div class="code-wrap"><div class="code-header"><span class="code-lang">${esc(l)}</span><button class="copy-btn" onclick="cpCode('${id}')">Copy</button></div><pre id="${id}">${esc(code.trim())}</pre></div>`);return`\x00CB${codeBlocks.length-1}\x00`;});
  o=o.replace(/\[CARD\]([\s\S]*?)\[\/CARD\]/g,(_,inner)=>`<div class="info-card">${inner}</div>`);
  o=o.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,(_,alt,src)=>`<img src="${esc(src)}" alt="${esc(alt)}" onerror="this.style.display='none'">`);
  o=o.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  o=o.replace(/^### (.+)$/gm,'<h3>$1</h3>');o=o.replace(/^## (.+)$/gm,'<h2>$1</h2>');o=o.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  o=o.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');o=o.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');o=o.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  o=o.replace(/`([^`]+)`/g,'<code style="font-family:var(--mono);font-size:12.5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px">$1</code>');
  o=o.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  o=o.replace(/^---$/gm,'<hr>');
  o=o.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g,(_,hdr,rows)=>{const ths=hdr.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');const trs=rows.trim().split('\n').map(r=>'<tr>'+r.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('')+'</tr>').join('');return`<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;});
  o=o.replace(/((?:^[-*] .+\n?)+)/gm,block=>'<ul>'+block.trim().split('\n').map(l=>`<li>${l.replace(/^[-*] /,'')}</li>`).join('')+'</ul>');
  o=o.replace(/((?:^\d+\. .+\n?)+)/gm,block=>'<ol>'+block.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  const noWrap=/^(<h[1-3]|<ul|<ol|<blockquote|<hr|<div|<table|<img|\x00CB)/;
  o=o.split(/\n\n+/).map(chunk=>{chunk=chunk.replace(/\n/g,'<br>');return noWrap.test(chunk.trim())?chunk:`<p>${chunk}</p>`;}).join('');
  o=o.replace(/<p><\/p>/g,'');
  o=o.replace(/\x00CB(\d+)\x00/g,(_,i)=>codeBlocks[+i]);
  return o;
}

function card(title,icon,rows){let h=`[CARD]<div class="info-card-title">${icon} ${esc(title)}</div>`;rows.forEach(([l,v])=>{h+=`<div class="info-row"><span class="lbl">${esc(l)}</span><span class="val">${v}</span></div>`;});return h+'[/CARD]';}
function pill(label){return`<span class="src-pill">⚡ Source: <b>${esc(label)}</b></span>`;}
function withSrc(text,source){return Object.assign(new String(text),{__text:text,__src:source,toString(){return text;}});}
function fmtWiki(extract,title){
  const abbrs=['U.S.','U.K.','Dr.','Mr.','Mrs.','Ms.','Prof.','Sr.','Jr.','etc.','e.g.','i.e.'];let tmp=extract;const ph={};abbrs.forEach((a,i)=>{const k=`__A${i}__`;ph[k]=a;tmp=tmp.replace(new RegExp(a.replace(/\./g,'\\.'),'g'),k);});
  let sents=(tmp.match(/[^.!?]+[.!?]+/g)||[tmp]).map(s=>{for(const[k,v]of Object.entries(ph))s=s.replace(new RegExp(k,'g'),v);return s.trim();}).filter(Boolean);
  if(!sents.length)return esc(extract);
  let out=`**${esc(sents[0])}**`;if(sents.length>1){out+='\n\n';for(let i=1;i<Math.min(sents.length,6);i++)out+=`- ${esc(sents[i])}\n`;}
  if(title)out+=`\n${pill('Wikipedia — '+title)}`;return out;
}

/* ══════════════════════════════════════════ CALCULATOR ══════════════════════════════════════════ */
function calc(input){
  let e=input.toLowerCase().trim();
  const pct=e.match(/^([\d.]+)\s*%\s*of\s*([\d.]+)$/);if(pct)return parseFloat(pct[1])/100*parseFloat(pct[2]);
  e=e.replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs').replace(/\bsin\b/g,'Math.sin').replace(/\bcos\b/g,'Math.cos').replace(/\btan\b/g,'Math.tan').replace(/\bpi\b/g,'Math.PI').replace(/\be\b/g,'Math.E').replace(/\blog\b/g,'Math.log10').replace(/\bln\b/g,'Math.log').replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil').replace(/\bround\b/g,'Math.round').replace(/\bpow\b/g,'Math.pow').replace(/\^/g,'**').replace(/\xd7/g,'*').replace(/\xf7/g,'/');
  const safe=e.replace(/[^0-9+\-*/.(),%\sMathsqrtabceilognudEeP]/g,'');
  if(!safe.trim())throw new Error('empty');
  const r=Function('"use strict";return('+safe+')')();
  if(typeof r!=='number'||!isFinite(r))throw new Error('bad');
  return Math.round(r*1e10)/1e10;
}

async function respond(raw){

  if(/fun fact|random fact|tell me a fact|surprise me|interesting fact/.test(msg))return pick(FACTS);

  // Quotes
  if(/\bquote\b|inspirational|motivational quote/.test(msg)){const q=await apiQuote();if(q)return withSrc(`> "${q.content}"\n\n— **${q.author}**`,'quotable.io');}

  // Advice
  if(/\badvice\b|give me advice|life advice/.test(msg)){const a=await apiAdvice();if(a)return withSrc(`💡 **Advice:** ${a}`,'adviceslip.com');}

  // Trivia
  if(/\btrivia\b|quiz me|trivia question|test my knowledge/.test(msg)){
    const q=await apiTrivia();
    if(q){const ans=[q.correct_answer,...q.incorrect_answers].sort(()=>Math.random()-.5);const L=['A','B','C','D'];const cleanQ=q.question.replace(/&amp;/g,'&').replace(/&#039;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');let out=`🧩 **Trivia** *(${esc(q.category)})*\n\n${esc(cleanQ)}\n\n`;ans.forEach((a,i)=>{out+=`${L[i]}) ${esc(a.replace(/&amp;/g,'&').replace(/&#039;/g,"'"))}\n`;});out+=`\n||**Answer:** ${esc(q.correct_answer)}||`;return withSrc(out,'Open Trivia DB');}
  }

  // Jokes
  if(/\bjoke\b|make me laugh|tell me something funny/.test(msg)){const j=await apiJoke();if(j)return withSrc(`😄 ${j}`,'JokeAPI');}

  // Dog pic
  if(/\bdog\b.*(pic|photo|image|show|random|cute)|show.*dog|random dog/.test(msg)){const url=await apiDog();if(url)return withSrc(`🐶 Here's a random dog!\n\n![Random dog](${url})`,'dog.ceo');}

  // Cat fact
  if(/cat fact|fact about cats?/.test(msg)){const f=await apiCatFact();if(f)return withSrc(`🐱 **Cat fact:** ${f}`,'catfact.ninja');}

  // Bored / activity suggestion
  if(/\bbored\b|what should i do|suggest.*activity|give me.*activity/.test(msg)){const b=await apiBored();if(b)return withSrc(`🎯 **Activity idea:**\n\n${b.activity}\n\n*Type: ${b.type} · Participants: ${b.participants}*`,'boredapi.com');}

  // IP
  if(/my ip|ip address|what is my ip|what's my ip/.test(msg)){const ip=await apiIP();if(ip)return withSrc(card('Your IP Address','🌐',[['IP',esc(ip.ip)],['City',esc(ip.city||'—')],['Region',esc(ip.region||'—')],['Country',esc(ip.country_name||'—')],['ISP',esc(ip.org||'—')]]),'ipapi.co');}

  // Currency exchange
  const exM=raw.match(/([\d,.]+)\s*([a-zA-Z]{3})\s+(?:to|in|into)\s+([a-zA-Z]{3})/i);
  if(exM){const amt=parseFloat(exM[1].replace(/,/g,''));const res=await apiExchange(exM[2].toUpperCase(),exM[3].toUpperCase(),amt);if(res?.amount!=null)return withSrc(card('Currency Exchange','💱',[['From',`${amt.toLocaleString()} ${res.base}`],['To',`**${res.amount.toLocaleString('en-US',{maximumFractionDigits:4})} ${res.target}**`],['Rate',`1 ${res.base} = ${(res.amount/amt).toFixed(4)} ${res.target}`]]),'frankfurter.app');}

  // Exchange rates
  const ratesM=msg.match(/exchange rates?\s+(?:for|of)?\s*([a-z]{3})/)||msg.match(/([a-z]{3})\s+exchange rates?/);
  if(ratesM||/\bexchange rates?\b/.test(msg)){const base=(ratesM?ratesM[1]:'usd').toUpperCase();const rates=await apiExchangeRates(base);if(rates?.rates){const main=['USD','EUR','GBP','JPY','CAD','AUD','CHF','CNY','INR','MXN','BRL','SGD'].filter(c=>c!==base&&rates.rates[c]);return withSrc(card(`${base} Exchange Rates`,'💱',main.map(c=>[c,rates.rates[c].toFixed(4)])),'frankfurter.app');}  }

  // Weather
  const wM=msg.match(/weather\s+(?:in|for|at|of)?\s*([a-z\s,]+?)(?:\?|$)/)||msg.match(/(?:temperature|forecast)\s+(?:in|for|at)?\s*([a-z\s]+?)(?:\?|today|now|$)/);
  if(wM){const city=wM[1].replace(/[?.!\s]+$/,'').trim();if(city.length>1){const w=await apiWeather(city);if(w)return withSrc(card(`${w.name}${w.region?', '+w.region:''}, ${w.country}`,'🌍',[['Conditions',w.desc],['Temperature',`**${w.temp}°C** (feels like ${w.feels}°C)`],['Wind',`${w.wind} km/h`],['Humidity',`${w.hum}%`],['Rain chance',`${w.rain}%`]]),'Open-Meteo');}}

  // Calculator
  let cm=raw.replace(/\bplus\b/gi,'+').replace(/\bminus\b/gi,'-').replace(/\btimes\b/gi,'*').replace(/\bmultiplied by\b/gi,'*').replace(/\bdivided by\b/gi,'/').replace(/\bto the power of\b/gi,'^').replace(/\bsquare root of\b/gi,'sqrt(').replace(/\bpercent\b/gi,'%');
  const calcPats=[/(?:calculate|compute|what(?:'s|\s+is)\s+(?:the\s+)?(?:value|result)?\s*(?:of\s+)?)([\d\s+\-*\/^().sqrtabceilognudEePi%]+(?:\s*%\s*of\s*[\d.]+)?)/i,/^([\d][\d\s+\-*\/^().sqrtabceilognudEePi%]+(?:\s*%\s*of\s*[\d.]+)?)\s*=?\s*\??$/i,/([\d.]+\s*%\s*of\s*[\d.]+)/i];
  for(const pat of calcPats){const m=cm.match(pat);if(m){try{const res=calc(m[1]);const fmt=Number.isInteger(res)?res.toLocaleString():res.toLocaleString('en-US',{maximumFractionDigits:8});return`🧮 **${esc(raw.trim())}**\n\n= **${fmt}**`;}catch(_){}}}

  // Translation
  const tM=raw.match(/translate\s+"?(.+?)"?\s+(?:to|into)\s+(\w+)/i)||raw.match(/(?:how do you say|say)\s+"?(.+?)"?\s+(?:in|to)\s+(\w+)/i)||raw.match(/translate\s+"?(.+?)"?\s+(?:from\s+english\s+)?to\s+(\w+)/i);
  if(tM){const[,tText,tLang]=tM;const code=LANG_MAP[tLang.toLowerCase()];if(code){try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(tText)}&langpair=en|${code}`);const d=await r.json();const t=d.responseData?.translatedText;if(t&&d.responseStatus===200)return withSrc(`🌐 **"${esc(tText)}"** in **${LANG_NAMES[code]||tLang}:**\n\n> ${esc(t)}`,'MyMemory');}catch(_){}}return`Supported languages: ${Object.keys(LANG_MAP).join(', ')}. Try: *"Translate hello to Japanese"*`;}

  // Code snippets
  for(const key of Object.keys(CODE_SNIPPETS)){if(key.split(' ').every(w=>msg.includes(w)))return`Here's a **${key}** example:\n\n${CODE_SNIPPETS[key]}`;}
  const codeM=raw.match(/(?:write|show|give|create)\s+(?:me\s+)?(?:a\s+)?(?:simple\s+)?(.+?)\s+(?:in|using|with)\s+(python|javascript|js|java|c\+\+|c|ruby|go|rust|php|swift|kotlin|typescript|html|css)/i);
  if(codeM){const[,what,lang]=codeM;const ll=lang.toLowerCase().replace(/^js$/,'javascript').replace(/^ts$/,'typescript');const key=`${what.trim().toLowerCase()} ${ll}`;if(CODE_SNIPPETS[key])return CODE_SNIPPETS[key];const scaffolds={python:`\`\`\`python\ndef ${what.replace(/\s+/g,'_').toLowerCase()}():\n    # TODO: implement ${what}\n    pass\n\nprint(${what.replace(/\s+/g,'_').toLowerCase()}())\n\`\`\``,javascript:`\`\`\`javascript\nfunction ${what.replace(/\s+/g,'_')}() {\n  // TODO: implement ${what}\n}\n\nconsole.log(${what.replace(/\s+/g,'_')}());\n\`\`\``};return`Here's a **${what}** scaffold in **${lang}**:\n\n${scaffolds[ll]||scaffolds.python}\n\nFill in the logic to complete it!`;}

  // Greetings
  for(const[k,arr]of Object.entries(GREETINGS)){const re=new RegExp(`\\b${k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`,'i');if(re.test(msg)){const rem=msg.replace(re,'').replace(/[?!.,]/g,'').trim();if(rem.length<6)return pick(arr);}}

  // Top crypto list
  if(/top\s+(?:crypto|cryptocurrencies|coins)|crypto\s+(?:prices|market)|market\s+cap/.test(msg)){const list=await apiCryptoList();if(list?.length){let out='💰 **Top Cryptocurrencies**\n\n';list.forEach((c,i)=>{const ch=(c.price_change_percentage_24h||0).toFixed(2);out+=`**${i+1}. ${c.name} (${c.symbol.toUpperCase()})** — $${c.current_price.toLocaleString()} ${parseFloat(ch)>=0?'📈':'📉'} ${ch}%\n`;});return withSrc(out,'CoinGecko');}}

  // Single crypto
  if(/bitcoin|btc|ethereum|eth|dogecoin|doge|litecoin|ltc|solana|\bsol\b|cardano|polkadot|\bdot\b|bnb|binance|ripple|xrp|avalanche|avax|crypto price/.test(msg)){
    let coin='bitcoin';if(/ethereum|eth/.test(msg))coin='ethereum';else if(/doge/.test(msg))coin='dogecoin';else if(/litecoin|ltc/.test(msg))coin='litecoin';else if(/solana|\bsol\b/.test(msg))coin='solana';else if(/cardano/.test(msg))coin='cardano';else if(/polkadot|\bdot\b/.test(msg))coin='polkadot';else if(/bnb|binance/.test(msg))coin='binancecoin';else if(/ripple|xrp/.test(msg))coin='ripple';else if(/avalanche|avax/.test(msg))coin='avalanche-2';
    const data=await apiCrypto(coin);
    if(data){const md=data.market_data;const price=md?.current_price?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD'})||'—';const ch=(md?.price_change_percentage_24h||0).toFixed(2);const hi=md?.high_24h?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD'})||'—';const lo=md?.low_24h?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD'})||'—';const cap=md?.market_cap?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD',notation:'compact'})||'—';const vol=md?.total_volume?.usd?.toLocaleString('en-US',{style:'currency',currency:'USD',notation:'compact'})||'—';return withSrc(card(`${data.name} (${(data.symbol||'').toUpperCase()})`,parseFloat(ch)>=0?'📈':'📉',[['Price (USD)',`**${price}**`],['24h Change',`${parseFloat(ch)>=0?'+':''}${ch}%`],['24h High',hi],['24h Low',lo],['Market Cap',cap],['24h Volume',vol]]),'CoinGecko');}
  }

  // Reddit
  const rdM=raw.match(/r\/([a-z0-9_]+)/i)||msg.match(/(?:subreddit|posts?\s+(?:from|on|in))\s+([a-z0-9_]+)/)||msg.match(/(?:hot\s+posts?\s+(?:from|on))?\s*r?\/?([a-z0-9_]+)\s*(?:reddit|posts?|subreddit)/i);
  if(rdM||/\breddit\b/.test(msg)){let sub=rdM?rdM[1]:'all';sub=sub.replace(/\b(reddit|posts?|show|me|hot|from|on|in)\b/gi,'').trim()||'worldnews';const posts=await apiReddit(sub);if(posts?.length){let out=`📡 **r/${esc(sub)} — Hot Posts**\n\n`;posts.forEach(p=>{out+=`- [${esc(p.title)}](${esc(p.link)})\n`;});return withSrc(out,'Reddit RSS');}}

  // NASA
  if(/\bnasa\b|space images?|astronomy photo|hubble|james webb/.test(msg)){const q=msg.replace(/\b(nasa|space|astronomy|show|me|about|images?|photos?)\b/gi,' ').trim()||'galaxy';const results=await apiNASA(q);if(results?.length){let out='🚀 **NASA Image Library**\n\n';results.forEach(r=>{const title=r.data?.[0]?.title||'';const desc=(r.data?.[0]?.description||'').substring(0,100);const img=r.links?.[0]?.href||'';out+=`**${esc(title)}**\n${img?`![${esc(title)}](${img})\n`:''}${desc?esc(desc)+'…\n':''}\n`;});return withSrc(out,'NASA Images API');}}

  // SpaceX
  if(/spacex|rocket launch|falcon|starship/.test(msg)){const launches=await apiSpaceX();if(launches?.length){const rows=launches.map(l=>[esc(l.name||'Unknown'),l.date_local?new Date(l.date_local).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'TBD']);return withSrc(card('Upcoming SpaceX Launches','🚀',rows),'SpaceX API');}}

  // Countries
  const cExtract=msg.match(/(?:population|capital|flag|info|about)\s+(?:of\s+|for\s+)?([a-z\s]+?)(?:\?|$)/i)||msg.match(/what(?:'s|\s+is)\s+the\s+(?:population|capital)\s+of\s+([a-z\s]+?)(?:\?|$)/i);
  if(cExtract||/\b(population|capital city|country info)\b/.test(msg)){let cname=(cExtract?cExtract[1]:'');cname=cname.replace(/\b(the|a|an|population|capital|flag|info|about|what is|what's|is|are|country)\b/gi,'').trim();if(cname.length>2){const c=await apiCountry(cname);if(c){const name=c.name?.common||cname;const pop=c.population?.toLocaleString()||'—';const cap=(c.capital||['—'])[0];const region=c.region||'—';const cur=Object.values(c.currencies||{})[0]?.name||'—';const lang=Object.values(c.languages||{})[0]||'—';const flag=c.flag||'🏳️';const area=c.area?.toLocaleString()||'—';return withSrc(card(`${flag} ${esc(name)}`,'🌍',[['Population',pop],['Capital',esc(cap)],['Region',esc(region)],['Area',`${area} km²`],['Currency',esc(cur)],['Language',esc(lang)]]),'REST Countries');}}}

  // Universities
  const uniM=msg.match(/universities?\s+(?:in|of)\s+(.+)/i)||msg.match(/(?:colleges?)\s+(?:in|of)\s+(.+)/i);
  if(uniM){const unis=await apiUnis(uniM[1].trim());if(unis?.length){let out=`🎓 **Universities in ${esc(uniM[1].trim())}**\n\n`;unis.forEach(u=>{out+=`- **${esc(u.name)}**${u.web_pages?.[0]?` — [website](${esc(u.web_pages[0])})`:''}\n`;});return withSrc(out,'Hipolabs University API');}}

  // GitHub
  const ghM=raw.match(/github\s+(?:user|profile)\s+([a-z0-9-]+)/i)||raw.match(/([a-z0-9-]+)'?s?\s+github/i);
  if(ghM){const user=await apiGitHub(ghM[1]);if(user?.login)return withSrc(card(`@${user.login}`,'🐙',[['Name',esc(user.name||'—')],['Bio',esc((user.bio||'—').substring(0,80))],['Repos',String(user.public_repos)],['Followers',user.followers.toLocaleString()],['Location',esc(user.location||'—')]]),'GitHub API');}

  // Art
  const artM=raw.match(/(?:artwork?|painting|sculpture)\s+(?:of|by|about|called)?\s*(.+)/i);
  if(artM&&/art|painting|sculpture|museum/.test(msg)){const art=await apiArtwork(artM[1].trim());if(art?.objectID){let out=`🎨 **${esc(art.title||'Untitled')}**\n`;if(art.primaryImageSmall)out+=`\n![${esc(art.title)}](${art.primaryImageSmall})\n`;return withSrc(out+card('Details','🏛️',[['Artist',esc(art.artistDisplayName||'Unknown')],['Date',esc(art.objectDate||'—')],['Medium',esc((art.medium||'—').substring(0,60))],['Department',esc(art.department||'—')]]),'Metropolitan Museum of Art');}}

  // Food nutrition
  const foodM=msg.match(/(?:nutrition|calories|nutritional|macros?)\s+(?:for|of|in|about)?\s*(.+)/i)||msg.match(/how\s+(?:many\s+)?calories\s+(?:in|does)\s+(.+)/i);
  if(foodM){const food=await apiFood(foodM[1].trim());if(food){const name=food.product_name||foodM[1];return withSrc(card(`${esc(name)} (per 100g)`,'🥗',[['Calories',(food.nutriments?.['energy-kcal_100g']?.toFixed(0)||'—')+' kcal'],['Carbs',(food.nutriments?.carbohydrates_100g?.toFixed(1)||'—')+'g'],['Fat',(food.nutriments?.fat_100g?.toFixed(1)||'—')+'g'],['Protein',(food.nutriments?.proteins_100g?.toFixed(1)||'—')+'g'],['Fiber',(food.nutriments?.fiber_100g?.toFixed(1)||'—')+'g'],['Salt',(food.nutriments?.salt_100g?.toFixed(2)||'—')+'g']]),'Open Food Facts');}}

  // Books (Gutenberg + Google Books)
  const bookM=msg.match(/(?:find|search|show|list|get)\s+books?\s+(?:by|from|about|called)?\s*(.+)/i)||msg.match(/books?\s+(?:by|written by|from|about)\s+(.+)/i);
  if(bookM){const q=bookM[1].trim();const books=await apiBooks(q);if(books?.length){let out=`📚 **Books: "${esc(q)}"**\n\n`;books.slice(0,5).forEach(b=>{out+=`- **${esc(b.title||'Unknown')}** by ${esc(b.authors?.map(a=>a.name).join(', ')||'Unknown')}${b.download_count?` *(${b.download_count.toLocaleString()} downloads)*`:''}\n`;});return withSrc(out,'Project Gutenberg');}const gb=await apiGoogleBooks(q);if(gb?.length){let out=`📚 **Books: "${esc(q)}"**\n\n`;gb.forEach(item=>{const info=item.volumeInfo;out+=`- **${esc(info.title||'Unknown')}** by ${esc((info.authors||['Unknown']).join(', '))}${info.publishedDate?` *(${info.publishedDate.slice(0,4)})*`:''}\n`;});return withSrc(out,'Google Books');}}

  // Dictionary explicit
  const defM=msg.match(/^(?:define|definition of|meaning of|what does (.+?) mean)\s+(.+)/i)||msg.match(/^what is the meaning of\s+(.+)/i);
  if(defM){const word=(defM[2]||defM[1]||'').replace(/[?!.]/g,'').trim();if(word){const data=await apiDict(word);if(data?.[0]){const entry=data[0];let out=`📖 **${esc(entry.word||word)}**\n`;if(entry.phonetics?.[0]?.text)out+=`*${esc(entry.phonetics[0].text)}*\n\n`;else out+='\n';(entry.meanings||[]).slice(0,3).forEach(m=>{out+=`**${esc(m.partOfSpeech)}**\n`;(m.definitions||[]).slice(0,2).forEach((d,i)=>{out+=`${i+1}. ${esc(d.definition)}\n`;if(d.example)out+=`   *"${esc(d.example)}"*\n`;});if(m.synonyms?.length)out+=`Synonyms: ${m.synonyms.slice(0,5).map(esc).join(', ')}\n`;out+='\n';});return withSrc(out.trim(),'DictionaryAPI.dev');}}}

  // Wikipedia Q&A
  if(Q_PATS.some(p=>msg.includes(p))){
    let topic=msg;for(const p of Q_PATS){if(msg.includes(p)){topic=msg.replace(p,'').trim();break;}}
    topic=topic.replace(/[?!.]/g,'').replace(/^(the |a |an )/i,'').trim();
    for(const[k,v]of Object.entries(ASTRO_MAP)){if(topic.includes(k)){topic=v;break;}}
    if(topic.length>2){let wiki=await apiWiki(topic);if(!wiki){const sr=await searchWiki(topic);if(sr?.title)wiki=await apiWiki(sr.title);}if(!wiki){const ddg=await apiDDG(topic);if(ddg)wiki={extract:ddg.extract};}if(wiki?.extract)return withSrc(fmtWiki(wiki.extract,wiki.title||topic),'Wikipedia');}
  }

  // Dictionary single-word fallback
  const COMMON=new Set(['what','when','where','who','why','how','the','a','an','is','are','was','were','for','in','on','at','by','to','of','and','or','but','not','this','that','it','do','does','did','will','can','could','would','should','may','might','must','have','has','had','been','be','help','tell','show','give','get','make','take','find','use','need','want','like','know','think','feel','good','bad','just','very','too','more','also','some','much','many']);
  const nonConv=msg.length>=16&&!msg.includes('?')&&!/^(hi|hey|hello|how|what|why|when|where|who|can|could|tell|show|help|explain|is|are|was|were|do|does)/i.test(msg);
  if(nonConv){const words=msg.replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!COMMON.has(w));if(words.length===1){const data=await apiDict(words[0]);const def=data?.[0]?.meanings?.[0]?.definitions?.[0]?.definition;if(def&&def.length>15)return withSrc(`📖 **${esc(words[0])}:** ${esc(def)}`,'DictionaryAPI.dev');}}

  // General Wikipedia fallback
  {const stopW=new Set([...COMMON,'about','like','from','give','show','find','search','look','result','fetch','query','request','please','could','would','should']);const words=msg.replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!stopW.has(w));if(words.length>0){const topics=[words.join(' '),words[0],words.slice(0,2).join(' ')];for(const t of topics){const wiki=await apiWiki(t)||null;if(wiki?.extract&&wiki.extract.length>60)return withSrc(fmtWiki(wiki.extract,wiki.title||t),'Wikipedia');}const ddg=await apiDDG(words.join(' '));if(ddg?.extract&&ddg.extract.length>40)return withSrc(fmtWiki(ddg.extract,'DuckDuckGo'),'DuckDuckGo');}}

  return pick(["Hmm, I'm not sure how to answer that. I work best with factual questions — try asking about weather, crypto, a country, a math problem, or something to translate! 😊","I didn't quite catch that — could you rephrase it?","That's outside what I can answer right now. Try asking me to explain something, look up a country, check the weather, or calculate something!","I don't have an answer for that yet. I'm powered by free public APIs, so I work best with lookups, facts, and calculations. What else can I help with?"]);
}

/* ══════════════════════════════════════════ UTILS ══════════════════════════════════════════ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
let _tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

</script>
</body>
</html>
